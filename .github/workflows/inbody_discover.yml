name: Discover InBody Columns

# One-click helper: finds the correct Lookin'Body field codes for the extended
# InBody metrics (visceral fat, protein, mineral, InBody age, hydration) and
# prints them in the run log. Run it from the Actions tab, then paste the
# SUMMARY back so the extra columns can be switched on in fetch_inbody.py.

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Probe InBody export columns
        env:
          INBODY_LOGIN_ID: ${{ secrets.INBODY_LOGIN_ID }}
          INBODY_PASSWORD: ${{ secrets.INBODY_PASSWORD }}
        run: cd scripts && python discover_inbody_columns.py
