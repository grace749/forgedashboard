name: Refresh Dashboard Data

on:
  schedule:
    # Aim for ~6am Belfast time year-round. GitHub cron is UTC and has no
    # timezone support, and BST (summer) is UTC+1 while GMT (winter) is UTC+0,
    # so we schedule both: 05:12 UTC hits 06:12 BST, 06:12 UTC hits 06:12 GMT.
    # Minute :12 (not :00) avoids the top-of-hour queue where GitHub delays runs.
    # AI advice is cached ~20h (scripts/ai.py) so extra refreshes cost ~nothing.
    # Morning refresh ~6-7am Belfast:
    - cron: "12 6 * * *"
    # Afternoon refresh ~3-4pm Belfast:
    - cron: "12 15 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit data.json back to the repo

# Only one refresh at a time — GitHub often delays scheduled runs by hours, so
# the morning crons can fire together; this stops them colliding on git push.
concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch all data sources
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          TEAMUP_API_KEY: ${{ secrets.TEAMUP_API_KEY }}
          XERO_CLIENT_ID: ${{ secrets.XERO_CLIENT_ID }}
          XERO_CLIENT_SECRET: ${{ secrets.XERO_CLIENT_SECRET }}
          XERO_REFRESH_TOKEN: ${{ secrets.XERO_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          ASANA_SCRIPT_URL: ${{ secrets.ASANA_SCRIPT_URL }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_IMPERSONATE_EMAIL: ${{ secrets.GOOGLE_IMPERSONATE_EMAIL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INBODY_LOGIN_ID: ${{ secrets.INBODY_LOGIN_ID }}
          INBODY_PASSWORD: ${{ secrets.INBODY_PASSWORD }}
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          STARLING_ACCESS_TOKEN: ${{ secrets.STARLING_ACCESS_TOKEN }}
          GOCARDLESS_ACCESS_TOKEN: ${{ secrets.GOCARDLESS_ACCESS_TOKEN }}
          STRIPE_ACCESS_TOKEN: ${{ secrets.STRIPE_ACCESS_TOKEN }}
          ATRISK_SCRIPT_URL: ${{ secrets.ATRISK_SCRIPT_URL }}
          CHAT_SCRIPT_URL: ${{ secrets.CHAT_SCRIPT_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_WRITE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: cd scripts && python build_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "forge-dashboard-bot"
          git config user.email "bot@theforge.pt"
          git add data/data.json data/class_counts.json data/ai_cache.json
          git diff --staged --quiet && echo "no changes" && exit 0
          git commit -m "chore: refresh dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry in case another run pushed meanwhile. data/* are GENERATED files,
          # so on any conflict keep OUR freshly built version (-X theirs during a
          # rebase = the commit being replayed, i.e. this run's data). Abort a
          # stuck rebase before retrying so the working tree is clean.
          for i in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          exit 1
