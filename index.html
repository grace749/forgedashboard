<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Forge — Owner Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2d1b4e;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #1e0f38;
      border-bottom: 1px solid #3d2464;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 30px; height: 30px; background: #7c3aed; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .header-meta { font-size: 0.72rem; color: #7c5fa0; }

    /* ── Grid ───────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      padding: 16px 18px;
      max-width: 1440px;
      margin: 0 auto;
      align-items: start;
    }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      display: flex; flex-direction: column;
    }
    .card-title {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #bbb; margin-bottom: 4px;
    }
    .card-headline {
      font-size: 1.1rem; font-weight: 800;
      color: #1a0a2e; margin-bottom: 14px;
      letter-spacing: -0.02em; line-height: 1.2;
    }

    .col-3  { grid-column: span 3; height: 580px; overflow-y: auto; }
    .col-3::-webkit-scrollbar { width: 4px; }
    .col-3::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-12 { grid-column: span 12; }

    /* ── Big KPI ────────────────────────────────────────────── */
    .big-kpi { margin-bottom: 14px; }
    .big-kpi .number {
      font-size: 2.8rem; font-weight: 800;
      line-height: 1; letter-spacing: -0.04em; color: #111;
    }
    .big-kpi .number.green { color: #16a34a; }
    .big-kpi .sublabel { font-size: 0.72rem; color: #999; margin-top: 3px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill {
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; border: 1.5px solid;
      cursor: default;
    }
    .pill.green  { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .pill.amber  { color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .pill.red    { color: #dc2626; background: #fef2f2; border-color: #fecaca; cursor: pointer; }
    .pill.grey   { color: #6b7280; background: #f9fafb; border-color: #e5e7eb; cursor: pointer; }
    .pill.purple { color: #7c3aed; background: #f5f3ff; border-color: #ddd6fe; }

    /* ── Stat rows ──────────────────────────────────────────── */
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #f3f4f6;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 0.82rem; color: #6b7280; }
    .stat-val   { font-size: 0.9rem; font-weight: 600; color: #111; }
    .stat-val.green { color: #16a34a; }
    .stat-val.red   { color: #dc2626; }

    .inner-divider {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #d1d5db;
      padding: 10px 0 5px; border-top: 1px solid #f3f4f6; margin-top: 4px;
    }

    /* ── Membership scroll ──────────────────────────────────── */
    .membership-scroll {
      overflow-y: auto; max-height: 260px;
      margin-top: 4px;
    }
    .membership-scroll::-webkit-scrollbar { width: 4px; }
    .membership-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    /* ── P&L ────────────────────────────────────────────────── */
    .pl-sub .stat-label { padding-left: 10px; color: #9ca3af; }
    .pl-sub .stat-val   { color: #374151; font-weight: 500; }
    .pl-highlight .stat-label { color: #111; font-weight: 700; }
    .pl-highlight .stat-val   { font-size: 0.95rem; font-weight: 700; color: #111; }
    .pl-highlight .stat-val.green { color: #16a34a; }
    .pl-highlight .stat-val.red   { color: #dc2626; }

    /* ── Task list ──────────────────────────────────────────── */
    .task-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }
    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #f3f4f6;
    }
    .task-item:last-child { border-bottom: none; }
    .task-bar {
      width: 3px; border-radius: 2px; align-self: stretch;
      flex-shrink: 0; min-height: 32px; background: #e5e7eb;
    }
    .task-bar.overdue { background: #dc2626; }
    .task-bar.today   { background: #d97706; }
    .task-bar.soon    { background: #7c3aed; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 0.88rem; color: #1f2937; line-height: 1.35; }
    .task-name a { color: #1f2937; text-decoration: none; }
    .task-name a:hover { color: #7c3aed; }
    .task-footer { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
    .task-proj {
      font-size: 0.7rem; color: #9ca3af;
      background: #f3f4f6; padding: 1px 7px; border-radius: 3px;
    }
    .task-due { font-size: 0.72rem; font-weight: 600; }
    .task-due.overdue { color: #dc2626; }
    .task-due.today   { color: #d97706; }
    .task-due.soon    { color: #7c3aed; }
    .task-due.later   { color: #d1d5db; }

    /* ── Action plan table ──────────────────────────────────── */
    .ap-wrap { overflow-x: auto; }
    .ap-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .ap-table th {
      text-align: left; padding: 7px 12px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #bbb; border-bottom: 1px solid #f0f0f5;
    }
    .ap-table td {
      padding: 10px 12px; border-bottom: 1px solid #f9f9fc;
      color: #374151; vertical-align: top;
    }
    .ap-table tr:last-child td { border-bottom: none; }
    .ap-table tr:hover td { background: #fafafa; }
    .ap-table td:first-child { color: #111; font-weight: 500; font-size: 0.85rem; }
    .ap-owner {
      display: inline-block; font-size: 0.7rem;
      background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #6b7280;
    }
    .ap-deadline { font-size: 0.78rem; color: #6b7280; }
    .ap-done { color: #16a34a; font-weight: 700; font-size: 1rem; }
    .ap-todo { color: #e5e7eb; font-size: 1rem; }
    .ap-btn {
      border: none; border-radius: 6px; padding: 4px 10px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .ap-btn:disabled { opacity: .5; cursor: wait; }
    .ap-btn-done { background: #dcfce7; color: #16a34a; }
    .ap-btn-todo { background: #f3f4f6; color: #9ca3af; }
    .ap-btn-todo:hover { background: #e0e7ff; color: #4f46e5; }

    /* ── Mini table (marketing) ─────────────────────────────── */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 2px; }
    .mini-table th {
      text-align: left; padding: 5px 0; color: #bbb;
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid #f0f0f5;
    }
    .mini-table td { padding: 7px 0; border-bottom: 1px solid #f9f9fc; color: #6b7280; }
    .mini-table tr:last-child td { border-bottom: none; }
    .mini-table td:first-child { color: #374151; font-weight: 500; }
    .mini-table .total td { color: #111; font-weight: 700; border-top: 2px solid #f0f0f5; }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(30,10,60,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 24px 28px;
      min-width: 300px; max-width: 420px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; color: #111; margin-bottom: 14px; }
    .modal-list { list-style: none; }
    .modal-list li {
      padding: 8px 0; border-bottom: 1px solid #f3f4f6;
      font-size: 0.88rem; color: #374151;
    }
    .modal-list li:last-child { border-bottom: none; }
    .modal-close {
      margin-top: 18px; width: 100%; padding: 9px;
      background: #2d1b4e; color: #fff; border: none;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
    }
    .modal-close:hover { background: #3d2464; }

    @media (max-width: 960px) {
      .col-3, .col-4, .col-6 { grid-column: span 12; }
    }
  </style>
</head>
<body>

<!-- Member names modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">Members</h3>
    <ul class="modal-list" id="modal-list"></ul>
    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">
      <button id="modal-task-done" style="display:none;flex:1;align-items:center;justify-content:center;padding:9px;background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer">✓ Mark Done</button>
      <a id="modal-asana-link" href="#" target="_blank" style="display:none;flex:1;align-items:center;justify-content:center;padding:9px;background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe;border-radius:8px;font-size:.85rem;font-weight:600;text-decoration:none">Open in Asana ↗</a>
      <button class="modal-close" style="flex:1;margin-top:0" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-mark">F</div>
    <span class="logo-text">Forge Dashboard</span>
  </div>
  <span class="header-meta" id="gen-time">Loading…</span>
</header>

<div class="grid" id="dashboard">
  <div class="card col-12"><p style="color:#aaa;font-size:.9rem;padding:8px 0">Loading…</p></div>
</div>

<script>
// ── Modal ─────────────────────────────────────────────────────
function showModal(title, members) {
  document.getElementById("modal-title").textContent = title;
  const list = document.getElementById("modal-list");
  list.innerHTML = members.length
    ? members.map(m => `<li>${m.name}</li>`).join("")
    : "<li style='color:#aaa'>None</li>";
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(e) {
  if (!e || e.target === document.getElementById("modal-overlay")) {
    document.getElementById("modal-overlay").classList.remove("open");
  }
}

// ── Data ──────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch("./data/data.json?t=" + Date.now());
  return res.json();
}

function fmt(val, prefix = "") {
  if (val === null || val === undefined) return `<span style="color:#ddd">—</span>`;
  if (typeof val === "number") return `${prefix}${val.toLocaleString("en-IE", { maximumFractionDigits: 0 })}`;
  return val;
}
function fmtGbp(val) { return fmt(val, "£"); }
function fmtDate(iso) {
  if (!iso) return null;
  const [, m, d] = iso.split("-");
  return `${parseInt(d)} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)-1]}`;
}

// ── Render ────────────────────────────────────────────────────
function render(data) {
  const el    = document.getElementById("dashboard");
  const metaEl = document.getElementById("gen-time");
  if (data.generated_at) {
    const dt = new Date(data.generated_at);
    metaEl.textContent = "Updated " + dt.toLocaleString("en-IE", { dateStyle: "medium", timeStyle: "short" });
  }

  const today = new Date().toISOString().split("T")[0];
  const asanaScriptUrl = data.asana_script_url || "";
  const cards = [];

  // ── Membership ─────────────────────────────────────────────
  const tm = data.teamup || {};

  // Store all member lists in a global so onclick can reference by key safely
  window._members = {
    recurring:  tm.recurring_members  || [],
    trial:      tm.trial_members      || [],
    leaving:    tm.leaving_members    || [],
    paused:     tm.paused_members     || [],
    cancelled:  tm.cancelled_members  || [],
  };
  (tm.breakdown || []).forEach(b => {
    window._members["bd_" + b.name] = b.members || [];
  });

  cards.push(`
    <div class="card col-3">
      <div class="card-title">Members</div>
      <div class="card-headline">Membership Snapshot</div>
      <div class="big-kpi">
        <div class="number">${tm.total_members ?? "—"}</div>
        <div class="sublabel">Active members</div>
      </div>
      <div class="pill-row">
        ${tm.recurring != null ? `<div class="pill green" onclick="showModal('Recurring Members',window._members.recurring)" style="cursor:pointer">${tm.recurring} Recurring ↗</div>` : ""}
        ${tm.trial     != null ? `<div class="pill amber" onclick="showModal('Jumpstart Members',window._members.trial)" style="cursor:pointer">${tm.trial} Jumpstart ↗</div>` : ""}
        ${(tm.cancellations_this_month||0) > 0
          ? `<div class="pill red" onclick="showModal('Pending Cancellations',window._members.leaving)">${tm.cancellations_this_month} Leaving ↗</div>`
          : `<div class="pill grey">0 Leaving</div>`}
        ${(tm.paused||0) > 0
          ? `<div class="pill grey" onclick="showModal('Paused Members',window._members.paused)">${tm.paused} Paused ↗</div>`
          : ""}
        ${(tm.cancelled_last_month||0) > 0
          ? `<div class="pill purple" onclick="showModal('Cancelled Last Month',window._members.cancelled)">${tm.cancelled_last_month} Cancelled ↗</div>`
          : ""}
      </div>
      <div class="stat-row">
        <span class="stat-label">Joined this month</span>
        <span class="stat-val green">+${fmt(tm.new_this_month)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Monthly churn rate</span>
        <span class="stat-val ${(tm.churn_rate||0) > 5 ? 'red' : 'green'}">${tm.churn_rate != null ? tm.churn_rate + "%" : "—"}</span>
      </div>
      <div class="inner-divider">By membership type</div>
      <div class="membership-scroll">
        ${(tm.breakdown || []).map(b => {
          const key = "bd_" + b.name.replace(/'/g, "\\'");
          return `<div class="stat-row" onclick="showModal('${b.name.replace(/'/g,"\\'")}',window._members['bd_${b.name.replace(/'/g,"\\'")}'])" style="cursor:pointer">
            <span class="stat-label">${b.name}</span>
            <span class="stat-val" style="display:flex;align-items:center;gap:6px">${b.count} <span style="font-size:.65rem;color:#c4b5fd">↗</span></span>
          </div>`;
        }).join("")}
      </div>
    </div>
  `);

  // ── Financials ─────────────────────────────────────────────
  const xr = data.xero || {};
  cards.push(`
    <div class="card col-3">
      <div class="card-title">Xero</div>
      <div class="card-headline">Profit & Loss — ${xr.period || "Last Month"}</div>
      <div class="big-kpi">
        <div class="number green">${fmtGbp(xr.revenue)}</div>
        <div class="sublabel">Revenue</div>
      </div>
      <div class="inner-divider">Cost of Sales</div>
      <div class="stat-row pl-sub"><span class="stat-label">Wages</span><span class="stat-val">${fmtGbp(xr.direct_wages)}</span></div>
      <div class="stat-row pl-highlight"><span class="stat-label">Gross profit</span><span class="stat-val">${fmtGbp(xr.gross_profit)}</span></div>
      <div class="inner-divider">Operating Expenses</div>
      <div class="stat-row pl-sub"><span class="stat-label">Rent</span><span class="stat-val">${fmtGbp(xr.rent)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Rates (LPS)</span><span class="stat-val">${fmtGbp(xr.rates)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Marketing</span><span class="stat-val">${fmtGbp(xr.marketing)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Subscriptions</span><span class="stat-val">${fmtGbp(xr.subscriptions)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">IT & Software</span><span class="stat-val">${fmtGbp(xr.it_software)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Electricity</span><span class="stat-val">${fmtGbp(xr.electricity)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Telephone</span><span class="stat-val">${fmtGbp(xr.telephone)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Cleaning</span><span class="stat-val">${fmtGbp(xr.cleaning)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Insurance</span><span class="stat-val">${fmtGbp(xr.insurance)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Kit & Equipment</span><span class="stat-val">${fmtGbp(xr.kit)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Entertainment</span><span class="stat-val">${fmtGbp(xr.entertainment)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Accountancy</span><span class="stat-val">${fmtGbp(xr.accountancy)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Miscellaneous</span><span class="stat-val">${fmtGbp(xr.miscellaneous)}</span></div>
      <div class="stat-row pl-sub" style="opacity:.6"><span class="stat-label">General Expenses</span><span class="stat-val">${fmtGbp(xr.general_expenses)}</span></div>
      <div class="stat-row pl-sub"><span class="stat-label">Total op. expenses</span><span class="stat-val">${fmtGbp(xr.total_expenses)}</span></div>
      <div class="stat-row pl-highlight" style="margin-top:6px;border-top:1px solid #f3f4f6;padding-top:8px">
        <span class="stat-label">Net profit</span>
        <span class="stat-val ${(xr.net_profit||0) >= 0 ? 'green' : 'red'}">${fmtGbp(xr.net_profit)}</span>
      </div>
    </div>
  `);

  // ── Marketing ──────────────────────────────────────────────
  const mk = data.marketing || {};
  const mkMonthly = mk.monthly || [];
  const mkLife    = mk.lifetime || {};
  cards.push(`
    <div class="card col-3">
      <div class="card-title">Meta Ads</div>
      <div class="card-headline">Social Media Ads</div>
      <div class="big-kpi">
        <div class="number">${mk.leads ?? "—"}</div>
        <div class="sublabel">Leads · ${mk.period || ""}</div>
      </div>
      <div class="stat-row"><span class="stat-label">Ad spend</span><span class="stat-val">${fmtGbp(mk.ad_spend)}</span></div>
      <div class="stat-row"><span class="stat-label">Lead gen team</span><span class="stat-val red">−£750</span></div>
      <div class="stat-row"><span class="stat-label">Cost per lead</span><span class="stat-val">${fmtGbp(mk.cost_per_lead)}</span></div>
      <div class="stat-row"><span class="stat-label">Sales</span><span class="stat-val green">${fmt(mk.sales)}</span></div>
      <div class="stat-row"><span class="stat-label">Close rate</span><span class="stat-val ${(mk.close_rate||0)>=10?'green':'red'}">${mk.close_rate!=null?mk.close_rate+"%":"—"}</span></div>
      <div class="stat-row"><span class="stat-label">Profit from ads</span><span class="stat-val green">${fmtGbp(mk.profit)}</span></div>
      <div class="stat-row" style="border-top:2px solid #f0f0f5;margin-top:4px;padding-top:8px">
        <span class="stat-label" style="font-weight:700;color:#111">Net (after lead gen)</span>
        <span class="stat-val ${(mk.profit||0)-750>=0?'green':'red'}">${fmtGbp((mk.profit||0)-750)}</span>
      </div>
      ${mkMonthly.length ? `
      <div class="inner-divider">Monthly breakdown</div>
      <table class="mini-table">
        <thead><tr><th>Month</th><th>Ad Cost</th><th>Leads</th><th>CPL</th><th>Profit</th></tr></thead>
        <tbody>
          ${mkMonthly.map(m => {
            const cpl = m.leads > 0 ? fmtGbp(Math.round(m.spend / m.leads)) : "—";
            const netProfit = (m.profit || 0) - 750;
            return `<tr><td>${m.month}</td><td>${fmtGbp(m.spend)}</td><td>${m.leads}</td><td>${cpl}</td><td style="color:${netProfit>=0?'#16a34a':'#dc2626'};font-weight:600">${fmtGbp(netProfit)}</td></tr>`;
          }).join("")}
          ${mkLife.spend ? `<tr class="total"><td>Total</td><td>${fmtGbp(mkLife.spend)}</td><td>${mkLife.leads||""}</td><td></td><td style="color:#16a34a">${fmtGbp((mkLife.profit||0) - (750 * mkMonthly.length))}</td></tr>` : ""}
        </tbody>
      </table>` : ""}
    </div>
  `);

  // ── Tasks ──────────────────────────────────────────────────
  const tasks = data.asana?.tasks_today ?? [];
  const taskHtml = tasks.length
    ? tasks.map(t => {
        const isOverdue = t.overdue;
        const isToday   = t.due_on === today;
        const barClass  = isOverdue ? "overdue" : isToday ? "today" : t.due_on ? "soon" : "";
        const dateClass = isOverdue ? "overdue" : isToday ? "today" : t.due_on ? "soon" : "later";
        const dateLabel = isOverdue ? `⚠ ${fmtDate(t.due_on)}` : isToday ? "Today" : t.due_on ? fmtDate(t.due_on) : "No date";
        const safeNotes = (t.notes || "").replace(/'/g, "\\'").replace(/\n/g, "\\n");
        const safeName  = t.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `<li class="task-item" onclick="showTaskDetail('${t.gid}','${safeName}','${safeNotes}','${t.url||""}','${asanaScriptUrl}')" style="cursor:pointer">
          <div class="task-bar ${barClass}"></div>
          <div class="task-body">
            <div class="task-name">${t.name}${t.notes ? ' <span style="font-size:.65rem;color:#c4b5fd;vertical-align:middle">●</span>' : ""}</div>
            <div class="task-footer">
              ${t.project ? `<span class="task-proj">${t.project}</span>` : ""}
              <span class="task-due ${dateClass}">${dateLabel}</span>
              ${t.url ? `<a href="${t.url}" target="_blank" onclick="event.stopPropagation()" style="font-size:.68rem;color:#9ca3af;text-decoration:none;margin-left:auto">Open ↗</a>` : ""}
            </div>
          </div>
        </li>`;
      }).join("")
    : `<li style="padding:12px 0;color:#ccc;font-size:.88rem">No incomplete tasks 🎉</li>`;

  cards.push(`
    <div class="card col-3">
      <div class="card-title">Asana</div>
      <div class="card-headline">Your Tasks (${tasks.length})</div>
      <ul class="task-list" style="max-height:400px;overflow-y:auto">${taskHtml}</ul>
    </div>
  `);

  // ── 30-Day Action Plan ─────────────────────────────────────
  const kpis = data.growth_sprint?.kpis ?? [];
  const apScriptUrl = data.apps_script_url || "";

  if (!kpis.length) {
    cards.push(`<div class="card col-12"><div class="card-title">Google Sheets</div><div class="card-headline">30-Day Action Plan</div><p style="color:#ccc;font-size:.85rem">No data</p></div>`);
  } else {
    const cols = Object.keys(kpis[0]);
    const rows = kpis.map((row, rowIdx) => `<tr>${cols.map(c => {
      const v = row[c] || "";
      if (c === "Done") {
        const isDone = ["x","yes","✓"].includes(v.trim().toLowerCase());
        const action = (row["Action"] || "").replace(/'/g, "\\'");
        if (apScriptUrl) {
          return isDone
            ? `<td><button class="ap-btn ap-btn-done" onclick="toggleDone(this,'${action}',false,'${apScriptUrl}')">✓ Done</button></td>`
            : `<td><button class="ap-btn ap-btn-todo" onclick="toggleDone(this,'${action}',true,'${apScriptUrl}')">○ Mark done</button></td>`;
        }
        return isDone ? `<td class="ap-done">✓</td>` : `<td class="ap-todo">○</td>`;
      }
      if (c === "Owner")    return `<td><span class="ap-owner">${v||"—"}</span></td>`;
      if (c === "Deadline") return `<td><span class="ap-deadline">${v||"—"}</span></td>`;
      return `<td>${v}</td>`;
    }).join("")}</tr>`).join("");

    cards.push(`
      <div class="card col-12">
        <div class="card-title">Google Sheets</div>
        <div class="card-headline" style="display:flex;align-items:center;justify-content:space-between">
          30-Day Action Plan
          <a href="https://docs.google.com/spreadsheets/d/1Cztbi-zVqFvpZ48q-aAIMBZWSeeQjUM8abHRI98b6iY" target="_blank"
             style="font-size:0.72rem;font-weight:600;color:#7c3aed;text-decoration:none;background:#f5f3ff;padding:4px 10px;border-radius:6px;border:1px solid #ddd6fe">
            Open Sheet ↗
          </a>
        </div>
        <div class="ap-wrap">
          <table class="ap-table">
            <thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `);
  }

  el.innerHTML = cards.join("");
}

function showTaskDetail(gid, name, notes, url, scriptUrl) {
  document.getElementById("modal-title").textContent = name;
  const list = document.getElementById("modal-list");
  const notesHtml = notes
    ? notes.replace(/\\n/g, "\n").split("\n").filter(l => l.trim())
        .map(l => `<li style="padding:5px 0;border-bottom:1px solid #f3f4f6;line-height:1.5">${l}</li>`).join("")
    : "<li style='color:#aaa;padding:8px 0'>No description</li>";
  list.innerHTML = notesHtml;

  const asanaLink = document.getElementById("modal-asana-link");
  asanaLink.href = url || "#";
  asanaLink.style.display = url ? "flex" : "none";

  const doneBtn = document.getElementById("modal-task-done");
  if (scriptUrl) {
    doneBtn.style.display = "flex";
    doneBtn.onclick = () => markTaskDone(gid, name, scriptUrl, doneBtn);
  } else {
    doneBtn.style.display = "none";
  }

  document.getElementById("modal-overlay").classList.add("open");
}

async function markTaskDone(gid, name, scriptUrl, btn) {
  btn.disabled = true;
  btn.textContent = "Marking done…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ task_gid: gid, completed: true }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    btn.textContent = "✓ Marked done!";
    btn.style.background = "#dcfce7";
    btn.style.color = "#16a34a";
    btn.style.borderColor = "#bbf7d0";
    // Remove task row from list
    document.querySelectorAll(".task-item").forEach(el => {
      if (el.textContent.includes(name.substring(0, 20))) el.style.opacity = "0.35";
    });
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
    btn.disabled = false;
  }
}

async function toggleDone(btn, action, markDone, scriptUrl) {
  btn.disabled = true;
  btn.textContent = "Saving…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ action, done: markDone }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    if (markDone) {
      btn.className = "ap-btn ap-btn-done";
      btn.textContent = "✓ Done";
      btn.onclick = () => toggleDone(btn, action, false, scriptUrl);
    } else {
      btn.className = "ap-btn ap-btn-todo";
      btn.textContent = "○ Mark done";
      btn.onclick = () => toggleDone(btn, action, true, scriptUrl);
    }
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
  }
  btn.disabled = false;
}

loadData().then(render).catch(err => {
  document.getElementById("dashboard").innerHTML =
    `<div class="card col-12"><div class="card-headline">Error</div><p style="color:#dc2626;font-size:.88rem">${err.message}</p></div>`;
});
</script>
