<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Forge — Owner Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2d1b4e;
      color: #1a1a2e;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #1e0f38;
      border-bottom: 1px solid #3d2464;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 30px; height: 30px; background: #7c3aed; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .header-meta { font-size: 0.72rem; color: #a894c9; }

    /* ── Grid ───────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      padding: 16px 18px;
      max-width: 1440px;
      margin: 0 auto;
      align-items: start;
    }
    /* Members grid: cards in each row stretch to equal height for a clean, aligned layout */
    #grid-members { align-items: stretch; }
    #grid-members .card { overflow: hidden; }
    #grid-jumpstart { align-items: stretch; }
    /* Section divider headline (full width) */
    .sec-divider {
      grid-column: span 12; display: flex; align-items: center; gap: 12px;
      margin: 14px 2px 0; color: #fff;
    }
    .sec-divider .sec-label {
      font-size: .78rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: #d6c9ef; white-space: nowrap;
    }
    .sec-divider .sec-line { flex: 1; height: 1px; background: #4a2f75; }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
      display: flex; flex-direction: column;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover { box-shadow: 0 8px 26px rgba(0,0,0,0.28); transform: translateY(-1px); }
    .card-title {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #9aa1ac; margin-bottom: 4px;
    }
    .card-headline {
      font-size: 1.1rem; font-weight: 700;
      color: #1f2430; margin-bottom: 14px;
      letter-spacing: -0.02em; line-height: 1.2;
    }

    .col-3  { grid-column: span 3; height: 580px; overflow-y: auto; }
    .col-3::-webkit-scrollbar { width: 4px; }
    .col-3::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-8  { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tab-bar {
      background: #1e0f38; border-bottom: 1px solid #3d2464;
      padding: 0 18px; display: flex; gap: 2px; overflow-x: auto;
      position: sticky; top: 59px; z-index: 90;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 12px 16px; font-size: .8rem; font-weight: 600;
      color: #a894c9; background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover  { color: #d6c9ef; }
    .tab-btn.active { color: #fff; border-bottom-color: #a78bfa; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Daily Brief ────────────────────────────────────────── */
    .brief-card { padding: 0; overflow: hidden; }
    .brief-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: none; border: none; cursor: pointer; text-align: left; gap: 12px;
    }
    .brief-header-left { display: flex; align-items: center; gap: 12px; }
    .brief-icon {
      width: 36px; height: 36px; background: #f5f3ff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    }
    .brief-label { font-size: .72rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .08em; }
    .brief-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .brief-chip {
      font-size: .72rem; font-weight: 700; padding: 2px 9px; border-radius: 20px;
    }
    .chip-purple { background: #f5f3ff; color: #7c3aed; }
    .chip-red    { background: #fef2f2; color: #ef4444; }
    .chip-green  { background: #f0fdf4; color: #059669; }
    .chip-amber  { background: #fffbeb; color: #d97706; }
    .brief-chevron { transition: transform .2s; flex-shrink: 0; }
    .brief-chevron.rotated { transform: rotate(180deg); }
    .brief-collapsed { display: none; }
    .brief-panel { height: 440px; }
    /* Home: brief and tasks cards match height, each scrolls internally */
    .brief-card { height: 600px; }
    .brief-card .brief-body { flex: 1; overflow-y: auto; }
    .tasks-card { height: 440px; }
    .tasks-card .task-list { flex: 1; overflow-y: auto; max-height: none !important; }
    .brief-body { border-top: 1px solid #f3f4f6; }
    .brief-body::-webkit-scrollbar { width: 3px; }
    .brief-body::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .brief-cols {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .brief-col { padding: 10px 16px; }
    .brief-col + .brief-col { border-left: 1px solid #f3f4f6; }
    .brief-col-title {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid;
    }
    .brief-col-title--purple { color: #7c3aed; border-color: #ede9fe; }
    .brief-col-title--red    { color: #ef4444; border-color: #fee2e2; }
    .brief-col-title--green  { color: #059669; border-color: #d1fae5; }
    .brief-col-title--amber  { color: #d97706; border-color: #fde68a; }
    .brief-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid #f9fafb;
    }
    .brief-row:last-child { border-bottom: none; }
    .brief-time { min-width: 48px; font-size: .72rem; font-weight: 700; color: #7c3aed; padding-top: 2px; }
    .brief-row-title { font-size: .82rem; font-weight: 600; color: #111; line-height: 1.3; }
    .brief-row-sub { font-size: .72rem; color: #999; margin-top: 2px; line-height: 1.4; }
    .brief-email-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-red    { background: #ef4444; }
    .dot-purple { background: #7c3aed; }
    .brief-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #d1fae5;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: #059669; flex-shrink: 0;
    }
    .brief-empty { font-size: .8rem; color: #ccc; padding: 6px 0; }
    .brief-row-link { text-decoration: none; color: inherit; cursor: pointer; }
    .brief-row-link:hover { background: #f9fafb; margin: 0 -8px; padding: 7px 8px; border-radius: 6px; }
    @media (max-width: 900px) {
      .brief-cols { grid-template-columns: 1fr; }
      .brief-col + .brief-col { border-left: none; border-top: 1px solid #f3f4f6; }
    }

    /* ── Big KPI ────────────────────────────────────────────── */
    .big-kpi { margin-bottom: 14px; }
    .big-kpi .number {
      font-size: 2.8rem; font-weight: 800;
      line-height: 1; letter-spacing: -0.04em; color: #111;
    }
    .big-kpi .number.green { color: #16a34a; }
    .big-kpi .sublabel { font-size: 0.72rem; color: #999; margin-top: 3px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill {
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; border: 1.5px solid;
      cursor: default;
    }
    .pill.green  { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .pill.amber  { color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .pill.red    { color: #dc2626; background: #fef2f2; border-color: #fecaca; cursor: pointer; }
    .pill.grey   { color: #6b7280; background: #f9fafb; border-color: #e5e7eb; cursor: pointer; }
    .pill.purple { color: #7c3aed; background: #f5f3ff; border-color: #ddd6fe; }

    /* ── Stat rows ──────────────────────────────────────────── */
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #f3f4f6;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 0.82rem; color: #6b7280; }
    .stat-val   { font-size: 0.9rem; font-weight: 600; color: #111; }
    .stat-val.green { color: #16a34a; }
    .stat-val.red   { color: #dc2626; }

    .inner-divider {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #d1d5db;
      padding: 10px 0 5px; border-top: 1px solid #f3f4f6; margin-top: 4px;
    }

    /* ── Membership scroll ──────────────────────────────────── */
    .membership-scroll {
      overflow-y: auto; max-height: 260px;
      margin-top: 4px;
    }
    .membership-scroll::-webkit-scrollbar { width: 4px; }
    .membership-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    /* ── P&L ────────────────────────────────────────────────── */
    .pl-sub .stat-label { padding-left: 10px; color: #9ca3af; }
    .pl-sub .stat-val   { color: #374151; font-weight: 500; }
    .pl-highlight .stat-label { color: #111; font-weight: 700; }
    .pl-highlight .stat-val   { font-size: 0.95rem; font-weight: 700; color: #111; }
    .pl-highlight .stat-val.green { color: #16a34a; }
    .pl-highlight .stat-val.red   { color: #dc2626; }

    /* ── Task list ──────────────────────────────────────────── */
    .task-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }
    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #f3f4f6;
    }
    .task-item:last-child { border-bottom: none; }
    .task-bar {
      width: 3px; border-radius: 2px; align-self: stretch;
      flex-shrink: 0; min-height: 32px; background: #e5e7eb;
    }
    .task-bar.overdue { background: #dc2626; }
    .task-bar.today   { background: #d97706; }
    .task-bar.soon    { background: #7c3aed; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 0.88rem; color: #1f2937; line-height: 1.35; }
    .task-name a { color: #1f2937; text-decoration: none; }
    .task-name a:hover { color: #7c3aed; }
    .task-footer { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
    .task-proj {
      font-size: 0.7rem; color: #9ca3af;
      background: #f3f4f6; padding: 1px 7px; border-radius: 3px;
    }
    .task-due { font-size: 0.72rem; font-weight: 600; }
    .task-due.overdue { color: #dc2626; }
    .task-due.today   { color: #d97706; }
    .task-due.soon    { color: #7c3aed; }
    .task-due.later   { color: #d1d5db; }

    /* ── Action plan table ──────────────────────────────────── */
    .ap-wrap { overflow-x: auto; }
    .ap-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .ap-table th {
      text-align: left; padding: 7px 12px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #bbb; border-bottom: 1px solid #f0f0f5;
    }
    .ap-table td {
      padding: 10px 12px; border-bottom: 1px solid #f9f9fc;
      color: #374151; vertical-align: top;
    }
    .ap-table tr:last-child td { border-bottom: none; }
    .ap-table tr:hover td { background: #fafafa; }
    .ap-table td:first-child { color: #111; font-weight: 500; font-size: 0.85rem; }
    .ap-owner {
      display: inline-block; font-size: 0.7rem;
      background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #6b7280;
    }
    .ap-deadline { font-size: 0.78rem; color: #6b7280; }
    .ap-done { color: #16a34a; font-weight: 700; font-size: 1rem; }
    .ap-todo { color: #e5e7eb; font-size: 1rem; }
    .ap-btn {
      border: none; border-radius: 6px; padding: 4px 10px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .ap-btn:disabled { opacity: .5; cursor: wait; }
    .ap-btn-done { background: #dcfce7; color: #16a34a; }
    .ap-btn-todo { background: #f3f4f6; color: #9ca3af; }
    .ap-btn-todo:hover { background: #e0e7ff; color: #4f46e5; }

    /* ── Mini table (marketing) ─────────────────────────────── */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 2px; }
    .mini-table th {
      text-align: left; padding: 5px 0; color: #bbb;
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid #f0f0f5;
    }
    .mini-table td { padding: 7px 0; border-bottom: 1px solid #f9f9fc; color: #6b7280; }
    .mini-table tr:last-child td { border-bottom: none; }
    .mini-table td:first-child { color: #374151; font-weight: 500; }
    .mini-table .total td { color: #111; font-weight: 700; border-top: 2px solid #f0f0f5; }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(30,10,60,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 24px 28px;
      min-width: 300px; max-width: 420px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; color: #111; margin-bottom: 14px; }
    .modal-list { list-style: none; }
    .modal-list li {
      padding: 8px 0; border-bottom: 1px solid #f3f4f6;
      font-size: 0.88rem; color: #374151;
    }
    .modal-list li:last-child { border-bottom: none; }
    .modal-close {
      margin-top: 18px; width: 100%; padding: 9px;
      background: #2d1b4e; color: #fff; border: none;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
    }
    .modal-close:hover { background: #3d2464; }

    @media (max-width: 960px) {
      .col-3, .col-4, .col-6, .col-8 { grid-column: span 12; }
    }
  </style>
</head>
<body>

<!-- Member names modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">Members</h3>
    <ul class="modal-list" id="modal-list"></ul>
    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">
      <button id="modal-task-done" style="display:none;flex:1;align-items:center;justify-content:center;padding:9px;background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer">✓ Mark Done</button>
      <a id="modal-asana-link" href="#" target="_blank" style="display:none;flex:1;align-items:center;justify-content:center;padding:9px;background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe;border-radius:8px;font-size:.85rem;font-weight:600;text-decoration:none">Open in Asana ↗</a>
      <button class="modal-close" style="flex:1;margin-top:0" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-mark">F</div>
    <span class="logo-text">Forge Dashboard</span>
  </div>
  <span class="header-meta" id="gen-time">Loading…</span>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('home',this)">Home</button>
  <button class="tab-btn" onclick="switchTab('finances',this)">Finances</button>
  <button class="tab-btn" onclick="switchTab('members',this)">Members</button>
  <button class="tab-btn" onclick="switchTab('retention',this)">Retention</button>
  <button class="tab-btn" onclick="switchTab('jumpstart',this)">Jumpstart</button>
  <button class="tab-btn" onclick="switchTab('leads',this)">Leads</button>
  <button class="tab-btn" onclick="switchTab('growth',this)">Growth</button>
  <button class="tab-btn" onclick="switchTab('staff',this)">Staff</button>
  <button class="tab-btn" onclick="switchTab('sop',this)">SOPs</button>
</div>

<div class="tab-panel active" id="tab-home">
  <div class="grid" id="grid-home"><div class="card col-12"><p style="color:#aaa;font-size:.9rem;padding:8px 0">Loading…</p></div></div>
</div>
<div class="tab-panel" id="tab-finances">
  <div class="grid" id="grid-finances"></div>
</div>
<div class="tab-panel" id="tab-members">
  <div class="grid" id="grid-members"></div>
</div>
<div class="tab-panel" id="tab-retention">
  <div class="grid" id="grid-retention"></div>
</div>
<div class="tab-panel" id="tab-jumpstart">
  <div class="grid" id="grid-jumpstart"></div>
</div>
<div class="tab-panel" id="tab-leads">
  <div class="grid" id="grid-leads"></div>
</div>
<div class="tab-panel" id="tab-growth">
  <div class="grid" id="grid-growth"></div>
</div>
<div class="tab-panel" id="tab-staff">
  <div class="grid" id="grid-staff"></div>
</div>
<div class="tab-panel" id="tab-sop">
  <div class="grid" id="grid-sop"></div>
</div>

<script>
// ── Local persistence (survives refreshes, per browser) ───────
function lsGet(key, def) { try { const v = localStorage.getItem(key); return v == null ? def : JSON.parse(v); } catch (e) { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }
const fmtShort = iso => { if(!iso) return ""; const d = new Date(iso + (iso.length<=10?"T12:00:00":"")); return d.toLocaleDateString("en-IE",{day:"numeric",month:"short"}); };

// ── At-Risk: contacted / resolved ─────────────────────────────
// Shared across machines/users via a Google Apps Script store (data.atrisk_url).
// Falls back to this browser's localStorage when no shared URL is configured.
window._atRiskData = [];
window._atRiskUrl = "";
window._atRiskState = {};   // { "<name lower>": {contactedBy, contactedDate, resolved, resolvedDate} }
function _atKey(name){ return "atrisk:" + (name||"").toLowerCase(); }
function _atLower(name){ return (name||"").toLowerCase(); }
// Read a member's state: shared store first, else local
function atState(name) {
  if (window._atRiskUrl) return window._atRiskState[_atLower(name)] || {};
  return lsGet(_atKey(name), {});
}
// Persist a member's state to whichever store is active
async function atSave(name, s) {
  const key = _atLower(name);
  if (window._atRiskUrl) {
    window._atRiskState[key] = s;
    try {
      await fetch(window._atRiskUrl, { method: "POST",
        body: JSON.stringify({ type: "atrisk", name: key, state: s }) });
    } catch (e) { /* optimistic; will reconcile on next load */ }
  } else {
    lsSet(_atKey(name), s);
  }
}
// Load the whole shared state map once at startup
async function loadAtRiskState() {
  if (!window._atRiskUrl) return;
  try {
    const res = await fetch(window._atRiskUrl + (window._atRiskUrl.includes("?") ? "&" : "?") + "type=atrisk");
    const json = await res.json();
    if (json && typeof json === "object") window._atRiskState = json.state || json || {};
  } catch (e) { /* keep whatever we have */ }
}
async function markContacted(name) {
  const who = (prompt("Who contacted " + name + "? (e.g. Grace, JoJo, Eilis, Sarah)", "Grace") || "").trim();
  if (!who) return;
  const s = { ...atState(name), contactedBy: who, contactedDate: new Date().toISOString().slice(0,10) };
  await atSave(name, s); renderAtRisk();
}
async function markResolved(name) {
  const s = { ...atState(name), resolved: true, resolvedDate: new Date().toISOString().slice(0,10) };
  await atSave(name, s); renderAtRisk();
}
async function undoAtRisk(name) { await atSave(name, {}); renderAtRisk(); }
function renderAtRisk() {
  const body = document.getElementById("atRiskBody");
  const count = document.getElementById("atRiskCount");
  if (!body) return;
  const rows = (window._atRiskData || []).filter(m => !(atState(m.name).resolved));
  if (count) count.textContent = rows.length + " absent 10+ days";
  if (!rows.length) { body.innerHTML = `<p style="color:#16a34a;font-size:.88rem;padding:8px 0">No at-risk members right now 🎉</p>`; return; }
  body.innerHTML = rows.map(m => {
    const s = atState(m.name);
    const nm = (m.name||"").replace(/'/g,"\\'");
    const contacted = s.contactedBy
      ? `<div style="font-size:.7rem;color:#059669;margin-top:2px">✓ Contacted by ${s.contactedBy} · ${fmtShort(s.contactedDate)}</div>`
      : "";
    const actions = s.contactedBy
      ? `<button onclick="markResolved('${nm}')" style="font-size:.66rem;font-weight:600;color:#059669;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:4px 8px;cursor:pointer;white-space:nowrap">No longer at risk</button>`

    const lastSess = m.last_seen
      ? `Last session ${fmtShort(m.last_seen)}${m.days_absent != null ? ` · ${m.days_absent}d ago` : ""}`
      : "No session on record";
    const outreach = m.outreach
      ? `<div style="font-size:.72rem;color:#7c3aed;margin-top:4px;display:flex;gap:5px"><span>💡</span><span>${m.outreach}</span></div>`
      : "";
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:#fafafa;border:1px solid #f0f0f5;border-radius:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:.85rem;font-weight:600;color:#111">${m.name}</div>

        ${outreach}
        ${contacted}
      </div>

  }).join("");
}

// ── Member directory: manual goal (stored locally) ────────────
function addGoal(name) {
  const g = (prompt("Goal for " + name + ":", "") || "").trim();
  if (!g) return;
  lsSet("goal:" + name.toLowerCase(), g);
  const cell = document.querySelector(`.goal-cell[data-name="${name.toLowerCase()}"]`);
  if (cell) { cell.textContent = g; cell.title = g; }
}
function goalCellHtml(name, goal) {
  const manual = lsGet("goal:" + (name||"").toLowerCase(), "");
  const g = goal || manual;
  if (g) return `<span class="goal-cell" data-name="${(name||'').toLowerCase()}" title="${g.replace(/"/g,'&quot;')}">${g.substring(0,60)}${g.length>60?"…":""}</span>`;
  return `<span class="goal-cell" data-name="${(name||'').toLowerCase()}"></span><button onclick="addGoal('${(name||'').replace(/'/g,"\\'")}')" style="font-size:.66rem;color:#7c3aed;background:none;border:1px dashed #ddd6fe;border-radius:6px;padding:2px 8px;cursor:pointer">＋ Add goal</button>`;
}

// ── Lapsed/cancelled card: filter by month chip or search text ──
function filterLapsed(id, month, q) {
  const wrap = document.getElementById(id + "-rows");
  if (!wrap) return;
  if (month != null) {
    filterLapsed._month = filterLapsed._month || {};
    filterLapsed._month[id] = month;
    const s = document.getElementById(id + "-search"); if (s) s.value = "";
    document.querySelectorAll(`#${id}-chips button`).forEach(b => {
      const on = (b.getAttribute("data-month") || "") === (month || "");
      b.style.background = on ? "#7c3aed" : (b.getAttribute("data-month") ? "#f7f7fb" : "#f5f3ff");
      b.style.color = on ? "#fff" : (b.getAttribute("data-month") ? "#6b7280" : "#7c3aed");
    });
  }
  const text = (q || "").toLowerCase().trim();
  // Typing searches across all months — reset the month filter so results aren't hidden.
  if (text) {
    filterLapsed._month = filterLapsed._month || {}; filterLapsed._month[id] = "";
    document.querySelectorAll(`#${id}-chips button`).forEach(b => {
      const isAll = !b.getAttribute("data-month");
      b.style.background = isAll ? "#f5f3ff" : "#f7f7fb";
      b.style.color = isAll ? "#7c3aed" : "#6b7280";
    });
  }
  const activeMonth = (filterLapsed._month && filterLapsed._month[id]) || "";
  wrap.querySelectorAll(".lapsed-row").forEach(row => {
    const okMonth = !activeMonth || row.getAttribute("data-month") === activeMonth;
    const okText  = !text || row.getAttribute("data-name").includes(text) ||
      (row.getAttribute("data-monthlabel") || "").includes(text);
    row.style.display = (okMonth && okText) ? "" : "none";
  });
}

// ── Member directory search ───────────────────────────────────
function filterMembers(q) {
  q = (q || "").toLowerCase().trim();
  document.querySelectorAll("#memberTableBody .member-row").forEach(row => {
    row.style.display = row.getAttribute("data-name").includes(q) ? "" : "none";
  });
}

// ── Modal ─────────────────────────────────────────────────────
function showModal(title, members) {
  document.getElementById("modal-title").textContent = title;
  const list = document.getElementById("modal-list");
  list.innerHTML = members.length
    ? members.map(m => `<li>${m.name}</li>`).join("")
    : "<li style='color:#aaa'>None</li>";
  document.getElementById("modal-task-done").style.display = "none";
  document.getElementById("modal-asana-link").style.display = "none";
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(e) {
  if (!e || e.target === document.getElementById("modal-overlay")) {
    document.getElementById("modal-overlay").classList.remove("open");
  }
}

function showAdviceModal(i) {
  const item = (window._growthAdvice || [])[i] || {};
  const action = item.action || "";
  const advice = item.advice || "";
  document.getElementById("modal-title").innerHTML =
    `<span style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7c3aed;display:block;margin-bottom:6px">Strategy Advice ✦</span>${action}`;
  const list = document.getElementById("modal-list");
  if (advice) {
    // Render bullet points (lines starting with • or - or *)
    const lines = advice.split("\n").map(l => l.trim()).filter(Boolean);
    list.innerHTML = lines.map(l => {
      const isBullet = /^[•\-\*]/.test(l);
      const text = l.replace(/^[•\-\*]\s*/, "");
      return isBullet
        ? `<li style="padding:7px 0;border-bottom:1px solid #f3f4f6;line-height:1.55;color:#1f2937;display:flex;gap:8px">
             <span style="color:#7c3aed;flex-shrink:0;font-size:.9rem;margin-top:1px">▸</span>
             <span>${text}</span>
           </li>`
        : `<li style="padding:5px 0;border-bottom:1px solid #f9f9fc;line-height:1.5;color:#6b7280;font-size:.82rem;list-style:none">${l}</li>`;
    }).join("");
  } else {
    list.innerHTML = "<li style='color:#aaa;padding:8px 0'>No advice generated yet — run the workflow to generate AI strategy advice.</li>";
  }
  document.getElementById("modal-task-done").style.display = "none";
  document.getElementById("modal-asana-link").style.display = "none";
  document.getElementById("modal-overlay").classList.add("open");
}

// ── Data ──────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch("./data/data.json?t=" + Date.now());
  return res.json();
}

function fmt(val, prefix = "") {
  if (val === null || val === undefined) return `<span style="color:#ddd">—</span>`;
  if (typeof val === "number") return `${prefix}${val.toLocaleString("en-IE", { maximumFractionDigits: 0 })}`;
  return val;
}
function fmtGbp(val) { return fmt(val, "£"); }
function fmtDate(iso) {
  if (!iso) return null;
  const [, m, d] = iso.split("-");
  return `${parseInt(d)} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)-1]}`;
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}
// Jump to a tab from the Today hub (finds the matching tab button)
function goTab(name) {
  const btn = [...document.querySelectorAll(".tab-btn")]
    .find(b => (b.getAttribute("onclick") || "").includes(`switchTab('${name}'`));
  if (btn) { switchTab(name, btn); window.scrollTo({ top: 0, behavior: "smooth" }); }
}

  // ── "Today" hub — the single most urgent thing from every tab ──
  (function todayHub() {
    const items = [];

    if (mentions) items.push({ sev: 1, tab: "home", icon: "@", label: `${mentions} Slack mention${mentions>1?"s":""} of you`, detail: "" });

    // New enquiries waiting
    const enq = (briefH.enquiries || []).length;
    if (enq) items.push({ sev: 2, tab: "leads", icon: "🌱", label: `${enq} new enquir${enq>1?"ies":"y"} to follow up`, detail: (briefH.enquiries||[]).slice(0,2).map(e=>e.name).join(", ") });

    items.sort((a,b) => a.sev - b.sev);
    const sevColor = s => s===1 ? "#ef4444" : s===2 ? "#d97706" : "#7c3aed";
    const sevBg    = s => s===1 ? "#fef2f2" : s===2 ? "#fffbeb" : "#f5f3ff";

          ${it.detail ? `<span style="display:block;font-size:.74rem;color:#8a8a8a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.detail}</span>` : ""}
        </span>

    push("home", `

  // ── Daily Brief ────────────────────────────────────────────
  const br = data.brief || {};

    const urgent    = Array.isArray(br.urgent)    ? br.urgent    : [];
    const important = Array.isArray(br.important) ? br.important : [];
    const enquiries = Array.isArray(br.enquiries) ? br.enquiries : [];
    const ghl       = Array.isArray(data.ghl)     ? data.ghl     : [];

    // Calendar column

    cal.forEach(e => { (calByDay[e.day || "Upcoming"] = calByDay[e.day || "Upcoming"] || []).push(e); });

            </div>`).join("")}`).join("")
      : calErr
        ? `<div class="brief-empty" style="color:#d97706;line-height:1.5">Calendar not connected. Share your Google Calendar with<br><strong style="color:#7c3aed">forge-dashboard@forge-dashboard-473821.iam.gserviceaccount.com</strong><br>(“See all event details”), then it’ll appear here.</div>`
        : `<div class="brief-empty">Nothing in the next 2 days</div>`;

    // Urgent email column — merged with important
    const allEmails = [
      ...urgent.map(e => ({...e, _type:"urgent"})),
      ...important.filter(e => !urgent.find(u => u.id === e.id)).map(e => ({...e, _type:"important"}))
    ];
    const gmailUrl = (e) => {
      // If a draft was created, open the thread (draft shows inline at bottom)
      const id = e.thread_id || e.id;
      return id ? `https://mail.google.com/mail/u/0/#inbox/${id}` : "https://mail.google.com/mail/u/0/#inbox";
    };
    const emailHtml = allEmails.length
      ? allEmails.map(e => `

          </a>`).join("")
      : `<div class="brief-empty">All clear</div>`;

    const enquiryHtml = enquiries.length

  // ── helpers ──────────────────────────────────────────────────
  function fmtDateShort(iso) {
    if (!iso) return "—";
    const d = new Date(iso + "T12:00:00");
    return d.toLocaleDateString("en-IE", { day:"numeric", month:"short" });
  }

  // Members-page section divider helper
  const memberSection = (label) => push("members", `<div class="sec-divider"><span class="sec-label">${label}</span><span class="sec-line"></span></div>`);

  // ══ RETENTION TAB ═════════════════════════════════════════════
  (function retentionTab() {
    const pausedNames = new Set((data.jumpstart?.paused || []).map(m => (m.name||"").toLowerCase()));
    window._atRiskData = (tm.at_risk || []).filter(m => !pausedNames.has((m.name||"").toLowerCase()));
    window._atRiskUrl  = data.atrisk_url || "";

    // Build monthly series from the KPI sheet (oldest → newest)
    const kMonths = [...((data.kpi && data.kpi.months) || [])].reverse();
    const kMetric = (mo, name) => {
      for (const cat of (mo.categories || []))
        for (const it of (cat.items || []))
          if ((it.name||"").toLowerCase().startsWith(name.toLowerCase())) return it.value;
      return "";
    };
    const numify = v => { const n = parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n) ? null : n; };
    const activeSeries = kMonths.map(mo => ({ label: mo.period, v: numify(kMetric(mo, "Active Clients")) }));
    const churnSeries  = kMonths.map(mo => ({ label: mo.period, v: numify(kMetric(mo, "Attrition")) }));

    const miniBars = (series, colour, suffix) => {
      const vals = series.filter(s => s.v != null);
      if (!vals.length) return `<div class="brief-empty" style="padding:8px 0">No monthly data in the KPI sheet yet</div>`;
      const max = Math.max(...vals.map(s => s.v)) || 1;
      return `<div style="display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px">
        ${series.map(s => {
          const h = s.v == null ? 0 : Math.max(4, Math.round(s.v / max * 108));
          const mth = (s.label||"").split(" ")[0].slice(0,3);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
            <div style="font-size:.6rem;font-weight:700;color:#374151">${s.v == null ? "" : (Math.round(s.v*10)/10)+(suffix||"")}</div>
            <div style="width:100%;height:${h}px;background:${colour};border-radius:4px 4px 0 0"></div>
            <div style="font-size:.58rem;color:#9ca3af">${mth}</div>
          </div>`;
        }).join("")}
      </div>`;
    };

    const curActive = [...activeSeries].reverse().find(s => s.v != null);
    const curChurn  = [...churnSeries].reverse().find(s => s.v != null);

    push("retention", `<div class="sec-divider"><span class="sec-label">Retention Health</span><span class="sec-line"></span></div>`);
    push("retention", `
      <div class="card col-6">
        <div class="card-title">Members</div>
        <div class="card-headline">Active Member Trend</div>
        <div class="big-kpi" style="margin:4px 0"><div class="number">${curActive ? Math.round(curActive.v) : (tm.total_members ?? "—")}</div><div class="sublabel">Active members now</div></div>
        ${miniBars(activeSeries, "#7c3aed", "")}
        <div style="font-size:.66rem;color:#c4b5fd;margin-top:8px">From the monthly KPI sheet (Active Clients)</div>
      </div>`);
    push("retention", `
      <div class="card col-6">
        <div class="card-title">Churn</div>
        <div class="card-headline">Churn Rate Over Time</div>
        <div class="big-kpi" style="margin:4px 0"><div class="number">${curChurn != null ? curChurn.v + "%" : (tm.churn_rate ?? "—") + "%"}</div><div class="sublabel">Latest monthly attrition</div></div>
        ${miniBars(churnSeries, "#ef4444", "%")}
        <div style="font-size:.66rem;color:#c4b5fd;margin-top:8px">From the monthly KPI sheet (Attrition/Churn %)</div>
      </div>`);

    // At-risk members with per-member outreach action (AI retention agent)
    push("retention", `<div class="sec-divider"><span class="sec-label">At-Risk Members</span><span class="sec-line"></span></div>`);
    push("retention", `
      <div class="card col-12" style="margin-top:4px">
        <div class="card-title">Retention agent</div>
        <div class="card-headline" style="display:flex;align-items:center;justify-content:space-between">
          Members at risk — reach out
          <span id="atRiskCount" style="font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:12px;background:#fef2f2;color:#ef4444"></span>
        </div>
        <div id="atRiskBody" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:6px;max-height:420px;overflow-y:auto"></div>
        <div style="font-size:.66rem;color:#c4b5fd;margin-top:8px">Flagged after 10+ days with no class/PT. Tick “Mark contacted” when a coach reaches out, then “No longer at risk” to clear them — synced across all coaches.</div>
      </div>`);
  })();

  // ── ACTIVE FULL MEMBERS ───────────────────────────────────────
  memberSection("Active Full Members");

  // ── Member Directory ──────────────────────────────────────────
  const memberRows = tm.member_list || [];
  // Goal fallback from Jumpstart onboarding (by name)
  const jsAll = [...(data.jumpstart?.active||[]), ...(data.jumpstart?.recent||[]), ...(data.jumpstart?.paused||[])];
  const goalByName = {};
  jsAll.forEach(m => { if (m.name && m.goal) goalByName[m.name.toLowerCase()] = m.goal; });
  // Match check-ins + lifestyle-form goals to members by EMAIL
  const checkinByEmail = (data.brief?.checkins?.by_email) || {};
  const goalByEmail    = (data.brief?.goals?.by_email) || {};
  const lastCheckin = em => checkinByEmail[(em||"").toLowerCase()] || null;
  const goalFor = (em, nm) => goalByEmail[(em||"").toLowerCase()] || goalByName[(nm||"").toLowerCase()] || "";
  // Last InBody scan by normalised member name
  const inbodyScans = (data.inbody?.scans && data.inbody.scans.length) ? data.inbody.scans : (tm.inbody_scans || []);
  const inbodyByNorm = {};
  inbodyScans.forEach(s => { if (s.name && s.last_scan) inbodyByNorm[(s.name||"").toLowerCase().replace(/[^a-z]/g,"")] = s; });
  const lastInbody = nm => {
    const norm = (nm||"").toLowerCase().replace(/[^a-z]/g,"");
    if (inbodyByNorm[norm]) return inbodyByNorm[norm];
    const hit = Object.keys(inbodyByNorm).find(k => k && norm.length > 4 && (k.includes(norm) || norm.includes(k)));
    return hit ? inbodyByNorm[hit] : null;
  };
  // Cell: last scan date + next-due status (overdue / soon / date)
  const inbodyCell = nm => {
    const s = lastInbody(nm);
    if (!s) return `<span style="color:#9ca3af">—</span>`;
    const last = fmtDateShort(s.last_scan);
    let due;
    if (s.overdue)               due = `<span style="color:#ef4444;font-weight:600">${Math.abs(s.days_to_due)}d overdue</span>`;
    else if (s.days_to_due <= 7) due = `<span style="color:#d97706;font-weight:600">due soon</span>`;
    else if (s.next_due)         due = `<span style="color:#9ca3af">due ${fmtDateShort(s.next_due)}</span>`;
    else                         due = "";
    return `<div>${last}</div><div style="font-size:.7rem;margin-top:1px">${due}</div>`;
  };
  push("members", `
    <div class="card col-12" style="margin-top:4px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div class="card-title">Members</div>
          <div class="card-headline" style="margin-bottom:0">Member Directory ${memberRows.length ? `<span style="font-size:.72rem;font-weight:600;color:#9ca3af">${memberRows.length}</span>` : ""}</div>
        </div>
        <input id="memberSearch" placeholder="Search…" oninput="filterMembers(this.value)"
          style="font-size:.82rem;padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;outline:none">
      </div>
      ${memberRows.length ? `
        <div style="overflow-x:auto;overflow-y:auto;max-height:600px;margin-top:12px">
          <table style="width:100%;border-collapse:collapse;font-size:.82rem;min-width:920px">
            <thead>
              <tr style="font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:#bbb;position:sticky;top:0;background:#fff">
                <th style="text-align:left;padding:6px 10px 6px 0;border-bottom:2px solid #f0f0f5">Member</th>
                <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #f0f0f5">Joined</th>
                <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #f0f0f5">Membership</th>
                <th style="text-align:right;padding:6px 10px;border-bottom:2px solid #f0f0f5">Classes</th>
                <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #f0f0f5">Last check-in</th>
                <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #f0f0f5">Last InBody / due</th>
                <th style="text-align:left;padding:6px 10px;border-bottom:2px solid #f0f0f5">Last momentum</th>
                <th style="text-align:left;padding:6px 0 6px 10px;border-bottom:2px solid #f0f0f5">Goal</th>
              </tr>
            </thead>
            <tbody id="memberTableBody">
              ${memberRows.map(m => {
                const goal = goalFor(m.email, m.name);
                const ci = lastCheckin(m.email);
                return `<tr class="member-row" data-name="${(m.name||'').toLowerCase()}">
                  <td style="padding:8px 10px 8px 0;border-bottom:1px solid #f9f9fc;font-weight:600;color:#111">${m.name}</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc;color:#6b7280">${fmtDateShort(m.join_date)}</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc"><span class="pill purple" style="cursor:default;font-size:.7rem">${m.membership||"—"}</span></td>
                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc;text-align:right;font-weight:700;color:#7c3aed">${m.class_count ?? "—"}</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc;color:#6b7280">${ci ? fmtDateShort(ci) : "—"}</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc;color:#6b7280">${inbodyCell(m.name)}</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc;color:#6b7280">${m.last_momentum ? fmtDateShort(m.last_momentum) : "—"}</td>
                  <td style="padding:8px 0 8px 10px;border-bottom:1px solid #f9f9fc;color:#6b7280;max-width:260px" title="${(goal||'').replace(/"/g,'&quot;')}">${goalCellHtml(m.name, goal)}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
        <div style="font-size:.68rem;color:#c4b5fd;margin-top:8px">Full members only (trials excluded) · Check-in from “Client Reflection” emails · Goal from “New Member Lifestyle Form” — matched by email</div>
      ` : `<p style="color:#ccc;font-size:.85rem;padding:8px 0">No member data yet.</p>`}
    </div>
  `);

  // ── MEMBER MILESTONES ─────────────────────────────────────────
  memberSection("Member Milestones");
  const celeb    = tm.celebrations || {};
  const firstWk  = celeb.first_week  || [];
  const newFull  = celeb.new_members || [];
  const tenure   = celeb.tenure      || [];
  const clsMs    = tm.class_milestones || [];
  const celebRow = (name, sub, pill, pillClass) => `
    <div class="stat-row">
      <div style="min-width:0">
        <div style="font-size:.85rem;font-weight:600;color:#111">${name}</div>
        <div style="font-size:.72rem;color:#aaa">${sub}</div>
      </div>
      <span class="pill ${pillClass}" style="cursor:default;white-space:nowrap">${pill}</span>
    </div>`;
  const anyCeleb = firstWk.length || newFull.length || tenure.length;
  push("members", `
    <div class="card col-9">
      <div class="card-title">Milestones</div>
      <div class="card-headline">Member Celebrations</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px">
        ${newFull.length ? `<div>
          <div class="inner-divider" style="margin-top:0;padding-top:0;border-top:none">Just joined as a full member</div>
          ${newFull.map(m => celebRow(m.name, `Started ${fmtDateShort(m.start_date)}`, "⭐ New member!", "green")).join("")}
        </div>` : ""}
        ${firstWk.length ? `<div>
          <div class="inner-divider" style="margin-top:0;padding-top:0;border-top:none">First week (Jumpstart)</div>
          ${firstWk.map(m => celebRow(m.name, `Day ${m.days_in} of week 1`, "🎉 1st week!", "green")).join("")}
        </div>` : ""}
        ${tenure.length ? `<div>
          <div class="inner-divider" style="margin-top:0;padding-top:0;border-top:none">Anniversaries</div>
          ${tenure.map(m => {
            const when = m.days_until > 0 ? `in ${m.days_until}d` : m.days_until === 0 ? "today" : `${-m.days_until}d ago`;
            return celebRow(m.name, `Joined ${fmtDateShort(m.start_date)}`, `🏆 ${m.label} (${when})`, "purple");
          }).join("")}
        </div>` : ""}
      </div>
      ${!anyCeleb ? `<div class="brief-empty" style="padding:6px 0">No celebrations today</div>` : ""}
    </div>
  `);

  // ── Class Count Milestones (beside Member Celebrations) ───────
  push("members", `
    <div class="card col-3">
      <div class="card-title">Milestones</div>
      <div class="card-headline">Approaching a Class Milestone</div>
      ${clsMs.length ? clsMs.map(m => celebRow(
          m.name,
          `${m.total_classes} classes done`,
          `${m.classes_away} to ${m.next_milestone}`,
          "purple"
        )).join("")
        : `<div class="brief-empty" style="padding:6px 0">No one within reach of 50 / 250 / 500 right now</div>`}
      <div style="font-size:.68rem;color:#c4b5fd;margin-top:10px">Counts attended classes + past bookings, to match TeamUp's overall total</div>
    </div>
  `);

  // ── MEMBER DATA ───────────────────────────────────────────────
  memberSection("Member Data");

  // ── Membership Snapshot ───────────────────────────────────────
  push("members", `
    <div class="card col-3">
      <div class="card-title">Members</div>
      <div class="card-headline">Membership Snapshot</div>
      <div class="big-kpi">
        <div class="number">${tm.total_members ?? "—"}</div>
        <div class="sublabel">Active members</div>
      </div>
      <div class="pill-row">
        ${tm.recurring != null ? `<div class="pill green" onclick="showModal('Recurring Members',window._members.recurring)" style="cursor:pointer">${tm.recurring} Recurring ↗</div>` : ""}
        ${tm.trial     != null ? `<div class="pill amber" onclick="showModal('Jumpstart Members',window._members.trial)" style="cursor:pointer">${tm.trial} Jumpstart ↗</div>` : ""}
        ${(tm.cancellations_this_month||0) > 0
          ? `<div class="pill red" onclick="showModal('Pending Cancellations',window._members.leaving)">${tm.cancellations_this_month} Leaving ↗</div>`
          : `<div class="pill grey">0 Leaving</div>`}
        ${(tm.paused||0) > 0
          ? `<div class="pill grey" onclick="showModal('Paused Members',window._members.paused)">${tm.paused} Paused ↗</div>`
          : ""}
        ${(tm.cancelled_last_month||0) > 0
          ? `<div class="pill purple" onclick="showModal('Cancelled Last Month',window._members.cancelled)">${tm.cancelled_last_month} Cancelled ↗</div>`
          : ""}
      </div>
      <div class="stat-row">
        <span class="stat-label">Joined this month</span>
        <span class="stat-val green">+${fmt(tm.new_this_month)}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Monthly churn rate</span>
        <span class="stat-val ${(tm.churn_rate||0) > 5 ? 'red' : 'green'}">${tm.churn_rate != null ? tm.churn_rate + "%" : "—"}</span>
      </div>
      <div class="inner-divider">By membership type</div>
      <div class="membership-scroll">
        ${(tm.breakdown || []).map(b => {
          return `<div class="stat-row" onclick="showModal('${b.name.replace(/'/g,"\\'")}',window._members['bd_${b.name.replace(/[^a-z0-9]/gi,"_")}'])" style="cursor:pointer">
            <span class="stat-label">${b.name}</span>
            <span class="stat-val" style="display:flex;align-items:center;gap:6px">${b.count} <span style="font-size:.65rem;color:#c4b5fd">↗</span></span>
          </div>`;
        }).join("")}
      </div>
    </div>
  `);

  // ── Churn & Cancellations (YTD total + month-to-month) ────────
  // Monthly churn comes from the KPI sheet's Attrition % (real tracked data).
  const kpiMonthsForChurn = (data.kpi?.months || []);
  const churnSeries = kpiMonthsForChurn.map(mo => {
    let v = "";
    (mo.categories || []).forEach(c => c.items.forEach(it => {
      if ((it.name||"").toLowerCase().includes("churn") || (it.name||"").toLowerCase().includes("attrition")) v = it.value;
    }));
    const num = parseFloat((v||"").replace("%","")) || 0;
    return { month: mo.period, value: v || "—", num };
  }).slice(0, 8).reverse();   // oldest → newest, last 8
  const maxChurn = Math.max(...churnSeries.map(c => c.num), 1);
  push("members", `
    <div class="card col-4">
      <div class="card-title">Retention</div>
      <div class="card-headline">Churn & Cancellations</div>
      <div style="display:flex;gap:10px;margin-bottom:14px">
        <div style="flex:1;background:#fafafa;border:1px solid #f0f0f5;border-radius:10px;padding:12px 14px">
          <div style="font-size:1.6rem;font-weight:800;color:#dc2626;letter-spacing:-.02em">${tm.cancelled_ytd ?? "—"}</div>
          <div style="font-size:.65rem;color:#9ca3af;font-weight:600;text-transform:uppercase">Cancellations · year to date</div>
        </div>
        <div style="flex:1;background:#fafafa;border:1px solid #f0f0f5;border-radius:10px;padding:12px 14px">
          <div style="font-size:1.6rem;font-weight:800;color:${(tm.churn_rate||0)>3?'#dc2626':'#059669'};letter-spacing:-.02em">${tm.churn_rate != null ? tm.churn_rate + "%" : "—"}</div>
          <div style="font-size:.65rem;color:#9ca3af;font-weight:600;text-transform:uppercase">Current churn</div>
        </div>
      </div>
      ${churnSeries.length ? `
        <div class="inner-divider" style="margin-top:0;padding-top:0;border-top:none">Churn month to month</div>
        ${churnSeries.map(c => `
          <div style="display:flex;align-items:center;gap:8px;padding:3px 0">
            <div style="min-width:64px;font-size:.78rem;color:#374151">${c.month.split(" ")[0]}</div>
            <div style="flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden">
              <div style="height:100%;width:${Math.round(c.num/maxChurn*100)}%;background:${c.num>3?'#ef4444':'#f59e0b'};border-radius:4px"></div>
            </div>
            <div style="min-width:44px;text-align:right;font-size:.78rem;font-weight:700;color:${c.num>3?'#dc2626':'#6b7280'}">${c.value}</div>
          </div>`).join("")}
        <div style="font-size:.66rem;color:#c4b5fd;margin-top:8px">Monthly churn from your KPI sheet · target &lt;3%</div>
      ` : `<div class="brief-empty" style="padding:6px 0">No monthly churn data — check the KPI sheet</div>`}
    </div>
  `);

  // ── Paused Members ────────────────────────────────────────────
  const pausedMembers = tm.paused_members || [];
  push("members", `
    <div class="card col-4">
      <div class="card-title">Membership status</div>
      <div class="card-headline" style="display:flex;align-items:center;justify-content:space-between">
        Paused Members
        <span class="brief-chip ${pausedMembers.length ? 'chip-amber' : 'chip-green'}">${pausedMembers.length}</span>
      </div>
      ${pausedMembers.length ? `
        <div style="overflow-y:auto;max-height:360px">
          ${pausedMembers.map(m => `
            <div class="stat-row"><span style="font-size:.85rem;font-weight:600;color:#111">${m.name}</span>
              <span class="pill amber" style="cursor:default;font-size:.66rem">On hold</span></div>`).join("")}
        </div>` : `<p style="color:#16a34a;font-size:.85rem;padding:8px 0">No members on hold 🎉</p>`}
    </div>
  `);

  // ── LAPSED FULL MEMBERS / LAPSED TRIALS (one searchable card each) ─
  const monthNameYr = ym => new Date(ym + "-15").toLocaleDateString("en-IE", { month: "long", year: "numeric" });
  let _lapsedId = 0;
  const lapsedSearchCard = (groups, title, subtitle, chip, emptyMsg, col = "col-6") => {
    if (!groups.length) return `<div class="card ${col}"><div class="card-title">${title}</div><p style="color:#16a34a;font-size:.85rem;padding:4px 0">${emptyMsg}</p></div>`;
    const id = "lapsed" + (_lapsedId++);
    const total = groups.reduce((n, g) => n + g.members.length, 0);
    // newest month first
    const sorted = [...groups].sort((a, b) => b.month.localeCompare(a.month));
    const monthChips = sorted.map(g =>
      `<button onclick="filterLapsed('${id}','${g.month}')" data-month="${g.month}"
        style="font-size:.7rem;font-weight:600;color:#6b7280;background:#f7f7fb;border:1px solid #eee;border-radius:20px;padding:4px 11px;cursor:pointer">
        ${monthNameYr(g.month)} <strong style="color:#7c3aed">${g.members.length}</strong></button>`).join("");
    const rows = sorted.flatMap(g => g.members.map(m => `
      <div class="lapsed-row" data-month="${g.month}" data-monthlabel="${monthNameYr(g.month).toLowerCase()}" data-name="${(m.name||'').toLowerCase()}"
        style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #f6f6fa">
        <div style="min-width:0">
          <div style="font-size:.84rem;font-weight:600;color:#111">${m.name}</div>
          <div style="font-size:.7rem;color:#aaa">${m.membership || ""}</div>
        </div>
        <div style="text-align:right;white-space:nowrap">
          <span style="font-size:.72rem;color:#9ca3af">${fmtDateShort(m.end)}</span>
          <span class="brief-chip ${chip}" style="margin-left:6px">${monthNameYr(g.month).split(" ")[0].slice(0,3)}</span>
        </div>
      </div>`)).join("");
    return `
    <div class="card ${col}">
      <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div>
          <div class="card-title">${title}</div>
          <div class="card-headline" style="margin-bottom:0">${subtitle} <span style="font-size:.72rem;font-weight:600;color:#9ca3af">${total} in last year</span></div>
        </div>
        <input id="${id}-search" placeholder="Search name or month…" oninput="filterLapsed('${id}',null,this.value)"
          style="font-size:.82rem;padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;outline:none">
      </div>
      <div id="${id}-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 4px">
        <button onclick="filterLapsed('${id}','')" data-month=""
          style="font-size:.7rem;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:20px;padding:4px 11px;cursor:pointer">All</button>
        ${monthChips}
      </div>
      <div id="${id}-rows" style="overflow-y:auto;max-height:340px;margin-top:6px">${rows}</div>
    </div>`;
  };

  const lapsedFull   = tm.lapsed_full_by_month   || [];
  const lapsedTrials = tm.lapsed_trials_by_month || [];

      </div>
      <div class="stat-row pl-highlight" style="margin-top:6px;border-top:2px solid #f0f0f5;padding-top:8px">
        <span class="stat-label">LTV (price × months stayed)</span>
        <span class="stat-val green">${ltv ? fmtGbp(ltv) : "—"}</span>
      </div>

      ${recurringMembers > 0 ? `
        <div class="inner-divider">Recurring members fleet value</div>
        <div class="stat-row">
          <span class="stat-label">Total fleet LTV</span>
          <span class="stat-val green">${ltv ? fmtGbp(ltv * recurringMembers) : "—"}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Each new conversion worth</span>
          <span class="stat-val green">${ltv ? fmtGbp(ltv) : "—"} over their lifetime</span>
        </div>` : ""}
    </div>
  `);

  // ── Open Conversations ─────────────────────────────────────
  push("leads", `
    <div class="card col-12">
      <div class="card-title">Leads & Enquiries</div>
      <div class="card-headline">Open Conversations</div>
      ${Object.keys(sourceCounts).length ? `
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
          ${Object.entries(sourceCounts).map(([s,n]) => `<span class="brief-chip chip-amber">${n} via ${s}</span>`).join("")}
        </div>` : ""}
      ${allLeads.length ? `
        <div style="display:flex;flex-direction:column;gap:0">
          ${allLeads.map(l => `
            <div class="brief-row" style="align-items:center">
              <div class="brief-avatar" style="background:#fef9c3;color:#a16207">${(l.name||"?")[0].toUpperCase()}</div>
              <div style="min-width:0;flex:1">
                <div class="brief-row-title">${l.name} <span style="font-size:.68rem;color:#aaa;font-weight:400">${l.source}</span></div>
                <div class="brief-row-sub">${(l.message||"").substring(0,120)}</div>
              </div>
              ${l.age ? `<div style="font-size:.68rem;color:#ccc;white-space:nowrap">${l.age}</div>` : ""}
            </div>`).join("")}
        </div>` : `<p style="color:#ccc;font-size:.85rem">No open leads — set up Zapier to pull WhatsApp & webchat conversations here</p>`}
    </div>
  `);

  // ── Render each tab ─────────────────────────────────────────
  Object.entries(tabs).forEach(([tab, cards]) => {
    const grid = document.getElementById("grid-" + tab);
    if (grid) grid.innerHTML = cards.join("") || `<div class="card col-12"><p style="color:#ccc;font-size:.88rem;padding:8px 0">Nothing here yet</p></div>`;
  });
  if (typeof renderAtRisk === "function") {
    renderAtRisk();                                   // paint immediately
    loadAtRiskState().then(renderAtRisk);             // then reconcile with shared store
  }
}

function showTaskDetail(gid, name, notes, url, scriptUrl) {
  document.getElementById("modal-title").textContent = name;
  const list = document.getElementById("modal-list");
  const notesHtml = notes
    ? notes.replace(/\\n/g, "\n").split("\n").filter(l => l.trim())
        .map(l => `<li style="padding:5px 0;border-bottom:1px solid #f3f4f6;line-height:1.5">${l}</li>`).join("")
    : "<li style='color:#aaa;padding:8px 0'>No description</li>";
  list.innerHTML = notesHtml;

  const asanaLink = document.getElementById("modal-asana-link");
  asanaLink.href = url || "#";
  asanaLink.style.display = url ? "flex" : "none";

  const doneBtn = document.getElementById("modal-task-done");
  if (scriptUrl) {
    doneBtn.style.display = "flex";
    doneBtn.onclick = () => markTaskDone(gid, name, scriptUrl, doneBtn);
  } else {
    doneBtn.style.display = "none";
  }

  document.getElementById("modal-overlay").classList.add("open");
}

async function markTaskDone(gid, name, scriptUrl, btn) {
  btn.disabled = true;
  btn.textContent = "Marking done…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ task_gid: gid, completed: true }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    btn.textContent = "✓ Marked done!";
    btn.style.background = "#dcfce7";
    btn.style.color = "#16a34a";
    btn.style.borderColor = "#bbf7d0";
    // Remove task row from list
    document.querySelectorAll(".task-item").forEach(el => {
      if (el.textContent.includes(name.substring(0, 20))) el.style.opacity = "0.35";
    });
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
    btn.disabled = false;
  }
}

async function toggleDone(btn, action, markDone, scriptUrl) {
  btn.disabled = true;
  btn.textContent = "Saving…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ action, done: markDone }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    if (markDone) {
      btn.className = "ap-btn ap-btn-done";
      btn.textContent = "✓ Done";
      btn.onclick = () => toggleDone(btn, action, false, scriptUrl);
    } else {
      btn.className = "ap-btn ap-btn-todo";
      btn.textContent = "○ Mark done";
      btn.onclick = () => toggleDone(btn, action, true, scriptUrl);
    }
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
  }
  btn.disabled = false;
}

loadData().then(render).catch(err => {
  document.getElementById("dashboard").innerHTML =
    `<div class="card col-12"><div class="card-headline">Error</div><p style="color:#dc2626;font-size:.88rem">${err.message}</p></div>`;
});
</script>
