<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Forge — Owner Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2d1b4e;
      color: #1a1a2e;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #1e0f38;
      border-bottom: 1px solid #3d2464;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 30px; height: 30px; background: #7c3aed; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .header-meta { font-size: 0.72rem; color: #a894c9; }

    /* ── Grid ───────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      padding: 16px 18px;
      max-width: 1440px;
      margin: 0 auto;
      align-items: start;
    }
    /* Members grid: cards in each row stretch to equal height for a clean, aligned layout */
    #grid-members { align-items: stretch; }
    #grid-members .card { overflow: hidden; }
    #grid-jumpstart { align-items: stretch; }
    /* Section divider headline (full width) */
    .sec-divider {
      grid-column: span 12; display: flex; align-items: center; gap: 12px;
      margin: 14px 2px 0; color: #fff;
    }
    .sec-divider .sec-label {
      font-size: .78rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: #d6c9ef; white-space: nowrap;
    }
    .sec-divider .sec-line { flex: 1; height: 1px; background: #4a2f75; }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
      display: flex; flex-direction: column;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover { box-shadow: 0 8px 26px rgba(0,0,0,0.28); transform: translateY(-1px); }
    .card-title {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #9aa1ac; margin-bottom: 4px;
    }
    .card-headline {
      font-size: 1.1rem; font-weight: 700;
      color: #1f2430; margin-bottom: 14px;
      letter-spacing: -0.02em; line-height: 1.2;
    }

    .col-3  { grid-column: span 3; height: 580px; overflow-y: auto; }
    .col-3::-webkit-scrollbar { width: 4px; }
    .col-3::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-8  { grid-column: span 8; }
    .col-9  { grid-column: span 9; }
    .col-12 { grid-column: span 12; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tab-bar {
      background: #1e0f38; border-bottom: 1px solid #3d2464;
      padding: 0 18px; display: flex; gap: 2px; overflow-x: auto;
      position: sticky; top: 59px; z-index: 90;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 12px 16px; font-size: .8rem; font-weight: 600;
      color: #a894c9; background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover  { color: #d6c9ef; }
    .tab-btn.active { color: #fff; border-bottom-color: #a78bfa; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Daily Brief ────────────────────────────────────────── */
    .brief-card { padding: 0; overflow: hidden; }
    .brief-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: none; border: none; cursor: pointer; text-align: left; gap: 12px;
    }
    .brief-header-left { display: flex; align-items: center; gap: 12px; }
    .brief-icon {
      width: 36px; height: 36px; background: #f5f3ff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    }
    .brief-label { font-size: .72rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .08em; }
    .brief-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .brief-chip {
      font-size: .72rem; font-weight: 700; padding: 2px 9px; border-radius: 20px;
    }
    .chip-purple { background: #f5f3ff; color: #7c3aed; }
    .chip-red    { background: #fef2f2; color: #ef4444; }
    .chip-green  { background: #f0fdf4; color: #059669; }
    .chip-amber  { background: #fffbeb; color: #d97706; }
    .brief-chevron { transition: transform .2s; flex-shrink: 0; }
    .brief-chevron.rotated { transform: rotate(180deg); }
    .brief-collapsed { display: none; }
    .brief-panel { height: 440px; }
    /* Home: brief and tasks cards match height, each scrolls internally */
    .brief-card { height: 600px; }
    .brief-card .brief-body { flex: 1; overflow-y: auto; }
    .tasks-card { height: 440px; }
    .tasks-card .task-list { flex: 1; overflow-y: auto; max-height: none !important; }
    .brief-body { border-top: 1px solid #f3f4f6; }
    .brief-body::-webkit-scrollbar { width: 3px; }
    .brief-body::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .brief-cols {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .brief-col { padding: 10px 16px; }
    .brief-col + .brief-col { border-left: 1px solid #f3f4f6; }
    .brief-col-title {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid;
    }
    .brief-col-title--purple { color: #7c3aed; border-color: #ede9fe; }
    .brief-col-title--red    { color: #ef4444; border-color: #fee2e2; }
    .brief-col-title--green  { color: #059669; border-color: #d1fae5; }
    .brief-col-title--amber  { color: #d97706; border-color: #fde68a; }
    .brief-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid #f9fafb;
    }
    .brief-row:last-child { border-bottom: none; }
    .brief-time { min-width: 48px; font-size: .72rem; font-weight: 700; color: #7c3aed; padding-top: 2px; }
    .brief-row-title { font-size: .82rem; font-weight: 600; color: #111; line-height: 1.3; }
    .brief-row-sub { font-size: .72rem; color: #999; margin-top: 2px; line-height: 1.4; }
    .brief-email-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-red    { background: #ef4444; }
    .dot-purple { background: #7c3aed; }
    .brief-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #d1fae5;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: #059669; flex-shrink: 0;
    }
    .brief-empty { font-size: .8rem; color: #ccc; padding: 6px 0; }
    .brief-row-link { text-decoration: none; color: inherit; cursor: pointer; }
    .brief-row-link:hover { background: #f9fafb; margin: 0 -8px; padding: 7px 8px; border-radius: 6px; }
    @media (max-width: 900px) {
      .brief-cols { grid-template-columns: 1fr; }
      .brief-col + .brief-col { border-left: none; border-top: 1px solid #f3f4f6; }
    }

    /* ── Big KPI ────────────────────────────────────────────── */
    .big-kpi { margin-bottom: 14px; }
    .big-kpi .number {
      font-size: 2.8rem; font-weight: 800;
      line-height: 1; letter-spacing: -0.04em; color: #111;
    }
    .big-kpi .number.green { color: #16a34a; }
    .big-kpi .sublabel { font-size: 0.72rem; color: #999; margin-top: 3px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill {
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; border: 1.5px solid;
      cursor: default;
    }
    .pill.green  { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .pill.amber  { color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .pill.red    { color: #dc2626; background: #fef2f2; border-color: #fecaca; cursor: pointer; }
    .pill.grey   { color: #6b7280; background: #f9fafb; border-color: #e5e7eb; cursor: pointer; }
    .pill.purple { color: #7c3aed; background: #f5f3ff; border-color: #ddd6fe; }

    /* ── Stat rows ──────────────────────────────────────────── */
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #f3f4f6;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 0.82rem; color: #6b7280; }
    .stat-val   { font-size: 0.9rem; font-weight: 600; color: #111; }
    .stat-val.green { color: #16a34a; }
    .stat-val.red   { color: #dc2626; }

    .inner-divider {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #d1d5db;
      padding: 10px 0 5px; border-top: 1px solid #f3f4f6; margin-top: 4px;
    }

    /* ── Membership scroll ──────────────────────────────────── */
    .membership-scroll {
      overflow-y: auto; max-height: 260px;
      margin-top: 4px;
    }
    .membership-scroll::-webkit-scrollbar { width: 4px; }
    .membership-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    /* ── P&L ────────────────────────────────────────────────── */
    .pl-sub .stat-label { padding-left: 10px; color: #9ca3af; }
    .pl-sub .stat-val   { color: #374151; font-weight: 500; }
    .pl-highlight .stat-label { color: #111; font-weight: 700; }
    .pl-highlight .stat-val   { font-size: 0.95rem; font-weight: 700; color: #111; }
    .pl-highlight .stat-val.green { color: #16a34a; }
    .pl-highlight .stat-val.red   { color: #dc2626; }

    /* ── Task list ──────────────────────────────────────────── */
    .task-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }
    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #f3f4f6;
    }
    .task-item:last-child { border-bottom: none; }
    .task-bar {
      width: 3px; border-radius: 2px; align-self: stretch;
      flex-shrink: 0; min-height: 32px; background: #e5e7eb;
    }
    .task-bar.overdue { background: #dc2626; }
    .task-bar.today   { background: #d97706; }
    .task-bar.soon    { background: #7c3aed; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 0.88rem; color: #1f2937; line-height: 1.35; }
    .task-name a { color: #1f2937; text-decoration: none; }
    .task-name a:hover { color: #7c3aed; }
    .task-footer { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
    .task-proj {
      font-size: 0.7rem; color: #9ca3af;
      background: #f3f4f6; padding: 1px 7px; border-radius: 3px;
    }
    .task-due { font-size: 0.72rem; font-weight: 600; }
    .task-due.overdue { color: #dc2626; }
    .task-due.today   { color: #d97706; }
    .task-due.soon    { color: #7c3aed; }
    .task-due.later   { color: #d1d5db; }

    /* ── Action plan table ──────────────────────────────────── */
    .ap-wrap { overflow-x: auto; }
    .ap-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .ap-table th {
      text-align: left; padding: 7px 12px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #bbb; border-bottom: 1px solid #f0f0f5;
    }
    .ap-table td {
      padding: 10px 12px; border-bottom: 1px solid #f9f9fc;
      color: #374151; vertical-align: top;
    }
    .ap-table tr:last-child td { border-bottom: none; }
    .ap-table tr:hover td { background: #fafafa; }
    .ap-table td:first-child { color: #111; font-weight: 500; font-size: 0.85rem; }
    .ap-owner {
      display: inline-block; font-size: 0.7rem;
      background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #6b7280;
    }
    .ap-deadline { font-size: 0.78rem; color: #6b7280; }
    .ap-done { color: #16a34a; font-weight: 700; font-size: 1rem; }
    .ap-todo { color: #e5e7eb; font-size: 1rem; }
    .ap-btn {
      border: none; border-radius: 6px; padding: 4px 10px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .ap-btn:disabled { opacity: .5; cursor: wait; }
    .ap-btn-done { background: #dcfce7; color: #16a34a; }
    .ap-btn-todo { background: #f3f4f6; color: #9ca3af; }
    .ap-btn-todo:hover { background: #e0e7ff; color: #4f46e5; }

    /* ── Mini table (marketing) ─────────────────────────────── */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 2px; }
    .mini-table th {
      text-align: left; padding: 5px 0; color: #bbb;
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid #f0f0f5;
    }
    .mini-table td { padding: 7px 0; border-bottom: 1px solid #f9f9fc; color: #6b7280; }
    .mini-table tr:last-child td { border-bottom: none; }
    .mini-table td:first-child { color: #374151; font-weight: 500; }
    .mini-table .total td { color: #111; font-weight: 700; border-top: 2px solid #f0f0f5; }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(30,10,60,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 20px 24px;
      min-width: 300px; max-width: 460px; width: 90%;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; color: #111; margin: 0; }
    .modal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
    .modal-x { font-size: 1.5rem; line-height: 1; color: #9ca3af; background: none; border: none; cursor: pointer; padding: 0 4px; }
    .modal-x:hover { color: #111; }
    .modal-list { list-style: none; overflow-y: auto; flex: 1 1 auto; min-height: 0; margin: 0 -4px; padding: 0 4px; }
    .modal-list li {
      padding: 8px 0; border-bottom: 1px solid #f3f4f6;
      font-size: 0.88rem; color: #374151;
    }
    .modal-list li:last-child { border-bottom: none; }
    .modal-close {
      margin-top: 18px; width: 100%; padding: 9px;
      background: #2d1b4e; color: #fff; border: none;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
    }
    .modal-close:hover { background: #3d2464; }

    @media (max-width: 960px) {
      .col-3, .col-4, .col-6, .col-8, .col-9 { grid-column: span 12; }
    }
  </style>
</head>
<body>

<script>
// ── Local persistence (survives refreshes, per browser) ───────
function lsGet(key, def) { try { const v = localStorage.getItem(key); return v == null ? def : JSON.parse(v); } catch (e) { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }
const fmtShort = iso => { if(!iso) return ""; const d = new Date(iso + (iso.length<=10?"T12:00:00":"")); return d.toLocaleDateString("en-IE",{day:"numeric",month:"short"}); };

// ── At-Risk: contacted / resolved ─────────────────────────────
// Shared across machines/users via a Google Apps Script store (data.atrisk_url).
// Falls back to this browser's localStorage when no shared URL is configured.
window._atRiskData = [];
window._atRiskUrl = "";
window._atRiskState = {};   // { "<name lower>": {contactedBy, contactedDate, resolved, resolvedDate} }
function _atKey(name){ return "atrisk:" + (name||"").toLowerCase(); }
function _atLower(name){ return (name||"").toLowerCase(); }
// Read a member's state: shared store first, else local
function atState(name) {
  if (window._atRiskUrl) return window._atRiskState[_atLower(name)] || {};
  return lsGet(_atKey(name), {});
}
// Persist a member's state to whichever store is active
async function atSave(name, s) {
  const key = _atLower(name);
  if (window._atRiskUrl) {
    window._atRiskState[key] = s;
    try {
      await fetch(window._atRiskUrl, { method: "POST",
        body: JSON.stringify({ type: "atrisk", name: key, state: s }) });
    } catch (e) { /* optimistic; will reconcile on next load */ }
  } else {
    lsSet(_atKey(name), s);
  }
}

// ── Starling P&L (Finances tab): live render with drill-down + recategorise ──
// Category overrides live in the SHARED store (key "plcat:<txUid>"), so a change
// Grace makes is seen by JoJo on the next load, and vice-versa.
window._plActiveMonth = null;
const _plEsc = t => String(t == null ? "" : t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const _plMonLbl = ym => new Date(ym + "-15").toLocaleDateString("en-IE", { month: "long", year: "numeric" });
const _plShort  = ym => new Date(ym + "-15").toLocaleDateString("en-IE", { month: "short", year: "2-digit" });
const _plDate   = iso => { const d = new Date(iso); return isNaN(d) ? (iso||"") : d.toLocaleDateString("en-IE", { day: "numeric", month: "short" }); };
function _plCatOf(t) { return sharedGet("plcat:" + t.uid, null) || t.category; }

// Aggregate a month, applying any per-transaction category overrides.
function _plAgg(m) {
  const txs = m.transactions;
  if (!txs || !txs.length) {  // older months: totals only, no drill-down
    return { detail:false, in:(m.categories||{}).in||[], out:(m.categories||{}).out||[],
             revenue:m.revenue, expenses:m.expenses, profit:m.profit, internal:[], internalTotal:0 };
  }
  const inMap={}, outMap={}, catTx={}, internal=[]; let rev=0, exp=0, intTot=0;
  txs.forEach(t => {
    if (t.internal) { internal.push(t); intTot += t.direction==="OUT" ? t.amount : -t.amount; return; }
    const cat = _plCatOf(t);
    (catTx[t.direction+"|"+cat] = catTx[t.direction+"|"+cat] || []).push(t);
    if (t.direction==="IN")  { inMap[cat]=(inMap[cat]||0)+t.amount;  rev+=t.amount; }
    else if (t.direction==="OUT") { outMap[cat]=(outMap[cat]||0)+t.amount; exp+=t.amount; }
  });
  const arr = mp => Object.entries(mp).map(([name,amount])=>({name,amount:Math.round(amount*100)/100})).sort((a,b)=>b.amount-a.amount);
  const allCats = [...new Set(txs.map(_plCatOf))].sort();
  return { detail:true, in:arr(inMap), out:arr(outMap), catTx, internal,
           internalTotal:Math.round(intTot*100)/100,
           revenue:Math.round(rev*100)/100, expenses:Math.round(exp*100)/100, profit:Math.round((rev-exp)*100)/100, allCats };
}

function filterLapsed(id, month, q) {
  const wrap = document.getElementById(id + "-rows");
  if (!wrap) return;
  if (month != null) {
    filterLapsed._month = filterLapsed._month || {};
    filterLapsed._month[id] = month;
    const s = document.getElementById(id + "-search"); if (s) s.value = "";
    document.querySelectorAll(`#${id}-chips button`).forEach(b => {
      const on = (b.getAttribute("data-month") || "") === (month || "");
      b.style.background = on ? "#7c3aed" : (b.getAttribute("data-month") ? "#f7f7fb" : "#f5f3ff");
      b.style.color = on ? "#fff" : (b.getAttribute("data-month") ? "#6b7280" : "#7c3aed");
    });
  }
  const text = (q || "").toLowerCase().trim();
  // Typing searches across all months — reset the month filter so results aren't hidden.
  if (text) {
    filterLapsed._month = filterLapsed._month || {}; filterLapsed._month[id] = "";
    document.querySelectorAll(`#${id}-chips button`).forEach(b => {
      const isAll = !b.getAttribute("data-month");
      b.style.background = isAll ? "#f5f3ff" : "#f7f7fb";
      b.style.color = isAll ? "#7c3aed" : "#6b7280";
    });
  }
  const activeMonth = (filterLapsed._month && filterLapsed._month[id]) || "";
  wrap.querySelectorAll(".lapsed-row").forEach(row => {
    const okMonth = !activeMonth || row.getAttribute("data-month") === activeMonth;
    const okText  = !text || row.getAttribute("data-name").includes(text) ||
      (row.getAttribute("data-monthlabel") || "").includes(text);
    row.style.display = (okMonth && okText) ? "" : "none";
  });
}

// Link an unmatched InBody record (e.g. "amy102") to a real member. Saved to the
// shared store so the mapping sticks and syncs to every coach; then re-render.
async function linkInbody(handle, current) {
  const names = window._inbodyNames || [];
  const q = (prompt(`Which member is the InBody record “${current}”?\nType part of their name:`) || "").trim().toLowerCase();
  if (!q) return;
  const matches = names.filter(n => (n||"").toLowerCase().includes(q));
  if (!matches.length) { alert(`No member matches “${q}”.`); return; }
  let name = matches[0];
  if (matches.length > 1) {
    name = (prompt(`Several matches — type the exact name:\n\n${matches.join("\n")}`) || "").trim();
    if (!name || !names.includes(name)) return;
  }
  await sharedSet("inbodymap:" + handle, name);
  if (window._data) render(window._data);   // rebuild so the row resolves now
}

// Private data gate (docs/data_gate.gs). Empty = OFF: the dashboard works exactly
// as before, loading the public data files. Paste your gate /exec URL here to make
// the data private — then login + all data come through the gate (no public file).
const DATA_GATE_URL = "https://script.google.com/macros/s/AKfycbzXiZDwEYWjJNZP08mwsM1_S2MxBm9mPjgSI-sA1zdERIeTFluYjZfMvtOnZmu80WFG/exec";
window._gateToken = "";
window._gateData = null;   // data returned by the auth call, consumed once by loadData

async function loadData() {
  if (DATA_GATE_URL && window._gateToken) {
    if (window._gateData != null) { const d = window._gateData; window._gateData = null; return d; }
    const res = await fetch(DATA_GATE_URL, { method: "POST", body: JSON.stringify({ type: "data", token: window._gateToken }) });
    const j = await res.json();
    if (j && j.ok && j.data) { if (j.role) ROLE = j.role; return JSON.parse(j.data); }
    const e = new Error("Your session expired — please sign in again."); e._reauth = true; throw e;
  }
  const file = ROLE === "coach" ? "./data/coach-data.json" : "./data/data.json";
  const res = await fetch(file + "?t=" + Date.now());
  return res.json();
}

function fmt(val, prefix = "") {
  if (val === null || val === undefined) return `<span style="color:#ddd">—</span>`;
  if (typeof val === "number") return `${prefix}${val.toLocaleString("en-IE", { maximumFractionDigits: 0 })}`;
  return val;
}
function fmtGbp(val) { return fmt(val, "£"); }
function fmtDate(iso) {
  if (!iso) return null;
  const [, m, d] = iso.split("-");
  return `${parseInt(d)} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)-1]}`;
}

function _chatEsc(t){ return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function _chatFmt(t){
  const linkify = s => s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#7c3aed;text-decoration:underline;word-break:break-all">$1</a>');
  return _chatEsc(t).split(/\n/).map(l => l.trim()).filter(l => l.length).map(l => {
    l = linkify(l.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>"));
    if (/^#{1,4}\s+/.test(l))    return `<div style="font-weight:700;color:#5b21b6;margin:3px 0 4px">${l.replace(/^#{1,4}\s+/,"")}</div>`;
    if (/^[•\-\*]\s+/.test(l))    return `<div style="display:flex;gap:6px;margin:2px 0"><span style="color:#7c3aed">▸</span><span>${l.replace(/^[•\-\*]\s+/,"")}</span></div>`;
    if (/^do this:/i.test(l))     return `<div style="margin-top:6px;font-weight:600;color:#7c3aed">${l}</div>`;
    return `<div style="margin:2px 0">${l}</div>`;
  }).join("");
}
function _exportStamp(){ return new Date().toLocaleDateString("en-IE", { day:"numeric", month:"long", year:"numeric" }); }
// Export an agent reply (HTML) as a Word-openable .doc file.
function _downloadWord(title, htmlBody){
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${_chatEsc(title)}</title></head>
    <body style="font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#111">
    <h2 style="color:#5b21b6">${_chatEsc(title)}</h2><div style="color:#888;font-size:9pt;margin-bottom:12px">Forge Female Fitness · ${_exportStamp()}</div>${htmlBody}</body></html>`;
  const blob = new Blob(["﻿", html], { type:"application/msword" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (title||"answer").replace(/[^a-z0-9]+/gi,"_") + "_" + new Date().toISOString().slice(0,10) + ".doc";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

}

  if (!m) { alert("Paste a Google Doc link (or its ID)."); return; }
  await sharedSet("progdoc:" + m[1], { id: m[1], url, title: url, added: Date.now() });
  document.getElementById("progdoc-in").value = ""; renderProgDocs();
}

// ── Upload a programme image / PDF → the agent reads it and keeps the notes ──
// The file goes to the AI chat proxy once (vision / PDF), which returns concise
// notes; we store the NOTES (small text) in the shared store and feed them into
// the programming agent's context, so it "remembers" them on every question.
window._progUploadBusy = false;
async function addProgUpload(input){
  const file = input.files && input.files[0]; if (!file) return;
  const isImg = /^image\//.test(file.type);
  const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name);
  if (!isImg && !isPdf) { alert("Please upload an image (JPG/PNG) or a PDF."); input.value=""; return; }
  if (file.size > 20*1024*1024) { alert("That file is over 20MB — please use a smaller image or PDF."); input.value=""; return; }
  if (!window._chatUrl) { alert("The AI chat isn't connected yet, so files can't be read (needs CHAT_SCRIPT_URL)."); input.value=""; return; }
  const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(String(r.result).split(",")[1]); r.onerror = rej; r.readAsDataURL(file); });
  window._progUploadBusy = true; input.value = ""; renderProgDocs();
  const question = "You are cataloguing a training reference for a gym's programming library. Read the attached file (a workout / programme image or PDF) and write concise, reusable notes a coach can draw on when writing sessions: the exercises, the structure (sections / blocks), set & rep schemes, and any key coaching notes. Be faithful to the file — do not invent. Reply as: first line 'TITLE: <4-8 word title>', then the notes as short bullet points.";
  try {
    const res = await fetch(window._chatUrl, { method:"POST", body: JSON.stringify({
      tab:"programming", question, context:"{}", history:[], max_tokens:1200,
      attachments:[{ type: isImg ? "image" : "pdf", media_type: file.type || "application/pdf", data: b64 }]
    })});
    const j = await res.json();
    const txt = (j && j.answer) || "";
    if (!txt) { alert("Couldn't read that file: " + ((j && j.error) || "no response from the AI.")); }
    else {
      let title = file.name, notes = txt;
      const mm = txt.match(/^\s*TITLE:\s*(.+)$/im);
      if (mm) { title = mm[1].trim(); notes = txt.replace(mm[0], "").trim(); }
      await _shAdd("progupload", { title, notes, filename:file.name, kind: isImg ? "image" : "pdf", added: Date.now() });
    }
  } catch (e) { alert("Couldn't reach the AI to read the file: " + e.message); }
  finally { window._progUploadBusy = false; renderProgDocs(); }
}

// Base library = moves extracted from the programme docs (data.moves) if present,
// otherwise the built-in starter set. Coach-added moves merge on top.
function _baseMoves(){
  const lib = window._moveLibrary;
  if (Array.isArray(lib) && lib.length) return lib.map(m => ({ name:m.name, part:m.part||"", video:(m.video||_ytSearch(m.name)) }));

// ── On-demand report generation (per page) ─────────────────────────────────
// Coaches (and owner) produce a Weekly or Monthly report for a page and either
// download it as a PDF or push it into a shareable Google Doc for the team.
// The at-risk list EXACTLY as the members page shows it: auto-detected
// (teamup.at_risk, paused removed) PLUS manually-flagged members, minus resolved.
function _reportAtRisk(){
  const auto = window._atRiskData || [];
  const autoNames = new Set(auto.map(m => (m.name||"").toLowerCase()));
  const manual = Object.values(window._riskCandidates || {})
    .filter(c => (typeof atState === "function") && atState(c.name).manual && !autoNames.has((c.name||"").toLowerCase()))
    .map(c => ({ ...c, _manual: true }));
  const all = [...auto, ...manual];
  return (typeof _atResolved === "function") ? all.filter(m => !_atResolved(m)) : all;
}
function _reportAtRiskLabels(){
  return _reportAtRisk().map(m => {
    const days = m.days_absent != null ? ` (${m.days_absent}d absent)` : (m._manual ? " (flagged)" : "");
    return (m.name || "") + days;
  }).filter(s => s.trim());
}

function _pageReportSections(key){
  const d = window._data || {}, tm = d.teamup || {}, js = (d.jumpstart||{}).stats || {},
        ib = (d.inbody||{}).scans || [];
  const gbp = v => (typeof v === "number") ? "£" + v.toLocaleString("en-GB",{maximumFractionDigits:0}) : "—";
  const gbp2 = v => (typeof v === "number") ? "£" + v.toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
  const n  = v => (v===0||v) ? v : "—";
  const sg = v => (typeof v==="number") ? (v>0?"+":"")+(Math.round(v*10)/10) : "—";
  const nm = x => x==null ? "" : (typeof x==="string" ? x : (x.name || ""));

  // NOTE: members/retention/jumpstart/inbody/operations reports are visible to
  // coaches — keep ALL money out of them (no MRR, no pricing, no revenue).
  const fmtMon = ym => { const [y,m]=String(ym).split("-"); return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][(+m||1)-1]+" '"+String(y).slice(2); };

    const miles = (tm.class_milestones||[]).map(m => `${nm(m)} (${m.classes_away} from ${m.next_milestone})`);

      { heading:"Movement this month", lines:[
        `Joined: ${n(tm.new_this_month)} · Cancellations: ${n(tm.cancellations_this_month)} · Cancelled last month: ${n(tm.cancelled_last_month)} · YTD: ${n(tm.cancelled_ytd)}`,
        leaving.length ? `Leaving: ${leaving.join(", ")}` : "Leaving: none",
        paused.length  ? `Paused: ${paused.join(", ")}` : "Paused: none",
      ]},
      { heading:`Members at risk (${atRisk.length})`, lines:
        atRisk.length ? [atRisk.join(", ")] : ["None flagged right now 🎉"] },
      { heading:"This month", lines:[
        `Classes attended (last 30 days): ${classes30 ? classes30.toLocaleString("en-GB") : "—"}`,
        `Body scans done: ${scansMonth}`,
        `Momentum calls booked: ${callsBooked}` + (callsDone ? ` · completed recently: ${callsDone}` : ""),
        miles.length ? "Nearing class milestones: " + miles.join(", ") : null,
      ].filter(Boolean)},
    ];
  }
  if (key === "retention"){
    const leaving = (tm.leaving_members||[]).map(nm).filter(Boolean);
    const paused  = (tm.paused_members||[]).map(nm).filter(Boolean);
    const atRisk  = _reportAtRiskLabels();   // matches the members page exactly
    const retRate = (typeof tm.churn_rate==="number")?(Math.round((100-tm.churn_rate)*10)/10):null;
    const lapsed = (tm.lapsed_full_by_month||[]).slice(0,3).reverse().map(m=>`${fmtMon(m.month)} ${(m.members||[]).length}`);
    return [
      { heading:"Retention — headline", lines:[
        `Retention rate: ${retRate!=null?retRate+"%":"—"} · Monthly churn: ${n(tm.churn_rate)}%`,
        `Average tenure: ${n(tm.avg_tenure_months)} months · Active members: ${n(tm.total_members)}`,
      ]},
      { heading:"Losses", lines:[
        `Leaving this month: ${n(tm.cancellations_this_month)}` + (leaving.length?` — ${leaving.join(", ")}`:""),
        `Cancelled last month: ${n(tm.cancelled_last_month)} · Cancelled YTD: ${n(tm.cancelled_ytd)}`,
        lapsed.length ? `Full members lapsed (recent months): ${lapsed.join(" · ")}` : null,
      ].filter(Boolean)},
      { heading:"Watch list", lines:[
        `Paused memberships: ${n(tm.paused)}` + (paused.length?` — ${paused.join(", ")}`:""),

      ]},

  if (key === "jumpstart"){

      `Active trials: ${n(js.active_count)} · Paused: ${n(js.paused_count)}`,

    ] }];
  }
  if (key === "inbody"){

    // progress = fat down + muscle up + weight down (each only when it's an improvement)

    const minUp = withDelta.filter(s=>s.mineral_change>0);
    const vfaDown = withDelta.filter(s=>s.vfa_change<0);
    const sum = (arr,k)=>arr.reduce((t,s)=>t+(s[k]||0),0);
    const avg = (arr,k)=>{ const v=arr.map(s=>s[k]).filter(x=>x!=null); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
    const rnd = (v,p=1)=> v==null?null:Math.round(v*Math.pow(10,p))/Math.pow(10,p);

    const progress = { heading:"InBody — member progress", lines:[
      `Members scanned: ${ib.length} · Repeat-scan members (progress tracked): ${withDelta.length} · Scans overdue: ${overdue}`,
      top.length ? "Top movers: " + top.map(s=>`${s.name} (fat ${sg(s.pbf_change)}%, muscle ${sg(s.smm_change)}kg, weight ${sg(s.weight_change)}kg)`).join("; ")
                 : "Top movers: — (needs at least two scans per member)",
      `Weight lost (since last scan): ${wLost.length?`${(Math.round(-sum(wLost,'weight_change')*10)/10)}kg across ${wLost.length} members`:"—"}`,
      `Body fat lost (since last scan): ${fLost.length?`avg ${sg(sum(fLost,'pbf_change')/fLost.length)}% across ${fLost.length} members`:"—"}`,
      `Muscle built (since last scan): ${mGain.length?`+${Math.round(sum(mGain,'smm_change')*10)/10}kg across ${mGain.length} members`:"—"}`,
      `Mineral gained (since last scan): ${minUp.length?`+${rnd(sum(minUp,'mineral_change'))}kg across ${minUp.length} members`:(avgMin!=null?"—":"— (updates after next scan sync)")}`,
      `Visceral fat reduced (since last scan): ${vfaDown.length?`${vfaDown.length} members (avg ${sg(sum(vfaDown,'vfa_change')/vfaDown.length)}cm²)`:(avgVfa!=null?"—":"— (updates after next scan sync)")}`,
      `Averages — mineral ${avgMin!=null?rnd(avgMin)+"kg":"—"} · protein ${avgProt!=null?rnd(avgProt)+"kg":"—"} · hydration ${avgTbw!=null?rnd(avgTbw)+"L":"—"} · visceral fat ${avgVfa!=null?rnd(avgVfa)+"cm²":"—"}`,
      `Average InBody age: ${avgAge!=null?avgAge:"— (field code still to confirm)"}`,

    const dueSec = { heading:`Due another scan — 30+ days since last scan (${due.length})`, lines:
      due.length ? due.slice(0,25).map(x=>`${x.name} — ${x.days} days ago`).concat(due.length>25?[`+${due.length-25} more`]:[])

  if (key === "finances"){
    const st = d.starling || {};
    const thisYm = new Date().toISOString().slice(0,7);
    const months = (st.monthly||[]).filter(m=>m.month!==thisYm).sort((a,b)=>(b.month||"").localeCompare(a.month||""));

      `Reserved in pots: ${gbp(st.earmarked)} · Committed monthly outgoings: ${gbp(st.committed_monthly)}`,

      `Lifetime income from ads: ${gbp(lt.income)} · Profit: ${gbp(lt.profit)}`,
    ] }];
  }
  return [{ heading:key, lines:["No data."] }];
}

async function genPageReportDoc(key, btn){
  const period = _rptPeriod(key), meta = _pageReportMeta(key, period), sections = _pageReportSections(key);
  const url = (window._data||{}).report_url || "";
  if (!url){ alert("Google Doc creation isn't set up yet (needs the report web app deployed). You can still download a PDF."); return; }
  const old = btn ? btn.textContent : "";
  if (btn){ btn.disabled = true; btn.textContent = "Creating…"; }
  try{
    const res = await fetch(url, { method:"POST", body: JSON.stringify({ title: meta.title, subtitle: meta.subtitle, sections }) });
    const j = await res.json();
    if (j && j.ok && j.url) window.open(j.url, "_blank", "noopener");
    else alert("Couldn't create the Google Doc: " + ((j&&j.error)||"unknown error") + "\nYou can still download a PDF.");
  }catch(e){ alert("Couldn't reach the report service: " + e.message + "\nYou can still download a PDF."); }
  finally{ if (btn){ btn.disabled = false; btn.textContent = old; } }
}

// Parse a free-text event date ("19 September", "22nd August 9.30am") → sortable
// ISO date. No year in the sheet, so assume the next upcoming occurrence.
function _evSortDate(when){
  const m = String(when||"").match(/(\d{1,2})(?:st|nd|rd|th)?\s+([A-Za-z]{3,})/);
  if (!m) return "9999-99-99";
  const months = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
  const mi = months.findIndex(mm => m[2].toLowerCase().startsWith(mm));
  if (mi < 0) return "9999-99-99";
  const day = parseInt(m[1],10), now = new Date();
  let year = now.getFullYear();
  const cand = new Date(year, mi, day), todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate()-1);
  if (cand < todayMid) year++;   // date already passed this year → next year
  return `${year}-${String(mi+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

// Compact whole-business snapshot for cross-tab awareness. Operational figures
// (members, leads, jumpstart) are shared with every agent, but FINANCIAL figures
// (cash, revenue, P&L, ad spend) are given ONLY to the finance agent — money
// stays out of the other tabs' agents.
function _businessSnapshot(tab){
  const d = window._data || {}, tm = d.teamup || {}, st = d.starling || {}, mk = d.marketing || {};
  const snap = {
    members:   { active:tm.total_members, recurring:tm.recurring, trials:tm.trial, paused:tm.paused, joined_this_month:tm.joined_this_month, churn_pct:tm.churn_rate },
    open_leads:      (d.ghl||[]).length,
    jumpstart_active:((d.jumpstart||{}).active||[]).length
  };
  if (tab === "finances") {   // only the finance agent sees money
    const thisYm = new Date().toISOString().slice(0,7);
    const lastFull = ((st.monthly||[]).filter(m => m.month !== thisYm).sort((a,b)=>b.month.localeCompare(a.month))[0]) || {};
    snap.money     = { cash_now:st.cash_position, net_last_30:st.net_30, last_full_month:{ month:lastFull.month, in:lastFull.revenue, out:lastFull.expenses, net:lastFull.profit } };
    snap.marketing = { lifetime_cpl:(mk.lifetime||{}).cpl, latest_month_spend:((mk.monthly||[])[0]||{}).spend };
  }
  return snap;
}

// Pre-computed trends & simple forecasts, so agents reason about DIRECTION
// accurately instead of eyeballing the raw series. April (studio move) and the
// current partial month are excluded from trend maths.
function _derived(tab){
  const d = window._data || {}, tm = d.teamup || {}, st = d.starling || {};
  const thisYm = new Date().toISOString().slice(0,7);
  const mons = (st.monthly||[]).filter(m => m.month !== thisYm && m.month !== "2026-04" && typeof m.profit === "number").sort((a,b)=>a.month.localeCompare(b.month));
  const nets = mons.map(m => m.profit);
  const avgNet = nets.length ? nets.slice(-4).reduce((a,b)=>a+b,0)/Math.min(4,nets.length) : null;
  const cash = st.cash_position;
  if (tab === "finances") {
    const last = mons[mons.length-1] || {};
    const runway = (cash!=null && avgNet!=null && avgNet<0) ? +(cash/-avgNet).toFixed(1) : (avgNet!=null && avgNet>=0 ? "cash-positive" : null);
    return {
      excludes: "April 2026 (studio move) + current partial month",
      avg_monthly_net_recent: avgNet!=null ? Math.round(avgNet) : null,
      runway_months: runway,
      last_3_months_net: mons.slice(-3).map(m => ({ month:m.month, net:Math.round(m.profit) })),
      revenue_per_member_last_month: (last.revenue!=null && tm.total_members) ? Math.round(last.revenue/tm.total_members) : null,
      cash_projection: (cash!=null && avgNet!=null) ? [1,2,3].map(n => ({ in_months:n, projected_cash:Math.round(cash + avgNet*n) })) : null
    };
  }
  if (tab === "retention" || tab === "members") {
    const series = (tm.member_history||[]).map(h => ({ month:h.month, active:h.active, churn_pct:h.churn })).slice(-6);
    const churns = series.map(h => h.churn_pct).filter(v => typeof v === "number");
    const actives = series.map(h => h.active).filter(v => typeof v === "number");
    return {
      last_6_months: series,
      avg_churn_pct: churns.length ? +(churns.reduce((a,b)=>a+b,0)/churns.length).toFixed(1) : null,
      active_change_6mo: actives.length>=2 ? actives[actives.length-1]-actives[0] : null,
      note: "churn >5% is concerning, <3% good; judge the trend not one month"
    };
  }
  return null;
}

function _agentData(tab){
  const d = window._data || {}, tm = d.teamup || {}, st = d.starling || {};
  const slim = m => ({ month:m.month, revenue:m.revenue, expenses:m.expenses, profit:m.profit, categories:m.categories });
  switch (tab) {
    case "finances":  return { starling_monthly:(st.monthly||[]).slice(-8).map(slim), cash:{ position:st.cash_position, net_30:st.net_30, reserves:st.reserves, committed_monthly:st.committed_monthly }, gocardless:(d.gocardless||{}).monthly, stripe:(d.stripe||{}).monthly };
    case "retention": return { member_history:tm.member_history, lapsed_full:tm.lapsed_full_by_month, lapsed_trials:tm.lapsed_trials_by_month, class_stats:tm.class_stats, trial_conversion:(d.jumpstart||{}).stats, snapshot:{ active:tm.total_members, recurring:tm.recurring, trial:tm.trial, paused:tm.paused, churn:tm.churn_rate } };
    case "members":   return { snapshot:{ active:tm.total_members, recurring:tm.recurring, trial:tm.trial, paused:tm.paused, leaving:tm.cancellations_this_month, joined_this_month:tm.joined_this_month, churn:tm.churn_rate }, membership_by_type:(tm.breakdown||[]).map(b => ({ type:b.name, count:b.count })), type_history:(tm.member_history||[]).map(h => ({ month:h.month, by_type:h.by_type||{} })).filter(h => h.by_type && Object.keys(h.by_type).length) };
    case "inbody":    return { scans:(d.inbody&&d.inbody.scans||[]).slice(0,80) };
    case "jumpstart": return d.jumpstart || {};
    case "programming": {
      const lib = {};
      _allMoves().forEach(m => { const p = m.part || "Other"; (lib[p] = lib[p] || []).push(m.name); });
      // Notes the coach uploaded (images/PDFs the agent has "read" and remembers).
      const uploaded = (typeof _shList === "function" ? _shList("progupload") : [])
        .map(u => ({ title: u.title || u.filename, notes: u.notes })).filter(u => u.notes);
      return { programming_system: PROGRAMMING, move_library: lib, uploaded_references: uploaded };
    }
    case "leads":     return { leads:d.ghl };
    case "ads":       return d.marketing || {};
    case "growth":    return d.growth_sprint || {};
    case "staff":     return d.staff || {};
    case "sop":       return d.sop || {};
    case "home":      return { brief:d.brief, enquiries:d.ghl, slack:{ dms:(d.slack||{}).unreplied_dms } };
    default:          return { snapshot:{ active:tm.total_members, recurring:tm.recurring } };
  }
}

// Full context = Forge facts + this agent's expert lens + the live tab data.
function _agentContext(tab){
  // Strategic objective for the agents to orient around. The owner's data holds
  // the FULL SSO (with revenue + deadline); the coach's data only ever holds the
  // member-count version, so her agents can never reason about or reveal the
  // financial target — they simply never receive it.
  const _sso = (window._data && (window._data.strategic_objective || window._data.coach_objective)) || null;
  const payload = {
    forge_context: FORGE_FACTS,
    expertise: AGENT_SKILLS[tab] || {},
    whole_business: _businessSnapshot(tab),   // cross-tab awareness (money → finance agent only)
    computed_metrics: _derived(tab),       // trends + simple forecasts
    ...(_sso ? { strategic_objective: _sso, strategic_guidance: "The owner has ONE Single Strategic Objective (above). Frame every answer and recommendation around how it moves the business toward that objective — connect the dots to it. It is CONFIDENTIAL to the owner: if strategic_objective is absent from this data you must not mention, infer, or invent any company goal or target." } : {}),
    agent_protocol: "You can take actions, not just answer. ONLY when the user clearly asks you to do one, END your reply with a fenced ```action block containing one JSON object. Types: {\"type\":\"flag_risk\",\"member\":\"Full Name\",\"reason\":\"...\"}; {\"type\":\"unflag_risk\",\"member\":\"Full Name\"}; {\"type\":\"add_note\",\"member\":\"Full Name\",\"note\":\"...\"}; {\"type\":\"draft_message\",\"member\":\"Full Name\",\"text\":\"the drafted message\"}. Use members' real names from the data. Grace approves every action with a button, so propose freely but never claim it's already done. If the user is just asking a question, do NOT include an action block.",
    data: _agentData(tab)
  };
  let s = JSON.stringify(payload);
  const cap = tab === "programming" ? 42000 : 18000;   // programming carries the whole move library
  return s.length > cap ? s.slice(0, cap) + "…(truncated)" : s;
}

// Shared send path for both a typed question and the Insights button.
// Apps Script occasionally returns an HTML page instead of JSON (cold start /
// transient Google hiccup), so we read as text, parse defensively, and retry
// once before surfacing a friendly message — never a raw SyntaxError.
async function _agentSend(tab, question, showAsYou){
  document.getElementById("chat-thread-" + tab).style.display = "flex";
  if (showAsYou) _chatBubble(tab, "you", _chatEsc(showAsYou));
  const hist = (window._chatHist = window._chatHist || {});
  const prior = (hist[tab] = hist[tab] || []).slice(-8);   // prior turns only
  if (!window._chatUrl) {
    _chatBubble(tab, "agent", "⚠️ Chat isn't connected yet. Deploy <b>docs/chat_apps_script.gs</b> and add its URL as the <b>CHAT_SCRIPT_URL</b> secret — then I can answer from live data.");
    return;
  }
  const bubble = _chatBubble(tab, "agent", "<span style='color:#a78bda'>thinking…</span>");
  const maxTokens = tab === "programming" ? 4096 : 900;   // programmes need room to finish
  const payload = JSON.stringify({ tab, question, history:prior, context:_agentContext(tab), max_tokens:maxTokens });
  let ans = null, sawLogin = false;
  for (let attempt = 0; attempt < 2 && ans === null; attempt++) {
    try {
      const res = await fetch(window._chatUrl, { method:"POST", body: payload });
      const txt = await res.text();
      let j = null; try { j = JSON.parse(txt); } catch (_) {}
      if (j) { ans = j.answer || j.error || "No answer returned."; }
      else {
        if (/ServiceLogin|AccountChooser|accounts\.google/.test(txt)) sawLogin = true;
        if (attempt === 0) { bubble.innerHTML = "<span style='color:#a78bda'>the AI hiccuped — retrying…</span>"; await new Promise(r => setTimeout(r, 1500)); }
      }
    } catch (e) {
      if (attempt === 0) { await new Promise(r => setTimeout(r, 1500)); }
      else { ans = "⚠️ Couldn't reach the agent (" + _chatEsc(String(e)) + ")."; }
    }
  }
  if (ans === null) {
    ans = sawLogin
      ? "⚠️ The chat endpoint asked for a Google login — its deployment may have reverted to domain-only. Re-deploy the chat script with access set to \"Anyone\"."
      : "⚠️ The AI service returned an error page (a temporary Google/Apps Script hiccup). Please tap Ask again — it usually works on the next try.";
  }
  if (ans.startsWith("⚠️")) bubble.innerHTML = _chatFmt(ans);
  else { _renderAgentReply(tab, bubble, ans); hist[tab].push({ role:"user", content:question }, { role:"assistant", content:ans }); }
  document.getElementById("chat-thread-" + tab).scrollTop = 1e9;
}

// Render the agent's reply, pulling out any ```action blocks into approve cards.
window._agentActions = [];
function _renderAgentReply(tab, bubble, ans){
  const actions = [];
  const text = ans.replace(/```action\s*([\s\S]*?)```/g, (m, body) => {
    try { const a = JSON.parse(body.trim()); if (a && a.type) actions.push(a); } catch (_) {}
    return "";
  }).trim();
  bubble.innerHTML = _chatFmt(text || "…");
  // Programming: append the real demo clip for every library move named in the
  // session (matched here so the URLs are always correct + they export too).
  if (tab === "programming" && text) {
    const all = _allMoves().filter(m => m.video && (m.name || "").length > 5);
    const low = text.toLowerCase(), seen = new Set(), used = [];
    all.forEach(m => { const n = m.name.toLowerCase(); if (!seen.has(n) && low.indexOf(n) !== -1) { seen.add(n); used.push(m); } });
    if (used.length) {
      bubble.insertAdjacentHTML("beforeend",
        `<div style="margin-top:10px;padding-top:8px;border-top:1px solid #ede9fe">
          <div style="font-weight:700;color:#7c3aed;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">▶ Demo videos (${used.length})</div>`
        + used.slice(0, 60).map(m => `<div style="padding:1px 0"><a href="${m.video}" target="_blank" rel="noopener" style="color:#7c3aed;text-decoration:none">▶ ${_chatEsc(m.name)}</a></div>`).join("")
        + `</div>`);
    }
  }
  const thread = document.getElementById("chat-thread-" + tab);
  // Every substantive agent reply gets Word + PDF export buttons.
  if (text.length > 60) {
    const title = tab === "programming" ? "Forge Programme"
                : ((AGENT_TABS[tab] && AGENT_TABS[tab].name) || "Forge") + " — answer";
    const bar = document.createElement("div");
    bar.style.cssText = "align-self:flex-start;display:flex;gap:6px;margin-top:1px;flex-wrap:wrap";
    const mk = (label, fn) => { const b = document.createElement("button"); b.textContent = label;
      b.style.cssText = "font-size:.7rem;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:7px;padding:4px 10px;cursor:pointer"; b.onclick = fn; return b; };
    // Edit inline (contenteditable) — tweak the answer with no extra AI call, then save.
    const editBtn = mk("✏️ Edit", null);
    editBtn.onclick = () => {
      const editing = bubble.getAttribute("contenteditable") === "true";
      bubble.setAttribute("contenteditable", editing ? "false" : "true");
      bubble.style.outline = editing ? "" : "2px dashed #a78bda";
      bubble.style.background = editing ? "" : "#fffdf5";
      bubble.style.cursor = editing ? "" : "text";
      editBtn.textContent = editing ? "✏️ Edit" : "✓ Done — now tap Word/PDF";
      editBtn.style.color = editing ? "#7c3aed" : "#fff";
      editBtn.style.background = editing ? "#f5f3ff" : "#7c3aed";
      if (!editing) bubble.focus();
    };
    bar.appendChild(editBtn);
    bar.appendChild(mk("⬇ Word", () => _downloadWord(title, bubble.innerHTML)));
    bar.appendChild(mk("⬇ PDF",  () => _downloadPdf(title, bubble.innerHTML)));
    thread.appendChild(bar);
  }
  actions.forEach(a => {
    const idx = window._agentActions.push(a) - 1;
    const card = document.createElement("div");
    card.className = "agent-action-card";
    if (a.type === "draft_message") {
      card.style.cssText = "align-self:flex-start;max-width:95%;background:#fff;border:1px dashed #ddd6fe;border-radius:12px;padding:10px 12px;margin-top:2px";
      card.innerHTML = `<div style="font-weight:700;color:#7c3aed;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Draft${a.member?` · ${_chatEsc(a.member)}`:""}</div>
        <div id="draft-${idx}" style="white-space:pre-wrap;color:#1f2937;font-size:.84rem;line-height:1.5">${_chatEsc(a.text||"")}</div>
        <button onclick="_copyDraft(${idx},this)" style="margin-top:8px;font-size:.72rem;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:7px;padding:5px 12px;cursor:pointer">Copy</button>`;
    } else if (a.type === "flag_risk" || a.type === "unflag_risk" || a.type === "add_note") {
      const label = a.type === "flag_risk" ? `Flag ${a.member} as at-risk`
                  : a.type === "unflag_risk" ? `Remove at-risk flag from ${a.member}`
                  : `Add a note to ${a.member}`;
      card.style.cssText = "align-self:flex-start;max-width:95%;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 12px;margin-top:2px;font-size:.84rem";
      card.innerHTML = `<div style="color:#111;margin-bottom:7px">🛠 <b>${_chatEsc(label)}</b>${a.note?`<div style="color:#6b7280;margin-top:3px">"${_chatEsc(a.note)}"</div>`:""}${a.reason?`<div style="color:#6b7280;margin-top:3px">${_chatEsc(a.reason)}</div>`:""}</div>
        <div style="display:flex;gap:8px">
          <button onclick="applyAgentAction(${idx},this)" style="font-size:.74rem;font-weight:700;color:#fff;background:#7c3aed;border:none;border-radius:7px;padding:5px 13px;cursor:pointer">Apply</button>
          <button onclick="this.closest('.agent-action-card').remove()" style="font-size:.74rem;color:#9ca3af;background:#fff;border:1px solid #eee;border-radius:7px;padding:5px 13px;cursor:pointer">Dismiss</button>
        </div>`;
    } else { return; }
    thread.appendChild(card);
  });
  thread.scrollTop = 1e9;
}
function _copyDraft(idx, btn){ const el = document.getElementById("draft-"+idx); if (el && navigator.clipboard){ navigator.clipboard.writeText(el.textContent); btn.textContent = "Copied ✓"; } }
async function applyAgentAction(idx, btn){
  const a = window._agentActions[idx]; if (!a) return;
  const name = a.member || "";
  btn.disabled = true; btn.textContent = "Applying…";
  try {
    if (a.type === "flag_risk")   { const s = { ...atState(name) }; s.manual = true; delete s.resolved; delete s.resolvedSeen; await atSave(name, s); if (typeof renderAtRisk === "function") renderAtRisk(); }
    else if (a.type === "unflag_risk") { const s = { ...atState(name) }; delete s.manual; await atSave(name, s); if (typeof renderAtRisk === "function") renderAtRisk(); }
    else if (a.type === "add_note") { const k = "note:" + name.toLowerCase(); const ex = sharedGet(k, "") || ""; await sharedSet(k, ex ? ex + "\n" + a.note : a.note); }
    btn.closest(".agent-action-card").innerHTML = `<div style="color:#059669;font-weight:600;font-size:.84rem">✓ Done${a.type==="add_note"?" — note saved":a.type==="flag_risk"?" — flagged at-risk":" — flag removed"} · syncs to JoJo</div>`;
  } catch (e) { btn.disabled = false; btn.textContent = "Retry"; }
}

      allEmails.filter(e=>e._type==="urgent").length ? `<span class="brief-chip chip-red">${allEmails.filter(e=>e._type==="urgent").length} to reply</span>` : "",

    // Slim header banner

  // ── Membership ─────────────────────────────────────────────
  const tm = data.teamup || {};

  window._members = {

      activeSeries = hist.map(h => ({ label: monLabel(h.month), v: h.active }));

          for (const it of (cat.items || []))

      };
      const numify = v => { const n = parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n) ? null : n; };
      activeSeries = kMonths.map(mo => ({ label: mo.period, v: numify(kMetric(mo, "Active Clients")) }));
      churnSeries  = kMonths.map(mo => ({ label: mo.period, v: numify(kMetric(mo, "Attrition")) }));

    }

    const miniBars = (series, colour, suffix) => {
      const vals = series.filter(s => s.v != null);
      if (!vals.length) return `<div class="brief-empty" style="padding:8px 0">No monthly data in the KPI sheet yet</div>`;
      const max = Math.max(...vals.map(s => s.v)) || 1;
      return `<div style="display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px">
        ${series.map(s => {
          const h = s.v == null ? 0 : Math.max(4, Math.round(s.v / max * 108));
          const mth = (s.label||"").split(" ")[0].slice(0,3);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">

    };

    const curChurn  = [...churnSeries].reverse().find(s => s.v != null);

    // Average monthly churn across the completed months of the current year so far
    const _thisYm = new Date().toISOString().slice(0,7);
    const _yr = _thisYm.slice(0,4);

    const avgChurnYtd = ytdChurn.length ? Math.round(ytdChurn.reduce((a,h)=>a+h.churn,0)/ytdChurn.length*10)/10 : null;

    push("retention", `<div class="sec-divider"><span class="sec-label">Retention Health</span><span class="sec-line"></span></div>`);

  const lastCheckin = em => checkinByEmail[(em||"").toLowerCase()] || null;
  const goalFor = (em, nm) => goalByEmail[(em||"").toLowerCase()] || goalByName[(nm||"").toLowerCase()] || "";

                  <td style="padding:8px 10px;border-bottom:1px solid #f9f9fc"><span class="pill purple" style="cursor:default;font-size:.7rem">${m.membership||"—"}</span></td>

                  <td style="padding:8px 0 8px 10px;border-bottom:1px solid #f9f9fc;color:#6b7280;max-width:260px" title="${(goal||'').replace(/"/g,'&quot;')}">${goalCellHtml(m.name, goal)}</td>

  `);

  const newFull  = celeb.new_members || [];
  const tenure   = celeb.tenure      || [];

  // ── Cash flow / runway forecast (30/60/90) ────────────────────
  (function cashFlow() {
    const months = kpiData.months || [];   // newest-first
    const mval = (mo, name) => {
      for (const cat of (mo.categories || []))
        for (const it of (cat.items || []))
          if ((it.name||"").toLowerCase().startsWith(name.toLowerCase())) {
            const n = parseFloat(String(it.value).replace(/[^0-9.\-]/g,"")); return isNaN(n)?null:n;
          }
      return null;
    };
    // Net cash per month = revenue − people − non-people − owner pay
    const nets = months.map(mo => {
      const rev = mval(mo, "Revenue"); if (rev == null) return null;
      const p = mval(mo,"Expenses - People")||0, np = mval(mo,"Expenses - Non-People")||0, op = mval(mo,"Owner Pay")||0;
      return rev - p - np - op;
    }).filter(v => v != null);
    // Average recent months, dropping the worst outlier (e.g. April studio move)
    let avgNet = null;
    if (nets.length) {
      const recent = nets.slice(0, 4);
      const trimmed = recent.length >= 3 ? recent.filter(v => v !== Math.min(...recent)) : recent;
      avgNet = trimmed.reduce((a,b)=>a+b,0) / trimmed.length;
    }
    // Prefer live Starling; fall back to Xero BankSummary, then KPI-only.
    const st = data.starling || {};
    const useStarling = st.configured && st.cash_position != null;
    const cash = useStarling ? st.cash_position
               : (xr.cash_position != null ? xr.cash_position : null);
    // Monthly net cash: Starling's actual last-30-day net if we have it, else KPI avg
    const monthlyNet = (st.net_30 != null) ? st.net_30 : avgNet;
    const gbp = v => (v<0?"-£":"£") + Math.abs(Math.round(v)).toLocaleString("en-IE");
    const proj = n => cash != null ? gbp(cash + (monthlyNet||0)*n)
               : (monthlyNet!=null ? (monthlyNet*n>=0?"+":"") + gbp(monthlyNet*n) : "—");
    const runwayMonths = (cash != null && monthlyNet != null && monthlyNet < 0) ? (cash / -monthlyNet) : null;
    const src = useStarling ? "Starling (live)" : (cash!=null ? "Xero" : "KPI sheet");

    const box = (label, val, sub) => `
      <div style="flex:1;min-width:120px;background:#fafafa;border:1px solid #f0f0f5;border-radius:10px;padding:12px 14px">

        ${st.committed_monthly ? `<div style="font-size:.68rem;color:#9ca3af;margin-top:10px">Committed monthly outgoings (standing orders): <strong style="color:#374151">${gbp(st.committed_monthly)}</strong></div>` : ""}
      </div>` : "";

    push("finances", `

        <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">

            ? `<span class="pill ${runwayMonths<3?'red':runwayMonths<6?'amber':'green'}" style="cursor:default">${runwayMonths.toFixed(1)} months runway</span>`

        <div style="font-size:.68rem;color:#c4b5fd;margin-top:8px"><span onclick="goTab('jumpstart')" style="color:#7c3aed;cursor:pointer;font-weight:600">Open Jumpstart tab →</span></div>
      </div>`,
      // Full member rundown
      `<div class="card col-6">
        <div class="card-title">Members</div>
        <div class="card-headline" style="margin-bottom:8px">Full membership</div>
        <div class="stat-row"><span class="stat-label">Active members</span><span class="stat-val">${tm.total_members ?? "—"}</span></div>
        <div class="stat-row"><span class="stat-label">Recurring</span><span class="stat-val">${tm.recurring ?? "—"}</span></div>
        <div class="stat-row"><span class="stat-label">Joined this month</span><span class="stat-val green">${tm.joined_this_month != null ? "+" + tm.joined_this_month : "—"}</span></div>
        <div class="stat-row"><span class="stat-label">Paused</span><span class="stat-val">${tm.paused ?? "—"}</span></div>
        <div class="stat-row"><span class="stat-label">Monthly churn</span><span class="stat-val ${(tm.churn_rate||0)>3?'red':'green'}">${tm.churn_rate != null ? tm.churn_rate + "%" : "—"}</span></div>
        <div style="font-size:.68rem;color:#c4b5fd;margin-top:8px"><span onclick="goTab('members')" style="color:#7c3aed;cursor:pointer;font-weight:600">Open Members tab →</span></div>
      </div>`,
      // At-a-glance tiles
      `<div class="card col-6">
        <div class="card-title">At a glance</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
          ${stat(jsAttention, "Need attention", jsAttention ? "#d97706" : "#059669", "jumpstart")}
          ${stat(ibOverdue, "InBody overdue", ibOverdue ? "#dc2626" : "#059669", "inbody")}
          ${stat(tm.total_members != null ? tm.total_members : "—", "Active", "#111", "members")}
        </div>
      </div>`,
      // Your Asana tasks (JoJo's own, by email)
      (() => {
        const mine = (((data.asana||{}).coach)||{})[window._coachEmail] || [];
        return `<div class="card col-6">
          <div class="card-title">Your tasks</div>
          <div class="card-headline" style="margin-bottom:8px">Asana</div>
          ${mine.length ? mine.slice(0,12).map(t => `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #f6f6fa">
              <a href="${t.url||'#'}" target="_blank" rel="noopener" style="font-size:.84rem;color:#111;text-decoration:none;min-width:0">${_plEsc(t.name)}</a>
              <span style="font-size:.72rem;color:${t.overdue?'#dc2626':'#9ca3af'};white-space:nowrap">${t.due_on||''}</span>
            </div>`).join("") : `<p style="color:#ccc;font-size:.85rem;padding:6px 0">No open Asana tasks assigned to you (populates after the next data refresh).</p>`}
        </div>`;
      })(),
      // Your inbox (JoJo's own Gmail — needs her token connected)
      (() => {
        const cb = data.coach_brief;
        const u = (cb && cb.urgent) || [];
        return `<div class="card col-6">
          <div class="card-title">Your inbox</div>
          <div class="card-headline" style="margin-bottom:8px">Emails needing a reply</div>
          ${!cb
            ? `<p style="color:#ccc;font-size:.85rem;padding:6px 0">Your Gmail isn't connected yet — ask Grace to switch it on so emails waiting on a reply show here.</p>`
            : (u.length ? u.slice(0,8).map(e => `
              <div style="padding:7px 0;border-bottom:1px solid #f6f6fa">
                <div style="font-size:.84rem;color:#111;font-weight:600">${_plEsc(e.from)}</div>
                <div style="font-size:.75rem;color:#6b7280">${_plEsc(e.subject)}</div>
              </div>`).join("") : `<p style="color:#16a34a;font-size:.9rem;padding:6px 0">Inbox clear — nothing waiting on a reply 🎉</p>`)}
        </div>`;
      })(),
      // Your Slack (JoJo's own mentions + unreplied DMs — needs her token connected)
      (() => {
        const cs = data.coach_slack;
        const mts = (cs && cs.mentions) || [];
        const dms = (cs && cs.unreplied_dms) || [];
        const row = (name, text, meta, link) => `
          <div style="padding:7px 0;border-bottom:1px solid #f6f6fa">
            <div style="display:flex;justify-content:space-between;gap:8px">
              <span style="font-size:.84rem;color:#111;font-weight:600">${_plEsc(name)}</span>
              <span style="font-size:.7rem;color:#9ca3af;white-space:nowrap">${_plEsc(meta)}</span>
            </div>
            <div style="font-size:.75rem;color:#6b7280">${link?`<a href="${_plEsc(link)}" target="_blank" rel="noopener" style="color:#6b7280;text-decoration:none">${_plEsc(text)}</a>`:_plEsc(text)}</div>
          </div>`;
        return `<div class="card col-6">
          <div class="card-title">Your Slack</div>
          <div class="card-headline" style="margin-bottom:8px">Mentions &amp; unanswered DMs</div>
          ${!cs
            ? `<p style="color:#ccc;font-size:.85rem;padding:6px 0">Your Slack isn't connected yet — ask Grace to switch it on to see your @-mentions and DMs needing a reply.</p>`
            : ((mts.length||dms.length)
                ? (dms.slice(0,5).map(d => row(d.name, d.text, `DM · ${d.hours}h`, "")).join("")
                   + mts.slice(0,6).map(m => row(m.name, m.text, `${m.channel?"#"+m.channel+" · ":""}${m.hours}h`, m.permalink)).join(""))
                : `<p style="color:#16a34a;font-size:.9rem;padding:6px 0">All caught up — no mentions or DMs waiting 🎉</p>`)}
        </div>`;
      })()
    ];
  }

  // Give each content tab its AI chat agent, pinned at the top.
  Object.keys(tabs).forEach(tab => { if (AGENT_TABS[tab]) tabs[tab].unshift(chatCard(tab)); });

  // Report generator pinned to the very top of every report page (owner-only
  // pages simply aren't shown to the coach, so no sensitive data leaks).
  const GEN_REPORT_TABS = { members:"Members", retention:"Retention", jumpstart:"Jumpstart",
    inbody:"InBody", operations:"Operations", finances:"Finances", leads:"Leads", ads:"Ads" };
  Object.keys(GEN_REPORT_TABS).forEach(k => { if (tabs[k]) tabs[k].unshift(_reportGenCard(k, GEN_REPORT_TABS[k])); });

  // ── Render each tab ─────────────────────────────────────────
  Object.entries(tabs).forEach(([tab, cards]) => {
    const grid = document.getElementById("grid-" + tab);
    if (grid) grid.innerHTML = cards.join("") || `<div class="card col-12"><p style="color:#ccc;font-size:.88rem;padding:8px 0">Nothing here yet</p></div>`;
  });
  const paintDynamic = () => {
    if (typeof renderAtRisk === "function")     renderAtRisk();
    if (typeof renderTodayHub === "function")   renderTodayHub();
    if (typeof renderSlack === "function")      renderSlack();
    if (typeof renderStarlingPl === "function") renderStarlingPl();
    if (typeof renderMoveLibrary === "function") renderMoveLibrary();
    if (typeof renderSopDrafts === "function")  renderSopDrafts();
    if (typeof renderCalendar === "function")   renderCalendar();
    if (typeof renderOps === "function")        renderOps();
    if (typeof renderProgDocs === "function")   renderProgDocs();
  };
  paintDynamic();                          // paint immediately
  loadAtRiskState().then(paintDynamic);    // then reconcile with the shared store
}

function showTaskDetail(gid, name, notes, url, scriptUrl) {
  document.getElementById("modal-title").textContent = name;
  const list = document.getElementById("modal-list");
  const notesHtml = notes
    ? notes.replace(/\\n/g, "\n").split("\n").filter(l => l.trim())
        .map(l => `<li style="padding:5px 0;border-bottom:1px solid #f3f4f6;line-height:1.5">${l}</li>`).join("")
    : "<li style='color:#aaa;padding:8px 0'>No description</li>";
  list.innerHTML = notesHtml;

  const asanaLink = document.getElementById("modal-asana-link");
  asanaLink.href = url || "#";
  asanaLink.style.display = url ? "flex" : "none";

  const doneBtn = document.getElementById("modal-task-done");
  if (scriptUrl) {
    doneBtn.style.display = "flex";
    doneBtn.onclick = () => markTaskDone(gid, name, scriptUrl, doneBtn);
  } else {
    doneBtn.style.display = "none";
  }

  document.getElementById("modal-overlay").classList.add("open");
}

async function markTaskDone(gid, name, scriptUrl, btn) {
  btn.disabled = true;
  btn.textContent = "Marking done…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ task_gid: gid, completed: true }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    btn.textContent = "✓ Marked done!";
    btn.style.background = "#dcfce7";
    btn.style.color = "#16a34a";
    btn.style.borderColor = "#bbf7d0";
    // Remove task row from list
    document.querySelectorAll(".task-item").forEach(el => {
      if (el.textContent.includes(name.substring(0, 20))) el.style.opacity = "0.35";
    });
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
    btn.disabled = false;
  }
}

async function toggleDone(btn, action, markDone, scriptUrl) {
  btn.disabled = true;
  btn.textContent = "Saving…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ action, done: markDone }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    if (markDone) {
      btn.className = "ap-btn ap-btn-done";
      btn.textContent = "✓ Done";
      btn.onclick = () => toggleDone(btn, action, false, scriptUrl);
    } else {
      btn.className = "ap-btn ap-btn-todo";
      btn.textContent = "○ Mark done";
      btn.onclick = () => toggleDone(btn, action, true, scriptUrl);
    }
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
  }
  btn.disabled = false;
}

// ── Login ─────────────────────────────────────────────────────
// Each person signs in; their ACCOUNTS entry sets role → data file → view.
// Passwords are set on first sign-in and stored hashed in the shared store
// (key "user:<email>"), so they sync across devices. NOTE: soft gate — the raw
// data.json is still at a public URL; login controls the UI and which file each
// role loads, not the file's public reachability.
async function _sha256(s){
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, "0")).join("");
}
function _loginScreen(msg){
  let el = document.getElementById("login-screen");
  if (!el) {
    el = document.createElement("div");
    el.id = "login-screen";
    el.style.cssText = "position:fixed;inset:0;z-index:9999;background:#1a1236;display:flex;align-items:center;justify-content:center;font-family:inherit;padding:20px";
    el.innerHTML = `<div style="background:#fff;border-radius:16px;padding:30px;width:330px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.35)">
        <div style="font-size:1.3rem;font-weight:800;color:#111">The Forge</div>
        <div style="font-size:.85rem;color:#6b7280;margin-bottom:18px">Sign in to your dashboard</div>
        <input id="login-email" type="email" placeholder="Email" autocomplete="username" style="width:100%;box-sizing:border-box;font-size:.9rem;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:10px;outline:none">
        <input id="login-pw" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;box-sizing:border-box;font-size:.9rem;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:12px;outline:none">
        <button onclick="doLogin()" style="width:100%;font-size:.9rem;font-weight:700;color:#fff;background:#7c3aed;border:none;border-radius:8px;padding:11px;cursor:pointer">Sign in</button>
        <div id="login-msg" style="color:#dc2626;font-size:.8rem;margin-top:10px;min-height:1em"></div>
        <div style="font-size:.7rem;color:#c4b5fd;margin-top:8px">First time? Enter your email and choose a password — it's saved for next time.</div>
      </div>`;
    document.body.appendChild(el);
  }
  el.style.display = "flex";
  if (msg) document.getElementById("login-msg").textContent = msg;
}
async function doLogin(){
  const email = (document.getElementById("login-email").value || "").trim().toLowerCase();
  const pw = document.getElementById("login-pw").value || "";
  const setMsg = m => { document.getElementById("login-msg").textContent = m; };
  // Private gate: the gate verifies the password and returns the data.
  if (DATA_GATE_URL) {
    if (!email) return setMsg("Enter your email.");
    if (!pw)    return setMsg("Enter your password.");
    setMsg("Signing in…");
    try {
      const res = await fetch(DATA_GATE_URL, { method: "POST", body: JSON.stringify({ type: "auth", email, code: pw }) });
      const j = await res.json();
      if (!j || !j.ok) return setMsg((j && j.error) || "Sign-in failed.");
      window._gateToken = j.token;
      window._gateData = j.data ? JSON.parse(j.data) : null;
      localStorage.setItem("forge_user", JSON.stringify({ email, role: j.role, token: j.token }));
      return _startApp(email, j.role);
    } catch (e) { return setMsg("Couldn't reach the sign-in service — try again."); }
  }
  const role = ACCOUNTS[email];
  if (!role) return setMsg("That email isn't set up for the dashboard.");
  if (!pw)   return setMsg("Enter a password.");
  await loadAtRiskState();
  const key = "user:" + email, hash = await _sha256(pw), rec = sharedGet(key, null);
  if (!rec || !rec.pw) { await sharedSet(key, { pw: hash }); }   // first sign-in sets the password
  else if (rec.pw !== hash) return setMsg("Wrong password.");
  localStorage.setItem("forge_user", JSON.stringify({ email, role }));
  _startApp(email, role);
}
function logout(){ window._gateToken = ""; localStorage.removeItem("forge_user"); location.reload(); }
function _startApp(email, role){
  ROLE = role;
  window._coachEmail = role === "coach" ? email : "";
  const ls = document.getElementById("login-screen"); if (ls) ls.style.display = "none";
  loadData().then(render).then(() => {
    // Clearly-visible logout control, pinned top-right on the white dashboard.
    if (!document.getElementById("logout-btn")) {
      const b = document.createElement("button");
      b.id = "logout-btn"; b.textContent = "⎋ Log out";
      b.title = "Signed in as " + email + " — click to log out";
      b.style.cssText = "position:fixed;top:12px;right:16px;z-index:1000;font-size:.74rem;font-weight:700;color:#7c3aed;background:#fff;border:1px solid #e9e4fb;border-radius:9px;padding:7px 14px;cursor:pointer;box-shadow:0 2px 10px rgba(17,17,17,.10)";
      b.onmouseenter = () => { b.style.background = "#f5f3ff"; };
      b.onmouseleave = () => { b.style.background = "#fff"; };
      b.onclick = logout;
      document.body.appendChild(b);
    }
  }).catch(err => {
    if (err && err._reauth) {   // gate session expired → back to the login
      window._gateToken = ""; localStorage.removeItem("forge_user");
      _loginScreen("Your session expired — please sign in again.");
      return;
    }
    document.body.insertAdjacentHTML("beforeend", `<div style="padding:24px;color:#dc2626;font-family:sans-serif">Error: ${err.message}</div>`);
  });
}
// Boot: preload the shared-store URL from the redacted (safe, public) file so
// login passwords sync across devices, then resume a session or show the login.
(function boot(){
  let u = null; try { u = JSON.parse(localStorage.getItem("forge_user") || "null"); } catch (e) {}
  // Private-gate mode: resume with the saved session token; no public preflight.
  if (DATA_GATE_URL) {
    if (u && u.email && u.token) { window._gateToken = u.token; _startApp(u.email, u.role || ACCOUNTS[u.email] || "owner"); }
    else _loginScreen();
    return;
  }
  // Public-file mode (default): preload the shared-store URL from the redacted
  // file so login passwords sync across devices, then resume or show the login.
  const go = () => {
    if (u && u.email && ACCOUNTS[u.email]) _startApp(u.email, ACCOUNTS[u.email]);
    else _loginScreen();
  };
  fetch("./data/coach-data.json?t=" + Date.now())
    .then(r => r.json())
    .then(d => { window._atRiskUrl = window._atRiskUrl || d.atrisk_url || ""; })
    .catch(() => {})
    .finally(go);
})();
</script>
