<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Forge — Owner Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #2d1b4e;
      color: #1a1a2e;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: #1e0f38;
      border-bottom: 1px solid #3d2464;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 30px; height: 30px; background: #7c3aed; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .header-meta { font-size: 0.72rem; color: #a894c9; }

    /* ── Grid ───────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      padding: 16px 18px;
      max-width: 1440px;
      margin: 0 auto;
      align-items: start;
    }
    /* Members grid: cards in each row stretch to equal height for a clean, aligned layout */
    #grid-members { align-items: stretch; }
    #grid-members .card { overflow: hidden; }
    #grid-jumpstart { align-items: stretch; }
    /* Section divider headline (full width) */
    .sec-divider {
      grid-column: span 12; display: flex; align-items: center; gap: 12px;
      margin: 14px 2px 0; color: #fff;
    }
    .sec-divider .sec-label {
      font-size: .78rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: #d6c9ef; white-space: nowrap;
    }
    .sec-divider .sec-line { flex: 1; height: 1px; background: #4a2f75; }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.22);
      display: flex; flex-direction: column;
      transition: box-shadow .15s, transform .15s;
    }
    .card:hover { box-shadow: 0 8px 26px rgba(0,0,0,0.28); transform: translateY(-1px); }
    .card-title {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #9aa1ac; margin-bottom: 4px;
    }
    .card-headline {
      font-size: 1.1rem; font-weight: 700;
      color: #1f2430; margin-bottom: 14px;
      letter-spacing: -0.02em; line-height: 1.2;
    }

    .col-3  { grid-column: span 3; height: 580px; overflow-y: auto; }
    .col-3::-webkit-scrollbar { width: 4px; }
    .col-3::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-8  { grid-column: span 8; }
    .col-9  { grid-column: span 9; }
    .col-12 { grid-column: span 12; }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tab-bar {
      background: #1e0f38; border-bottom: 1px solid #3d2464;
      padding: 0 18px; display: flex; gap: 2px; overflow-x: auto;
      position: sticky; top: 59px; z-index: 90;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 12px 16px; font-size: .8rem; font-weight: 600;
      color: #a894c9; background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover  { color: #d6c9ef; }
    .tab-btn.active { color: #fff; border-bottom-color: #a78bfa; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Daily Brief ────────────────────────────────────────── */
    .brief-card { padding: 0; overflow: hidden; }
    .brief-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: none; border: none; cursor: pointer; text-align: left; gap: 12px;
    }
    .brief-header-left { display: flex; align-items: center; gap: 12px; }
    .brief-icon {
      width: 36px; height: 36px; background: #f5f3ff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    }
    .brief-label { font-size: .72rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .08em; }
    .brief-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .brief-chip {
      font-size: .72rem; font-weight: 700; padding: 2px 9px; border-radius: 20px;
    }
    .chip-purple { background: #f5f3ff; color: #7c3aed; }
    .chip-red    { background: #fef2f2; color: #ef4444; }
    .chip-green  { background: #f0fdf4; color: #059669; }
    .chip-amber  { background: #fffbeb; color: #d97706; }
    .brief-chevron { transition: transform .2s; flex-shrink: 0; }
    .brief-chevron.rotated { transform: rotate(180deg); }
    .brief-collapsed { display: none; }
    .brief-panel { height: 440px; }
    /* Home: brief and tasks cards match height, each scrolls internally */
    .brief-card { height: 600px; }
    .brief-card .brief-body { flex: 1; overflow-y: auto; }
    .tasks-card { height: 440px; }
    .tasks-card .task-list { flex: 1; overflow-y: auto; max-height: none !important; }
    .brief-body { border-top: 1px solid #f3f4f6; }
    .brief-body::-webkit-scrollbar { width: 3px; }
    .brief-body::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
    .brief-cols {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }
    .brief-col { padding: 10px 16px; }
    .brief-col + .brief-col { border-left: 1px solid #f3f4f6; }
    .brief-col-title {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid;
    }
    .brief-col-title--purple { color: #7c3aed; border-color: #ede9fe; }
    .brief-col-title--red    { color: #ef4444; border-color: #fee2e2; }
    .brief-col-title--green  { color: #059669; border-color: #d1fae5; }
    .brief-col-title--amber  { color: #d97706; border-color: #fde68a; }
    .brief-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid #f9fafb;
    }
    .brief-row:last-child { border-bottom: none; }
    .brief-time { min-width: 48px; font-size: .72rem; font-weight: 700; color: #7c3aed; padding-top: 2px; }
    .brief-row-title { font-size: .82rem; font-weight: 600; color: #111; line-height: 1.3; }
    .brief-row-sub { font-size: .72rem; color: #999; margin-top: 2px; line-height: 1.4; }
    .brief-email-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-red    { background: #ef4444; }
    .dot-purple { background: #7c3aed; }
    .brief-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #d1fae5;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: #059669; flex-shrink: 0;
    }
    .brief-empty { font-size: .8rem; color: #ccc; padding: 6px 0; }
    .brief-row-link { text-decoration: none; color: inherit; cursor: pointer; }
    .brief-row-link:hover { background: #f9fafb; margin: 0 -8px; padding: 7px 8px; border-radius: 6px; }
    @media (max-width: 900px) {
      .brief-cols { grid-template-columns: 1fr; }
      .brief-col + .brief-col { border-left: none; border-top: 1px solid #f3f4f6; }
    }

    /* ── Big KPI ────────────────────────────────────────────── */
    .big-kpi { margin-bottom: 14px; }
    .big-kpi .number {
      font-size: 2.8rem; font-weight: 800;
      line-height: 1; letter-spacing: -0.04em; color: #111;
    }
    .big-kpi .number.green { color: #16a34a; }
    .big-kpi .sublabel { font-size: 0.72rem; color: #999; margin-top: 3px; }

    /* ── Pills ──────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill {
      padding: 4px 11px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; border: 1.5px solid;
      cursor: default;
    }
    .pill.green  { color: #16a34a; background: #f0fdf4; border-color: #bbf7d0; }
    .pill.amber  { color: #d97706; background: #fffbeb; border-color: #fde68a; }
    .pill.red    { color: #dc2626; background: #fef2f2; border-color: #fecaca; cursor: pointer; }
    .pill.grey   { color: #6b7280; background: #f9fafb; border-color: #e5e7eb; cursor: pointer; }
    .pill.purple { color: #7c3aed; background: #f5f3ff; border-color: #ddd6fe; }

    /* ── Stat rows ──────────────────────────────────────────── */
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #f3f4f6;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 0.82rem; color: #6b7280; }
    .stat-val   { font-size: 0.9rem; font-weight: 600; color: #111; }
    .stat-val.green { color: #16a34a; }
    .stat-val.red   { color: #dc2626; }

    .inner-divider {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #d1d5db;
      padding: 10px 0 5px; border-top: 1px solid #f3f4f6; margin-top: 4px;
    }

    /* ── Membership scroll ──────────────────────────────────── */
    .membership-scroll {
      overflow-y: auto; max-height: 260px;
      margin-top: 4px;
    }
    .membership-scroll::-webkit-scrollbar { width: 4px; }
    .membership-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    /* ── P&L ────────────────────────────────────────────────── */
    .pl-sub .stat-label { padding-left: 10px; color: #9ca3af; }
    .pl-sub .stat-val   { color: #374151; font-weight: 500; }
    .pl-highlight .stat-label { color: #111; font-weight: 700; }
    .pl-highlight .stat-val   { font-size: 0.95rem; font-weight: 700; color: #111; }
    .pl-highlight .stat-val.green { color: #16a34a; }
    .pl-highlight .stat-val.red   { color: #dc2626; }

    /* ── Task list ──────────────────────────────────────────── */
    .task-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }
    .task-list::-webkit-scrollbar { width: 4px; }
    .task-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #f3f4f6;
    }
    .task-item:last-child { border-bottom: none; }
    .task-bar {
      width: 3px; border-radius: 2px; align-self: stretch;
      flex-shrink: 0; min-height: 32px; background: #e5e7eb;
    }
    .task-bar.overdue { background: #dc2626; }
    .task-bar.today   { background: #d97706; }
    .task-bar.soon    { background: #7c3aed; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 0.88rem; color: #1f2937; line-height: 1.35; }
    .task-name a { color: #1f2937; text-decoration: none; }
    .task-name a:hover { color: #7c3aed; }
    .task-footer { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
    .task-proj {
      font-size: 0.7rem; color: #9ca3af;
      background: #f3f4f6; padding: 1px 7px; border-radius: 3px;
    }
    .task-due { font-size: 0.72rem; font-weight: 600; }
    .task-due.overdue { color: #dc2626; }
    .task-due.today   { color: #d97706; }
    .task-due.soon    { color: #7c3aed; }
    .task-due.later   { color: #d1d5db; }

    /* ── Action plan table ──────────────────────────────────── */
    .ap-wrap { overflow-x: auto; }
    .ap-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .ap-table th {
      text-align: left; padding: 7px 12px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #bbb; border-bottom: 1px solid #f0f0f5;
    }
    .ap-table td {
      padding: 10px 12px; border-bottom: 1px solid #f9f9fc;
      color: #374151; vertical-align: top;
    }
    .ap-table tr:last-child td { border-bottom: none; }
    .ap-table tr:hover td { background: #fafafa; }
    .ap-table td:first-child { color: #111; font-weight: 500; font-size: 0.85rem; }
    .ap-owner {
      display: inline-block; font-size: 0.7rem;
      background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #6b7280;
    }
    .ap-deadline { font-size: 0.78rem; color: #6b7280; }
    .ap-done { color: #16a34a; font-weight: 700; font-size: 1rem; }
    .ap-todo { color: #e5e7eb; font-size: 1rem; }
    .ap-btn {
      border: none; border-radius: 6px; padding: 4px 10px;
      font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .ap-btn:disabled { opacity: .5; cursor: wait; }
    .ap-btn-done { background: #dcfce7; color: #16a34a; }
    .ap-btn-todo { background: #f3f4f6; color: #9ca3af; }
    .ap-btn-todo:hover { background: #e0e7ff; color: #4f46e5; }

    /* ── Mini table (marketing) ─────────────────────────────── */
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 2px; }
    .mini-table th {
      text-align: left; padding: 5px 0; color: #bbb;
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid #f0f0f5;
    }
    .mini-table td { padding: 7px 0; border-bottom: 1px solid #f9f9fc; color: #6b7280; }
    .mini-table tr:last-child td { border-bottom: none; }
    .mini-table td:first-child { color: #374151; font-weight: 500; }
    .mini-table .total td { color: #111; font-weight: 700; border-top: 2px solid #f0f0f5; }

    /* ── Modal ──────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(30,10,60,0.7); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 14px; padding: 24px 28px;
      min-width: 300px; max-width: 420px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; color: #111; margin-bottom: 14px; }
    .modal-list { list-style: none; }
    .modal-list li {
      padding: 8px 0; border-bottom: 1px solid #f3f4f6;
      font-size: 0.88rem; color: #374151;
    }
    .modal-list li:last-child { border-bottom: none; }
    .modal-close {
      margin-top: 18px; width: 100%; padding: 9px;
      background: #2d1b4e; color: #fff; border: none;
      border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
    }
    .modal-close:hover { background: #3d2464; }

    @media (max-width: 960px) {
      .col-3, .col-4, .col-6, .col-8, .col-9 { grid-column: span 12; }
    }
  </style>
</head>
<body>

<!-- Member names modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modal-title">Members</h3>
    <ul class="modal-list" id="modal-list"></ul>

      <a id="modal-asana-link" href="#" target="_blank" style="display:none;flex:1;align-items:center;justify-content:center;padding:9px;background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe;border-radius:8px;font-size:.85rem;font-weight:600;text-decoration:none">Open in Asana ↗</a>

<header>

<div class="tab-bar">

  <button class="tab-btn" onclick="switchTab('inbody',this)">InBody</button>
  <button class="tab-btn" onclick="switchTab('jumpstart',this)">Jumpstart</button>
  <button class="tab-btn" onclick="switchTab('programming',this)">Programming</button>
  <button class="tab-btn" onclick="switchTab('leads',this)">Leads</button>
  <button class="tab-btn" onclick="switchTab('ads',this)">Ads</button>
  <button class="tab-btn" onclick="switchTab('growth',this)">Growth</button>
  <button class="tab-btn" onclick="switchTab('staff',this)">Staff</button>

  <div class="grid" id="grid-home"><div class="card col-12"><p style="color:#aaa;font-size:.9rem;padding:8px 0">Loading…</p></div></div>
</div>

  <div class="grid" id="grid-finances"></div>
</div>

</div>

</div>

  <div class="grid" id="grid-staff"></div>
</div>

  <div class="grid" id="grid-sop"></div>
</div>

<script>
// ── Local persistence (survives refreshes, per browser) ───────
function lsGet(key, def) { try { const v = localStorage.getItem(key); return v == null ? def : JSON.parse(v); } catch (e) { return def; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }
const fmtShort = iso => { if(!iso) return ""; const d = new Date(iso + (iso.length<=10?"T12:00:00":"")); return d.toLocaleDateString("en-IE",{day:"numeric",month:"short"}); };

// ── At-Risk: contacted / resolved ─────────────────────────────
// Shared across machines/users via a Google Apps Script store (data.atrisk_url).
// Falls back to this browser's localStorage when no shared URL is configured.
window._atRiskData = [];
window._atRiskUrl = "";
window._atRiskState = {};   // { "<name lower>": {contactedBy, contactedDate, resolved, resolvedDate} }
function _atKey(name){ return "atrisk:" + (name||"").toLowerCase(); }
function _atLower(name){ return (name||"").toLowerCase(); }
// Read a member's state: shared store first, else local
function atState(name) {
  if (window._atRiskUrl) return window._atRiskState[_atLower(name)] || {};
  return lsGet(_atKey(name), {});
}
// Persist a member's state to whichever store is active
async function atSave(name, s) {
  const key = _atLower(name);
  if (window._atRiskUrl) {
    window._atRiskState[key] = s;
    try {
      await fetch(window._atRiskUrl, { method: "POST",
        body: JSON.stringify({ type: "atrisk", name: key, state: s }) });
    } catch (e) { /* optimistic; will reconcile on next load */ }
  } else {
    lsSet(_atKey(name), s);
  }
}
// Load the whole shared state map once at startup
async function loadAtRiskState() {
  if (!window._atRiskUrl) return;
  try {
    const res = await fetch(window._atRiskUrl + (window._atRiskUrl.includes("?") ? "&" : "?") + "type=atrisk");
    const json = await res.json();
    if (json && typeof json === "object") window._atRiskState = json.state || json || {};
  } catch (e) { /* keep whatever we have */ }
}
// ── Generic shared flag store (same endpoint/localStorage as at-risk) ──
// Used for "Slack replied" ticks and dismissing "Today" hub items, so they
// sync across coaches when the shared store is configured.
function sharedGet(key, def) {
  if (window._atRiskUrl) { const v = window._atRiskState[key]; return v === undefined ? def : v; }
  return lsGet(key, def);
}
async function sharedSet(key, val) {
  if (window._atRiskUrl) {
    window._atRiskState[key] = val;

// ── Starling P&L (Finances tab): live render with drill-down + recategorise ──
// Category overrides live in the SHARED store (key "plcat:<txUid>"), so a change
// Grace makes is seen by JoJo on the next load, and vice-versa.
window._plActiveMonth = null;
const _plEsc = t => String(t == null ? "" : t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const _plMonLbl = ym => new Date(ym + "-15").toLocaleDateString("en-IE", { month: "long", year: "numeric" });
const _plShort  = ym => new Date(ym + "-15").toLocaleDateString("en-IE", { month: "short", year: "2-digit" });
const _plDate   = iso => { const d = new Date(iso); return isNaN(d) ? (iso||"") : d.toLocaleDateString("en-IE", { day: "numeric", month: "short" }); };
function _plCatOf(t) { return sharedGet("plcat:" + t.uid, null) || t.category; }

// Aggregate a month, applying any per-transaction category overrides.
function _plAgg(m) {
  const txs = m.transactions;
  if (!txs || !txs.length) {  // older months: totals only, no drill-down
    return { detail:false, in:(m.categories||{}).in||[], out:(m.categories||{}).out||[],
             revenue:m.revenue, expenses:m.expenses, profit:m.profit, internal:[], internalTotal:0 };
  }
  const inMap={}, outMap={}, catTx={}, internal=[]; let rev=0, exp=0, intTot=0;
  txs.forEach(t => {
    if (t.internal) { internal.push(t); intTot += t.direction==="OUT" ? t.amount : -t.amount; return; }
    const cat = _plCatOf(t);
    (catTx[t.direction+"|"+cat] = catTx[t.direction+"|"+cat] || []).push(t);
    if (t.direction==="IN")  { inMap[cat]=(inMap[cat]||0)+t.amount;  rev+=t.amount; }
    else if (t.direction==="OUT") { outMap[cat]=(outMap[cat]||0)+t.amount; exp+=t.amount; }
  });
  const arr = mp => Object.entries(mp).map(([name,amount])=>({name,amount:Math.round(amount*100)/100})).sort((a,b)=>b.amount-a.amount);
  const allCats = [...new Set(txs.map(_plCatOf))].sort();
  return { detail:true, in:arr(inMap), out:arr(outMap), catTx, internal,
           internalTotal:Math.round(intTot*100)/100,
           revenue:Math.round(rev*100)/100, expenses:Math.round(exp*100)/100, profit:Math.round((rev-exp)*100)/100, allCats };
}

function filterLapsed(id, month, q) {
  const wrap = document.getElementById(id + "-rows");
  if (!wrap) return;
  if (month != null) {
    filterLapsed._month = filterLapsed._month || {};
    filterLapsed._month[id] = month;
    const s = document.getElementById(id + "-search"); if (s) s.value = "";
    document.querySelectorAll(`#${id}-chips button`).forEach(b => {
      const on = (b.getAttribute("data-month") || "") === (month || "");
      b.style.background = on ? "#7c3aed" : (b.getAttribute("data-month") ? "#f7f7fb" : "#f5f3ff");
      b.style.color = on ? "#fff" : (b.getAttribute("data-month") ? "#6b7280" : "#7c3aed");
    });
  }
  const text = (q || "").toLowerCase().trim();
  // Typing searches across all months — reset the month filter so results aren't hidden.
  if (text) {
    filterLapsed._month = filterLapsed._month || {}; filterLapsed._month[id] = "";
    document.querySelectorAll(`#${id}-chips button`).forEach(b => {
      const isAll = !b.getAttribute("data-month");
      b.style.background = isAll ? "#f5f3ff" : "#f7f7fb";
      b.style.color = isAll ? "#7c3aed" : "#6b7280";
    });
  }
  const activeMonth = (filterLapsed._month && filterLapsed._month[id]) || "";
  wrap.querySelectorAll(".lapsed-row").forEach(row => {
    const okMonth = !activeMonth || row.getAttribute("data-month") === activeMonth;
    const okText  = !text || row.getAttribute("data-name").includes(text) ||
      (row.getAttribute("data-monthlabel") || "").includes(text);
    row.style.display = (okMonth && okText) ? "" : "none";
  });
}

// Link an unmatched InBody record (e.g. "amy102") to a real member. Saved to the
// shared store so the mapping sticks and syncs to every coach; then re-render.
async function linkInbody(handle, current) {
  const names = window._inbodyNames || [];
  const q = (prompt(`Which member is the InBody record “${current}”?\nType part of their name:`) || "").trim().toLowerCase();
  if (!q) return;
  const matches = names.filter(n => (n||"").toLowerCase().includes(q));
  if (!matches.length) { alert(`No member matches “${q}”.`); return; }
  let name = matches[0];
  if (matches.length > 1) {
    name = (prompt(`Several matches — type the exact name:\n\n${matches.join("\n")}`) || "").trim();
    if (!name || !names.includes(name)) return;
  }
  await sharedSet("inbodymap:" + handle, name);
  if (window._data) render(window._data);   // rebuild so the row resolves now
}

function fmt(val, prefix = "") {
  if (val === null || val === undefined) return `<span style="color:#ddd">—</span>`;
  if (typeof val === "number") return `${prefix}${val.toLocaleString("en-IE", { maximumFractionDigits: 0 })}`;

}

}

function _chatEsc(t){ return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function _chatFmt(t){
  const linkify = s => s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#7c3aed;text-decoration:underline;word-break:break-all">$1</a>');
  return _chatEsc(t).split(/\n/).map(l => l.trim()).filter(l => l.length).map(l => {
    l = linkify(l.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>"));
    if (/^#{1,4}\s+/.test(l))    return `<div style="font-weight:700;color:#5b21b6;margin:3px 0 4px">${l.replace(/^#{1,4}\s+/,"")}</div>`;

    if (/^do this:/i.test(l))     return `<div style="margin-top:6px;font-weight:600;color:#7c3aed">${l}</div>`;
    return `<div style="margin:2px 0">${l}</div>`;
  }).join("");
}

function _downloadWord(title, htmlBody){

function _businessSnapshot(tab){
  const d = window._data || {}, tm = d.teamup || {}, st = d.starling || {}, mk = d.marketing || {};
  const snap = {
    members:   { active:tm.active, recurring:tm.recurring, trials:tm.trial, paused:tm.paused, joined_this_month:tm.joined_this_month, churn_pct:tm.churn },
    open_leads:      (d.ghl||[]).length,
    jumpstart_active:((d.jumpstart||{}).active||[]).length
  };
  if (tab === "finances") {   // only the finance agent sees money
    const thisYm = new Date().toISOString().slice(0,7);
    const lastFull = ((st.monthly||[]).filter(m => m.month !== thisYm).sort((a,b)=>b.month.localeCompare(a.month))[0]) || {};
    snap.money     = { cash_now:st.cash_position, net_last_30:st.net_30, last_full_month:{ month:lastFull.month, in:lastFull.revenue, out:lastFull.expenses, net:lastFull.profit } };
    snap.marketing = { lifetime_cpl:(mk.lifetime||{}).cpl, latest_month_spend:((mk.monthly||[])[0]||{}).spend };
  }
  return snap;
}

// Pre-computed trends & simple forecasts, so agents reason about DIRECTION
// accurately instead of eyeballing the raw series. April (studio move) and the
// current partial month are excluded from trend maths.
function _derived(tab){
  const d = window._data || {}, tm = d.teamup || {}, st = d.starling || {};
  const thisYm = new Date().toISOString().slice(0,7);
  const mons = (st.monthly||[]).filter(m => m.month !== thisYm && m.month !== "2026-04" && typeof m.profit === "number").sort((a,b)=>a.month.localeCompare(b.month));
  const nets = mons.map(m => m.profit);
  const avgNet = nets.length ? nets.slice(-4).reduce((a,b)=>a+b,0)/Math.min(4,nets.length) : null;
  const cash = st.cash_position;
  if (tab === "finances") {
    const last = mons[mons.length-1] || {};
    const runway = (cash!=null && avgNet!=null && avgNet<0) ? +(cash/-avgNet).toFixed(1) : (avgNet!=null && avgNet>=0 ? "cash-positive" : null);
    return {
      excludes: "April 2026 (studio move) + current partial month",
      avg_monthly_net_recent: avgNet!=null ? Math.round(avgNet) : null,
      runway_months: runway,
      last_3_months_net: mons.slice(-3).map(m => ({ month:m.month, net:Math.round(m.profit) })),
      revenue_per_member_last_month: (last.revenue!=null && tm.active) ? Math.round(last.revenue/tm.active) : null,
      cash_projection: (cash!=null && avgNet!=null) ? [1,2,3].map(n => ({ in_months:n, projected_cash:Math.round(cash + avgNet*n) })) : null
    };
  }
  if (tab === "retention" || tab === "members") {
    const series = (tm.member_history||[]).map(h => ({ month:h.month, active:h.active, churn_pct:h.churn })).slice(-6);
    const churns = series.map(h => h.churn_pct).filter(v => typeof v === "number");
    const actives = series.map(h => h.active).filter(v => typeof v === "number");
    return {
      last_6_months: series,
      avg_churn_pct: churns.length ? +(churns.reduce((a,b)=>a+b,0)/churns.length).toFixed(1) : null,
      active_change_6mo: actives.length>=2 ? actives[actives.length-1]-actives[0] : null,
      note: "churn >5% is concerning, <3% good; judge the trend not one month"
    };
  }
  return null;
}

function _agentData(tab){
  const d = window._data || {}, tm = d.teamup || {}, st = d.starling || {};
  const slim = m => ({ month:m.month, revenue:m.revenue, expenses:m.expenses, profit:m.profit, categories:m.categories });
  switch (tab) {
    case "finances":  return { starling_monthly:(st.monthly||[]).slice(-8).map(slim), cash:{ position:st.cash_position, net_30:st.net_30, reserves:st.reserves, committed_monthly:st.committed_monthly }, gocardless:(d.gocardless||{}).monthly, stripe:(d.stripe||{}).monthly };
    case "retention": return { member_history:tm.member_history, lapsed_full:tm.lapsed_full_by_month, lapsed_trials:tm.lapsed_trials_by_month, class_stats:tm.class_stats, snapshot:{ active:tm.active, recurring:tm.recurring, trial:tm.trial, paused:tm.paused, churn:tm.churn } };
    case "members":   return { snapshot:{ active:tm.active, recurring:tm.recurring, trial:tm.trial, paused:tm.paused, leaving:tm.cancellations_this_month, by_type:tm.by_membership_type, joined_this_month:tm.joined_this_month, churn:tm.churn } };
    case "inbody":    return { scans:(d.inbody&&d.inbody.scans||[]).slice(0,80) };
    case "jumpstart": return d.jumpstart || {};
    case "programming": return { programming_system: PROGRAMMING };
    case "leads":     return { leads:d.ghl };
    case "ads":       return d.marketing || {};
    case "growth":    return d.growth_sprint || {};
    case "staff":     return d.staff || {};
    case "sop":       return d.sop || {};
    case "home":      return { brief:d.brief, enquiries:d.ghl, slack:{ dms:(d.slack||{}).unreplied_dms } };
    default:          return { snapshot:{ active:tm.active, recurring:tm.recurring } };
  }
}

// Full context = Forge facts + this agent's expert lens + the live tab data.
function _agentContext(tab){
  const payload = {
    forge_context: FORGE_FACTS,
    expertise: AGENT_SKILLS[tab] || {},
    whole_business: _businessSnapshot(tab),   // cross-tab awareness (money → finance agent only)
    computed_metrics: _derived(tab),       // trends + simple forecasts
    agent_protocol: "You can take actions, not just answer. ONLY when the user clearly asks you to do one, END your reply with a fenced ```action block containing one JSON object. Types: {\"type\":\"flag_risk\",\"member\":\"Full Name\",\"reason\":\"...\"}; {\"type\":\"unflag_risk\",\"member\":\"Full Name\"}; {\"type\":\"add_note\",\"member\":\"Full Name\",\"note\":\"...\"}; {\"type\":\"draft_message\",\"member\":\"Full Name\",\"text\":\"the drafted message\"}. Use members' real names from the data. Grace approves every action with a button, so propose freely but never claim it's already done. If the user is just asking a question, do NOT include an action block.",
    data: _agentData(tab)
  };
  let s = JSON.stringify(payload);
  return s.length > 18000 ? s.slice(0, 18000) + "…(truncated)" : s;
}

// Shared send path for both a typed question and the Insights button.
// Apps Script occasionally returns an HTML page instead of JSON (cold start /
// transient Google hiccup), so we read as text, parse defensively, and retry
// once before surfacing a friendly message — never a raw SyntaxError.
async function _agentSend(tab, question, showAsYou){
  document.getElementById("chat-thread-" + tab).style.display = "flex";
  if (showAsYou) _chatBubble(tab, "you", _chatEsc(showAsYou));
  const hist = (window._chatHist = window._chatHist || {});
  const prior = (hist[tab] = hist[tab] || []).slice(-8);   // prior turns only
  if (!window._chatUrl) {
    _chatBubble(tab, "agent", "⚠️ Chat isn't connected yet. Deploy <b>docs/chat_apps_script.gs</b> and add its URL as the <b>CHAT_SCRIPT_URL</b> secret — then I can answer from live data.");
    return;
  }
  const bubble = _chatBubble(tab, "agent", "<span style='color:#a78bda'>thinking…</span>");
  const payload = JSON.stringify({ tab, question, history:prior, context:_agentContext(tab) });
  let ans = null, sawLogin = false;
  for (let attempt = 0; attempt < 2 && ans === null; attempt++) {
    try {
      const res = await fetch(window._chatUrl, { method:"POST", body: payload });
      const txt = await res.text();
      let j = null; try { j = JSON.parse(txt); } catch (_) {}
      if (j) { ans = j.answer || j.error || "No answer returned."; }
      else {
        if (/ServiceLogin|AccountChooser|accounts\.google/.test(txt)) sawLogin = true;
        if (attempt === 0) { bubble.innerHTML = "<span style='color:#a78bda'>the AI hiccuped — retrying…</span>"; await new Promise(r => setTimeout(r, 1500)); }
      }
    } catch (e) {
      if (attempt === 0) { await new Promise(r => setTimeout(r, 1500)); }
      else { ans = "⚠️ Couldn't reach the agent (" + _chatEsc(String(e)) + ")."; }
    }
  }
  if (ans === null) {
    ans = sawLogin
      ? "⚠️ The chat endpoint asked for a Google login — its deployment may have reverted to domain-only. Re-deploy the chat script with access set to \"Anyone\"."
      : "⚠️ The AI service returned an error page (a temporary Google/Apps Script hiccup). Please tap Ask again — it usually works on the next try.";
  }
  if (ans.startsWith("⚠️")) bubble.innerHTML = _chatFmt(ans);
  else { _renderAgentReply(tab, bubble, ans); hist[tab].push({ role:"user", content:question }, { role:"assistant", content:ans }); }
  document.getElementById("chat-thread-" + tab).scrollTop = 1e9;
}

// Render the agent's reply, pulling out any ```action blocks into approve cards.
window._agentActions = [];
function _renderAgentReply(tab, bubble, ans){
  const actions = [];
  const text = ans.replace(/```action\s*([\s\S]*?)```/g, (m, body) => {
    try { const a = JSON.parse(body.trim()); if (a && a.type) actions.push(a); } catch (_) {}
    return "";
  }).trim();
  bubble.innerHTML = _chatFmt(text || "…");
  const thread = document.getElementById("chat-thread-" + tab);
  // Programme Designer replies get a "Download as Word" button
  if (tab === "programming" && text.length > 120) {
    const dl = document.createElement("button");
    dl.textContent = "⬇ Download as Word";
    dl.style.cssText = "align-self:flex-start;margin-top:2px;font-size:.74rem;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:7px;padding:6px 13px;cursor:pointer";
    dl.onclick = () => _downloadWord("Forge Programme", bubble.innerHTML);
    thread.appendChild(dl);
  }
  actions.forEach(a => {
    const idx = window._agentActions.push(a) - 1;
    const card = document.createElement("div");
    card.className = "agent-action-card";
    if (a.type === "draft_message") {
      card.style.cssText = "align-self:flex-start;max-width:95%;background:#fff;border:1px dashed #ddd6fe;border-radius:12px;padding:10px 12px;margin-top:2px";
      card.innerHTML = `<div style="font-weight:700;color:#7c3aed;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Draft${a.member?` · ${_chatEsc(a.member)}`:""}</div>
        <div id="draft-${idx}" style="white-space:pre-wrap;color:#1f2937;font-size:.84rem;line-height:1.5">${_chatEsc(a.text||"")}</div>
        <button onclick="_copyDraft(${idx},this)" style="margin-top:8px;font-size:.72rem;font-weight:700;color:#7c3aed;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:7px;padding:5px 12px;cursor:pointer">Copy</button>`;
    } else if (a.type === "flag_risk" || a.type === "unflag_risk" || a.type === "add_note") {
      const label = a.type === "flag_risk" ? `Flag ${a.member} as at-risk`
                  : a.type === "unflag_risk" ? `Remove at-risk flag from ${a.member}`
                  : `Add a note to ${a.member}`;
      card.style.cssText = "align-self:flex-start;max-width:95%;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:10px 12px;margin-top:2px;font-size:.84rem";
      card.innerHTML = `<div style="color:#111;margin-bottom:7px">🛠 <b>${_chatEsc(label)}</b>${a.note?`<div style="color:#6b7280;margin-top:3px">"${_chatEsc(a.note)}"</div>`:""}${a.reason?`<div style="color:#6b7280;margin-top:3px">${_chatEsc(a.reason)}</div>`:""}</div>
        <div style="display:flex;gap:8px">
          <button onclick="applyAgentAction(${idx},this)" style="font-size:.74rem;font-weight:700;color:#fff;background:#7c3aed;border:none;border-radius:7px;padding:5px 13px;cursor:pointer">Apply</button>
          <button onclick="this.closest('.agent-action-card').remove()" style="font-size:.74rem;color:#9ca3af;background:#fff;border:1px solid #eee;border-radius:7px;padding:5px 13px;cursor:pointer">Dismiss</button>
        </div>`;
    } else { return; }
    thread.appendChild(card);
  });
  thread.scrollTop = 1e9;
}
function _copyDraft(idx, btn){ const el = document.getElementById("draft-"+idx); if (el && navigator.clipboard){ navigator.clipboard.writeText(el.textContent); btn.textContent = "Copied ✓"; } }
async function applyAgentAction(idx, btn){
  const a = window._agentActions[idx]; if (!a) return;
  const name = a.member || "";
  btn.disabled = true; btn.textContent = "Applying…";
  try {
    if (a.type === "flag_risk")   { const s = { ...atState(name) }; s.manual = true; delete s.resolved; delete s.resolvedSeen; await atSave(name, s); if (typeof renderAtRisk === "function") renderAtRisk(); }
    else if (a.type === "unflag_risk") { const s = { ...atState(name) }; delete s.manual; await atSave(name, s); if (typeof renderAtRisk === "function") renderAtRisk(); }
    else if (a.type === "add_note") { const k = "note:" + name.toLowerCase(); const ex = sharedGet(k, "") || ""; await sharedSet(k, ex ? ex + "\n" + a.note : a.note); }
    btn.closest(".agent-action-card").innerHTML = `<div style="color:#059669;font-weight:600;font-size:.84rem">✓ Done${a.type==="add_note"?" — note saved":a.type==="flag_risk"?" — flagged at-risk":" — flag removed"} · syncs to JoJo</div>`;
  } catch (e) { btn.disabled = false; btn.textContent = "Retry"; }
}

    }

    const miniBars = (series, colour, suffix) => {
      const vals = series.filter(s => s.v != null);

  // ── Cash flow / runway forecast (30/60/90) ────────────────────
  (function cashFlow() {
    const months = kpiData.months || [];   // newest-first
    const mval = (mo, name) => {
      for (const cat of (mo.categories || []))
        for (const it of (cat.items || []))
          if ((it.name||"").toLowerCase().startsWith(name.toLowerCase())) {
            const n = parseFloat(String(it.value).replace(/[^0-9.\-]/g,"")); return isNaN(n)?null:n;
          }
      return null;
    };
    // Net cash per month = revenue − people − non-people − owner pay
    const nets = months.map(mo => {
      const rev = mval(mo, "Revenue"); if (rev == null) return null;
      const p = mval(mo,"Expenses - People")||0, np = mval(mo,"Expenses - Non-People")||0, op = mval(mo,"Owner Pay")||0;
      return rev - p - np - op;
    }).filter(v => v != null);
    // Average recent months, dropping the worst outlier (e.g. April studio move)
    let avgNet = null;
    if (nets.length) {
      const recent = nets.slice(0, 4);
      const trimmed = recent.length >= 3 ? recent.filter(v => v !== Math.min(...recent)) : recent;
      avgNet = trimmed.reduce((a,b)=>a+b,0) / trimmed.length;

    // Prefer live Starling; fall back to Xero BankSummary, then KPI-only.

    // Monthly net cash: Starling's actual last-30-day net if we have it, else KPI avg
    const monthlyNet = (st.net_30 != null) ? st.net_30 : avgNet;
    const gbp = v => (v<0?"-£":"£") + Math.abs(Math.round(v)).toLocaleString("en-IE");
    const proj = n => cash != null ? gbp(cash + (monthlyNet||0)*n)
               : (monthlyNet!=null ? (monthlyNet*n>=0?"+":"") + gbp(monthlyNet*n) : "—");
    const runwayMonths = (cash != null && monthlyNet != null && monthlyNet < 0) ? (cash / -monthlyNet) : null;
    const src = useStarling ? "Starling (live)" : (cash!=null ? "Xero" : "KPI sheet");

    const box = (label, val, sub) => `

        ${sopGapN ? `<div style="font-size:.72rem;color:#9ca3af;margin-top:10px">Plus ${sopGapN} gap${sopGapN!==1?"s":""} with no SOP yet — see the Fractional COO box above for the full list.</div>` : ""}
      ` : `<p style="color:#ccc;font-size:.85rem;padding:8px 0">No SOP data — check the sheet is shared with the service account.</p>`}
    </div>
  `);

  // One card per cadence section
  sopSections.forEach(section => {
    const builtN = section.items.filter(i => i.built).length;
    push("sop", `
      <div class="card col-4" style="height:340px">
        <div class="card-headline" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:.95rem">${section.name}</span>
          <span style="font-size:.72rem;font-weight:700;color:#059669;white-space:nowrap">${builtN}/${section.items.length}</span>
        </div>
        <div style="overflow-y:auto;flex:1">
          ${section.items.map(it => `
            <div class="stat-row" style="gap:10px;padding:6px 0">
              <div style="min-width:0;flex:1">
                <div style="font-size:.82rem;font-weight:600;color:#111">${it.built ? "✅" : "⬜"} ${it.task}</div>
                <div style="font-size:.7rem;color:#aaa">${it.type}${it.owner ? " · " + it.owner : ""}</div>
              </div>
            </div>`).join("")}
        </div>
      </div>
    `);
  });

  // ── Leads ──────────────────────────────────────────────────
  const ghlConvos      = Array.isArray(data.ghl)              ? data.ghl              : [];
  const briefEnquiries = Array.isArray(data.brief?.enquiries) ? data.brief.enquiries : [];
  const leadBookings   = Array.isArray(tm.lead_bookings)      ? tm.lead_bookings      : [];
  const allLeads       = [
    ...leadBookings.map(b => ({
      name: b.name,
      message: `${b.upcoming ? "Booked in for" : "Came in for"} ${b.type} · ${fmtDateShort(b.date)}`,
      source: /sales|personal training|pt/i.test(b.type) ? "PT sales call" : "Meet a Coach",
      age: b.upcoming ? "upcoming" : "",
    })),
    ...ghlConvos.map(c => ({...c, source: c.channel || "WhatsApp"})),
    ...briefEnquiries.map(e => ({name: e.name, message: e.snippet, source: "Email", age: ""})),
  ];
  const sourceCounts = allLeads.reduce((a, l) => { a[l.source] = (a[l.source]||0)+1; return a; }, {});

  // ── Conversion Funnel ──────────────────────────────────────
  // Funnel stages: Open Leads → Jumpstart Trial → Full Member (Elevate/Evolve/Empower)
  const openLeads       = allLeads.length;
  const activeTrials    = tm.trial     ?? 0;   // current Jumpstarters in TeamUp
  const recurringMembers = tm.recurring ?? 0;  // Elevate / Evolve / Empower members
  const totalMembers    = tm.total_members ?? 0;

  // From the jumpstart tracker — monthly conversion history
  const jsMonthly = data.jumpstart?.monthly ?? [];
  const thisMonth = new Date().toISOString().slice(0, 7);
  const curMonth  = jsMonthly.find(m => m.month === thisMonth) || { month: thisMonth, completed: 0, converted: 0, conv_rate: null };
  const prevMonths = jsMonthly.filter(m => m.month !== thisMonth).slice(0, 4);
  const monthLabel = ym => new Date(ym + "-15").toLocaleDateString("en-IE", { month: "short" });

  const jsNotConverted = curMonth.completed - curMonth.converted;

  // LTV = real avg membership price (from TeamUp billed prices) × real avg tenure.
  // Tenure = average months members actually stayed, measured from those who
  // have fully left (join date → cancellation). No churn-rate extrapolation.
  const avgMonthlyRev  = tm.avg_member_price ?? ((xr.revenue && totalMembers) ? xr.revenue / totalMembers : null);
  const avgMonths      = tm.avg_tenure_months ?? null;
  const ltv            = avgMonthlyRev && avgMonths ? Math.round(avgMonthlyRev * avgMonths) : null;

  function funnelBar(pct) {
    const w = Math.max(8, Math.round(pct));
    const col = pct >= 60 ? "#059669" : pct >= 30 ? "#d97706" : "#ef4444";
    return `<div style="height:6px;background:#f3f4f6;border-radius:3px;margin-top:5px">
      <div style="height:100%;width:${w}%;background:${col};border-radius:3px;transition:width .4s"></div>
    </div>`;
  }
  function arrow() {
    return `<div style="text-align:center;color:#d1d5db;font-size:1.1rem;padding:2px 0">↓</div>`;
  }

  push("ads", `
    <div class="card col-4">
      <div class="card-title">Conversion</div>
      <div class="card-headline">Member Funnel</div>

      <div style="display:flex;flex-direction:column;gap:0">

        <div style="padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:.82rem;font-weight:600;color:#374151">Open Leads</span>
            <span style="font-size:1.4rem;font-weight:800;color:#111;letter-spacing:-.03em">${openLeads}</span>
          </div>
          <div style="font-size:.7rem;color:#aaa;margin-top:2px">Active enquiries right now (WhatsApp + email)</div>
          ${funnelBar(100)}
        </div>

        ${arrow()}

        <div style="padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:.82rem;font-weight:600;color:#374151">6 Week Jumpstart</span>
            <span style="font-size:1.4rem;font-weight:800;color:#111;letter-spacing:-.03em">${activeTrials}</span>
          </div>
          <div style="font-size:.7rem;color:#aaa;margin-top:2px">Currently on trial</div>
          ${openLeads > 0 ? funnelBar(Math.round(activeTrials / Math.max(openLeads,1) * 100)) : funnelBar(0)}
        </div>

        ${arrow()}

        <div style="padding:10px 0;border-bottom:1px solid #f3f4f6">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:.82rem;font-weight:600;color:#374151">Trial → Member <span style="font-size:.68rem;font-weight:500;color:#aaa">this month</span></span>
            <span style="font-size:1.4rem;font-weight:800;color:${(curMonth.conv_rate||0)>=60?'#059669':'#d97706'};letter-spacing:-.03em">${curMonth.conv_rate != null ? curMonth.conv_rate + "%" : "—"}</span>
          </div>
          <div style="font-size:.7rem;color:#aaa;margin-top:2px">
            ${curMonth.completed ? `${curMonth.converted} of ${curMonth.completed} trials finishing this month converted` : "No trials finishing this month yet"}
          </div>
          ${curMonth.conv_rate != null ? funnelBar(curMonth.conv_rate) : ""}
          ${prevMonths.length ? `
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
              ${prevMonths.map(m => `
                <span style="font-size:.68rem;background:#f9fafb;border:1px solid #f3f4f6;border-radius:6px;padding:3px 8px;color:#6b7280">
                  <b style="color:#374151">${monthLabel(m.month)}</b> ${m.converted}/${m.completed} · ${m.conv_rate}%
                </span>`).join("")}
            </div>` : ""}
        </div>

      </div>

      ${jsNotConverted > 0 ? `
        <div style="margin-top:12px;padding:8px 12px;background:#fef2f2;border-radius:8px;border-left:3px solid #ef4444">
          <span style="font-size:.75rem;color:#dc2626;font-weight:600">${jsNotConverted} trial${jsNotConverted!==1?"s":""} didn't convert</span>
          <span style="font-size:.72rem;color:#aaa"> — review follow-up process</span>
        </div>` : ""}
    </div>
  `);

  // ── Lifetime Value ─────────────────────────────────────────
  push("ads", `
    <div class="card col-4">
      <div class="card-title">Revenue Intelligence</div>
      <div class="card-headline">Customer Lifetime Value</div>

      <div class="big-kpi">
        <div class="number ${ltv ? 'green' : ''}">${ltv ? fmtGbp(ltv) : "—"}</div>
        <div class="sublabel">Estimated LTV per member</div>
      </div>

      <div class="inner-divider">How this is calculated</div>
      <div class="stat-row">
        <span class="stat-label">Avg paid per member / mo${tm.avg_member_price ? " (real billed prices)" : ""}</span>
        <span class="stat-val">${avgMonthlyRev ? fmtGbp(Math.round(avgMonthlyRev)) : "—"}</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Recurring members</span>
        <span class="stat-val">${recurringMembers}</span>
      </div>
      ${tm.monthly_recurring_revenue ? `
      <div class="stat-row">
        <span class="stat-label">Monthly recurring revenue</span>
        <span class="stat-val">${fmtGbp(Math.round(tm.monthly_recurring_revenue))}</span>
      </div>` : ""}
      <div class="stat-row">
        <span class="stat-label">Avg months stayed ${avgMonths ? "(members who've left)" : ""}</span>
        <span class="stat-val">${avgMonths ? avgMonths + " months" : "— (no cancellations yet)"}</span>
      </div>
      <div class="stat-row pl-highlight" style="margin-top:6px;border-top:2px solid #f0f0f5;padding-top:8px">
        <span class="stat-label">LTV (price × months stayed)</span>
        <span class="stat-val green">${ltv ? fmtGbp(ltv) : "—"}</span>
      </div>

      ${recurringMembers > 0 ? `
        <div class="inner-divider">Recurring members fleet value</div>
        <div class="stat-row">
          <span class="stat-label">Total fleet LTV</span>
          <span class="stat-val green">${ltv ? fmtGbp(ltv * recurringMembers) : "—"}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Each new conversion worth</span>
          <span class="stat-val green">${ltv ? fmtGbp(ltv) : "—"} over their lifetime</span>
        </div>` : ""}
    </div>
  `);

  // ── Open Conversations (new Leads tab) ─────────────────────
  push("leads", `
    <div class="card col-12">
      <div class="card-title">Leads &amp; Enquiries</div>
      <div class="card-headline">Incoming Leads</div>
      ${Object.keys(sourceCounts).length ? `
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
          ${Object.entries(sourceCounts).map(([s,n]) => `<span class="brief-chip chip-amber">${n} via ${s}</span>`).join("")}
        </div>` : ""}
      ${allLeads.length ? `
        <div style="display:flex;flex-direction:column;gap:0">
          ${allLeads.map(l => `
            <div class="brief-row" style="align-items:center">
              <div class="brief-avatar" style="background:#fef9c3;color:#a16207">${(l.name||"?")[0].toUpperCase()}</div>
              <div style="min-width:0;flex:1">
                <div class="brief-row-title">${l.name} <span style="font-size:.68rem;color:#aaa;font-weight:400">${l.source}</span></div>
                <div class="brief-row-sub">${(l.message||"").substring(0,120)}</div>
              </div>
              ${l.age ? `<div style="font-size:.68rem;color:#ccc;white-space:nowrap">${l.age}</div>` : ""}
            </div>`).join("")}
        </div>` : `<p style="color:#ccc;font-size:.85rem">No open leads right now. Sources: WhatsApp &amp; webchat (via GoHighLevel) and email enquiries. Connect Instagram &amp; Facebook in GoHighLevel to pull those DMs in here too.</p>`}
    </div>
  `);

  // ── Programming library ────────────────────────────────────
  (function programming() {
    const P = PROGRAMMING;
    const li = arr => arr.map(x => `<li style="padding:4px 0;line-height:1.5;color:#1f2937;display:flex;gap:8px;list-style:none"><span style="color:#7c3aed;flex-shrink:0">▸</span><span>${x}</span></li>`).join("");
    // Overview + rules
    push("programming", `
      <div class="card col-12" style="margin-top:4px">
        <div class="card-title">The Forge Programming</div>
        <div class="card-headline">The System</div>
        <p style="color:#374151;font-size:.9rem;line-height:1.55;margin:2px 0 10px">${P.cycle}</p>
        <div class="inner-divider">Rules of thumb</div>
        <ul style="margin:0;padding:0">${li(P.rules)}</ul>
        <div class="inner-divider">Our kit</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${["3 racks (2 cables each)","Plyo boxes","Sled track","Ski erg","Rower","Concept2 bike","Assault bike","Barbells + plates","Dumbbells","Kettlebells","Sandbags","Slam balls","Wall balls","Resistance bands"].map(k=>`<span style="font-size:.72rem;color:#374151;background:#fafafa;border:1px solid #f0f0f5;border-radius:20px;padding:3px 10px">${k}</span>`).join("")}
        </div>
        <div style="font-size:.7rem;color:#9ca3af;margin-top:8px">No fixed/pin-loaded machines — the Programme Designer only programmes moves possible with this kit.</div>
      </div>`);
    // Test week — current quarter + this cycle's test/retest dates
    const tw = P.testWeek;
    push("programming", `
      <div class="card col-12">
        <div style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div><div class="card-title">Test Week · ${tw.current_quarter}</div>
            <div class="card-headline" style="margin-bottom:0">Weeks 1 &amp; 12</div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <span class="pill purple" style="cursor:default">Test: ${tw.test_dates}</span>
            <span class="pill purple" style="cursor:default">Retest: ${tw.retest_dates}</span>
          </div>
        </div>
        <p style="color:#6b7280;font-size:.8rem;line-height:1.5;margin:10px 0 8px">${tw.intro}</p>
        <div class="inner-divider">${tw.current_quarter} test set</div>
        <ol style="margin:0;padding-left:18px;color:#1f2937;font-size:.84rem;line-height:1.6">${tw.example.map(t => `<li style="padding:1px 0">${t}</li>`).join("")}</ol>
      </div>`);
    // Move library (add / search / filter by body part) — rendered by renderMoveLibrary
    push("programming", `<div class="card col-12" id="moveLibrary"></div>`);
  })();

  // Give each content tab its AI chat agent, pinned at the top.
  Object.keys(tabs).forEach(tab => { if (AGENT_TABS[tab]) tabs[tab].unshift(chatCard(tab)); });

  // ── Render each tab ─────────────────────────────────────────
  Object.entries(tabs).forEach(([tab, cards]) => {
    const grid = document.getElementById("grid-" + tab);
    if (grid) grid.innerHTML = cards.join("") || `<div class="card col-12"><p style="color:#ccc;font-size:.88rem;padding:8px 0">Nothing here yet</p></div>`;
  });
  const paintDynamic = () => {
    if (typeof renderAtRisk === "function")     renderAtRisk();
    if (typeof renderTodayHub === "function")   renderTodayHub();
    if (typeof renderSlack === "function")      renderSlack();
    if (typeof renderStarlingPl === "function") renderStarlingPl();
    if (typeof renderMoveLibrary === "function") renderMoveLibrary();
  };
  paintDynamic();                          // paint immediately
  loadAtRiskState().then(paintDynamic);    // then reconcile with the shared store
}

function showTaskDetail(gid, name, notes, url, scriptUrl) {
  document.getElementById("modal-title").textContent = name;
  const list = document.getElementById("modal-list");
  const notesHtml = notes
    ? notes.replace(/\\n/g, "\n").split("\n").filter(l => l.trim())
        .map(l => `<li style="padding:5px 0;border-bottom:1px solid #f3f4f6;line-height:1.5">${l}</li>`).join("")
    : "<li style='color:#aaa;padding:8px 0'>No description</li>";
  list.innerHTML = notesHtml;

  const asanaLink = document.getElementById("modal-asana-link");
  asanaLink.href = url || "#";
  asanaLink.style.display = url ? "flex" : "none";

  const doneBtn = document.getElementById("modal-task-done");
  if (scriptUrl) {
    doneBtn.style.display = "flex";
    doneBtn.onclick = () => markTaskDone(gid, name, scriptUrl, doneBtn);
  } else {
    doneBtn.style.display = "none";
  }

  document.getElementById("modal-overlay").classList.add("open");
}

async function markTaskDone(gid, name, scriptUrl, btn) {
  btn.disabled = true;
  btn.textContent = "Marking done…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ task_gid: gid, completed: true }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    btn.textContent = "✓ Marked done!";
    btn.style.background = "#dcfce7";
    btn.style.color = "#16a34a";
    btn.style.borderColor = "#bbf7d0";
    // Remove task row from list
    document.querySelectorAll(".task-item").forEach(el => {
      if (el.textContent.includes(name.substring(0, 20))) el.style.opacity = "0.35";
    });
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
    btn.disabled = false;
  }
}

async function toggleDone(btn, action, markDone, scriptUrl) {
  btn.disabled = true;
  btn.textContent = "Saving…";
  try {
    const res = await fetch(scriptUrl, {
      method: "POST",
      body: JSON.stringify({ action, done: markDone }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    if (markDone) {
      btn.className = "ap-btn ap-btn-done";
      btn.textContent = "✓ Done";
      btn.onclick = () => toggleDone(btn, action, false, scriptUrl);
    } else {
      btn.className = "ap-btn ap-btn-todo";
      btn.textContent = "○ Mark done";
      btn.onclick = () => toggleDone(btn, action, true, scriptUrl);
    }
  } catch (e) {
    btn.textContent = "Error — retry";
    btn.style.background = "#fee2e2";
    btn.style.color = "#dc2626";
  }
  btn.disabled = false;
}

loadData().then(render).catch(err => {
  document.getElementById("dashboard").innerHTML =
    `<div class="card col-12"><div class="card-headline">Error</div><p style="color:#dc2626;font-size:.88rem">${err.message}</p></div>`;
});
</script>
